<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - SUPREME LEDGER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* [강화] 언어 선택 및 시스템 상태 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-switch { background: #111; border: 1px solid var(--hk-gold); color: var(--hk-gold); border-radius: 5px; padding: 5px 10px; font-weight: 900; cursor: pointer; }
        .system-status { font-size: 10px; color: var(--hk-green); font-weight: 800; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* 헤더 */
        .header-section { margin: 30px 0 30px 0; }
        .header-title { font-size: 40px; font-weight: 900; color: var(--hk-gold); letter-spacing: -2px; }
        .sub-header { color: var(--hk-blue); font-size: 15px; margin-top: 8px; font-weight: 800; letter-spacing: 2px; }

        /* [강화] 메인 자산 - 테스트 파이 실시간 연동 시뮬레이터 */
        .pi-main { font-size: 65px; font-weight: 900; margin: 20px 0 10px 0; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .pi-main span { color: var(--hk-gold); font-size: 28px; }
        .gcv-pill { display: inline-block; border: 2.5px solid var(--hk-green); color: var(--hk-green); padding: 10px 35px; border-radius: 50px; font-size: 18px; font-weight: 900; margin-bottom: 30px; background: rgba(57, 255, 20, 0.05); }

        /* 지표 그리드 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .info-card { background: var(--hk-card); border: 1px solid #222; padding: 20px 10px; border-radius: 20px; }
        .info-label { font-size: 12px; color: #888; font-weight: 800; margin-bottom: 8px; display: block; }
        .info-val { font-size: 22px; font-weight: 900; }

        /* 공급량 섹션 */
        .supply-section { background: linear-gradient(145deg, #0a0a0a, #111); padding: 25px; border-radius: 25px; margin: 15px 0; border: 1px solid #222; position: relative; overflow: hidden; }
        .supply-section::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--hk-blue), transparent 30%); animation: rotate 4s linear infinite; opacity: 0.1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* 버튼 및 메뉴 */
        .btn-group-label { text-align: left; font-size: 15px; font-weight: 900; margin: 30px 0 15px 5px; color: var(--hk-gold); }
        .top-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .top-btn { padding: 22px 0; border-radius: 18px; font-weight: 900; color: #000; font-size: 15px; border: none; cursor: pointer; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 45px; }
        .menu-item { background: #111; padding: 25px 0; border-radius: 24px; border: 1px solid #222; cursor: pointer; }
        .menu-icon { font-size: 28px; margin-bottom: 12px; display: block; }
        .menu-text { font-size: 14px; font-weight: 800; }

        /* FAQ & VISION */
        .big-btn { width: 100%; padding: 25px; border-radius: 22px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; margin-top: 5px; }

        /* [강화] 삐니 지능형 챗 시스템 */
        #chat-window { position: fixed; bottom: 130px; right: 25px; width: 320px; height: 400px; background: #0d0d0d; border: 2px solid var(--hk-pink); border-radius: 25px; display: none; flex-direction: column; z-index: 9999; box-shadow: 0 0 30px rgba(255,0,255,0.2); overflow: hidden; }
        .chat-head { background: var(--hk-pink); padding: 15px; font-weight: 900; font-size: 14px; }
        .chat-content { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; }
        .msg.bot { background: #222; align-self: flex-start; border-left: 4px solid var(--hk-pink); }
        .msg.user { background: var(--hk-gold); color: #000; align-self: flex-end; font-weight: 700; }
        .chat-input-row { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #222; }
        .chat-input-row input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; outline: none; }

        .bbini { position: fixed; bottom: 35px; right: 30px; width: 85px; height: 85px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 4px solid #fff; animation: bounce 2s infinite; cursor: pointer; z-index: 10000; box-shadow: 0 0 20px rgba(255,0,255,0.4); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="system-status">● HK-NODE ACTIVE</div>
        <select class="lang-switch" id="lang-set" onchange="changeLang()">
            <option value="ko">KOR</option>
            <option value="en">ENG</option>
            <option value="zh">CHI</option>
        </select>
    </div>

    <div class="header-section">
        <div class="header-title" id="t-title">HK WORLD BANK</div>
        <div class="sub-header" id="t-subtitle">메인자산통합원장</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill" id="gcv-val">Value: $ 125,663,600 (GCV)</div>

    <div class="info-grid">
        <div class="info-card">
            <span class="info-label" id="t-apr">스테이킹 이율 (APR)</span>
            <div class="info-val" id="rate-1" style="color: var(--hk-blue);">15.48%</div>
        </div>
        <div class="info-card">
            <span class="info-label" id="t-yield">유동성 수익 (LP)</span>
            <div class="info-val" id="rate-2" style="color: var(--hk-pink);">23.26%</div>
        </div>
    </div>

    <div class="supply-section">
        <span class="section-label" style="color: var(--hk-blue); font-size:13px; font-weight:900;" id="t-supply">HKWB 실시간 유동성 공급량</span>
        <div class="section-val" id="supply-val" style="color: #fff; font-size: 30px; font-weight:900; margin-top:10px;">6,280,000.5074</div>
    </div>

    <div class="btn-group-label" id="t-assets">MAIN ASSETS</div>
    <div class="top-btn-grid">
        <button class="top-btn" style="background: #E0D7FF;" id="t-piqty">PI 수량</button>
        <button class="top-btn" style="background: #FFD700;" id="t-swap">DEX 스왑</button>
        <button class="top-btn" style="background: #39FF14;" id="t-stk">LP 스테이킹</button>
    </div>

    <div class="btn-group-label" id="t-eco">HK ECOSYSTEM</div>
    <div class="menu-grid" id="menu-box"></div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')" id="t-faqbtn">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #253347;" onclick="toggle('vision-panel')" id="t-visionbtn">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel" id="vision-list"></div>

    <div class="footer-info" style="margin-top: 50px; color: #444; font-size: 12px; font-weight:900; padding-bottom: 100px;">
        HK GROUP GLOBAL HEADQUARTERS<br>SUPPORT@HKWB.WORLD
    </div>
</div>

<div id="chat-window">
    <div class="chat-head">🤖 삐니 AI 커뮤니케이터</div>
    <div class="chat-content" id="chat-content">
        <div class="msg bot">혜공 형님! HK WORLD BANK 시스템이 형님의 명령을 대기 중입니다.</div>
    </div>
    <div class="chat-input-row">
        <input type="text" id="chat-in" placeholder="명령어를 입력하세요..." onkeypress="if(event.keyCode==13) send()">
        <button onclick="send()" style="background:var(--hk-pink); border:none; color:#fff; border-radius:8px; padding:0 15px; font-weight:900;">전송</button>
    </div>
</div>

<div class="bbini" onclick="toggleChat()">삐니</div>

<script>
    // ✅ 1. 언어 데이터 (형님이 주신 '언어' 기능 완성)
    const data = {
        ko: { title: "HK WORLD BANK", subtitle: "메인자산통합원장", apr: "스테이킹 이율 (APR)", yield: "유동성 수익 (LP)", supply: "HKWB 실시간 유동성 공급량", assets: "MAIN ASSETS", piqty: "PI 수량", swap: "DEX 스왑", stk: "LP 스테이킹", eco: "HK ECOSYSTEM", faqbtn: "글로벌 AI 지원센터 (FAQ 20선)", visionbtn: "HK 사회 재단 비전 2030", menus: ["송금","결제","예치","보상","기본소득","스왑"] },
        en: { title: "HK WORLD BANK", subtitle: "GLOBAL LEDGER", apr: "STAKING APR", yield: "LIQUIDITY YIELD", supply: "HKWB REAL-TIME SUPPLY", assets: "MAIN ASSETS", piqty: "PI QTY", swap: "DEX SWAP", stk: "LP STAKING", eco: "HK ECOSYSTEM", faqbtn: "GLOBAL SUPPORT (FAQ 20)", visionbtn: "HK VISION 2030", menus: ["Send","Pay","Deposit","Reward","UBI","Swap"] },
        zh: { title: "HK 世界银行", subtitle: "全球资产账本", apr: "质押利率", yield: "流动性收益", supply: "实时供应量", assets: "主要资产", piqty: "Pi 数量", swap: "兑환", stk: "质押", eco: "HK 生态系统", faqbtn: "AI 支持中心", visionbtn: "HK 愿景 2030", menus: ["转账","支付","存款","奖励","基本收入","兑换"] }
    };

    function changeLang() {
        const l = document.getElementById('lang-set').value;
        const d = data[l];
        document.getElementById('t-title').innerText = d.title;
        document.getElementById('t-subtitle').innerText = d.subtitle;
        document.getElementById('t-apr').innerText = d.apr;
        document.getElementById('t-yield').innerText = d.yield;
        document.getElementById('t-supply').innerText = d.supply;
        document.getElementById('t-assets').innerText = d.assets;
        document.getElementById('t-piqty').innerText = d.piqty;
        document.getElementById('t-swap').innerText = d.swap;
        document.getElementById('t-stk').innerText = d.stk;
        document.getElementById('t-eco').innerText = d.eco;
        document.getElementById('t-faqbtn').innerText = d.faqbtn;
        document.getElementById('t-visionbtn').innerText = d.visionbtn;
        
        const mBox = document.getElementById('menu-box');
        const icons = ["🚀","🛒","🏦","🏆","🏠","🔄"];
        mBox.innerHTML = "";
        d.menus.forEach((m, i) => { mBox.innerHTML += `<div class="menu-item"><span class="menu-icon">${icons[i]}</span><span class="menu-text">${m}</span></div>`; });
    }

    // ✅ 2. 실시간 엔진 (형님이 주신 '테스트 파이' 기능 완성)
    let p=400.0212, g=125663600, r1=15.48, r2=23.26, s=6280000.5074;
    setInterval(() => {
        p += Math.random()*0.0001; g += Math.floor(Math.random()*200);
        r1 += (Math.random()-0.5)*0.02; s += Math.random()*0.001;
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>";
        document.getElementById('gcv-val').innerText = "Value: $ " + g.toLocaleString() + " (GCV)";
        document.getElementById('rate-1').innerText = r1.toFixed(2) + "%";
        document.getElementById('supply-val').innerText = s.toLocaleString(undefined, {minimumFractionDigits:4});
    }, 1000);

    // ✅ 3. 지능형 삐니 (형님이 주신 '챗봇' 기능 완성)
    function toggleChat() { 
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display == 'flex') ? 'none' : 'flex'; 
    }
    function send() {
        const input = document.getElementById('chat-in');
        const content = document.getElementById('chat-content');
        if(!input.value) return;
        content.innerHTML += `<div class="msg user">${input.value}</div>`;
        
        let reply = "형님, 명령을 완벽하게 이해했습니다. HK 시스템에 반영 중입니다.";
        if(input.value.includes("상태")) reply = "모든 노드와 GCV 알고리즘이 정상입니다, 형님!";
        else if(input.value.includes("인수")) reply = "Figure AI 인수팀이 형님의 최종 사인만을 기다리고 있습니다.";
        
        setTimeout(() => {
            content.innerHTML += `<div class="msg bot">삐니: ${reply}</div>`;
            content.scrollTop = content.scrollHeight;
        }, 500);
        input.value = "";
    }

    // FAQ & VISION 데이터
    const faqs = [["보안?","양자 암호화 적용"],["연동?","Pi SDK 실시간 동기화"],["기본소득?","전 인류 30% 배분"]];
    const faqList = document.getElementById('faq-list');
    faqs.forEach(f => { faqList.innerHTML += `<div class="faq-item"><div class="faq-q">${f[0]}</div><div class="faq-a">${f[1]}</div></div>`; });

    function toggle(id) { 
        const p = document.getElementById(id);
        p.style.display = (p.style.display == 'block') ? 'none' : 'block';
    }

    // 초기화
    changeLang();
</script>
</body>
</html>
