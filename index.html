        .yield-box { background: #1a1a1a; padding: 28px; border-radius: 28px; text-align: left; border: 1px solid #222; }

        .btn-g { background: var(--gold); color: #000; box-shadow: 0 10px 20px var(--gold-glow); }

    function toggleLang(show) { 
        const overlay = document.getElementById('langOverlay');
        overlay.style.display = show ? 'block' : 'none';
    }

    function applyNation(idx) {
        const n = nations[idx];
        document.getElementById('curF').innerText = n.f;
        document.getElementById('curN').innerText = n.n;
        document.getElementById('t-ledger').innerText = n.l;
        document.getElementById('t-lp-lbl').innerText = n.lp;
        document.getElementById('t-shield').innerHTML = `<i class="fas fa-shield-alt"></i> ${n.sh}`;
        document.getElementById('t-ai').innerText = n.ai;
        for(let i=0; i<3; i++) {
            document.getElementById(`b${i+1}`).innerText = n.b[i];
            document.getElementById(`s${i+1}`).innerText = n.s[i];
        }
        for(let i=0; i<6; i++) document.getElementById(`m${i+1}`).innerText = n.m[i];
        toggleLang(false);
        gsap.from(".container", {duration: 0.7, opacity: 0, y: 30, ease: "power3.out"});
    }

    const list = document.getElementById('langList');
    nations.forEach((n, idx) => {
        const card = document.createElement('div');
        card.className = 'lang-card';
        card.innerHTML = `<span style="font-size:24px;">${n.f}</span> ${n.n}`;
        card.onclick = () => applyNation(idx);
        list.appendChild(card);
    });

    window.onload = () => {
        gsap.from(".brand-h1", {duration: 1, y: -50, opacity: 0, ease: "bounce.out"});
        gsap.from(".main-ledger-card", {duration: 1, scale: 0.9, opacity: 0, delay: 0.4});
        gsap.from(".svc-item", {duration: 0.5, opacity: 0, stagger: 0.08, delay: 0.9});
    };
