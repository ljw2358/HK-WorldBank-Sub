<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Enterprise</title>
    <style>
        :root {
            --bg: #000000; --card: #151515; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
       
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect {
            background: #222; color: var(--gold); border: 1px solid var(--gold);
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; letter-spacing: 1px; }
       
        #txt-ledger {
            font-weight: bold; margin-top: 15px; font-size: 1.1rem;
            background: linear-gradient(90deg, #00FFCC, #FF00FF, #39FF14);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 메인 버튼 3열 */
        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-white { background: white; color: black; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-green { background: #28a745; color: white; }

        /* 6구 아이콘 그리드 */
        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 20px 10px; border-radius: 15px; text-align: center; cursor: pointer; }
        .icon-img { font-size: 1.5rem; margin-bottom: 10px; display: block; }
        .icon-txt { font-size: 0.85rem; font-weight: bold; color: #ddd; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-label, .lp-label { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; }
        .st-val { color: var(--neon-st); font-size: 1.6rem; font-weight: bold; }
        .lp-val { color: var(--neon-lp); font-size: 1.6rem; font-weight: bold; }

        .lp-total-box { border: 1px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #lp-total-num { color: var(--neon-green); font-size: 1.8rem; font-weight: 1000; }

        /* 양자 방패 섹션 */
        .shield-box { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--neon-blue); }
        .shield-title { color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; }

        .center-btn {
            width: 100%; background: #ff4d6d; color: white; padding: 18px; border-radius: 15px;
            border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        .faq-section { display: none; background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .faq-a { color: #bbb; font-size: 0.8rem; line-height: 1.4; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-bottom: 50px; }
        .soc-btn { padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; }

        #ai-bot {
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px;
            background: #FF00FF; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 15px #FF00FF;
            cursor: pointer; z-index: 1000; animation: float 3s infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
       
        #chat-box {
            display: none; position: fixed; bottom: 100px; right: 20px; width: 280px;
            background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); z-index: 1001;
        }
        #chat-box input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option>
            <option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇵🇹</option>
            <option value="ru">Русский 🇷🇺</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;">400.0212 <span style="color:var(--gold)">Pi</span></div>
        <div style="background: rgba(57, 255, 20, 0.2); color: var(--neon-green); padding: 5px 20px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold;">Value: $ 125,663,600 (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" class="st-label" style="color:var(--neon-st)">스테이킹 이율</div>
            <div class="st-val" id="live-st">16.98%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" class="lp-label" style="color:var(--neon-lp)">유동성 수익</div>
            <div class="lp-val" id="live-lp">26.38%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.9rem; margin-bottom:10px; color:#aaa;">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,429,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn btn-white" id="btn-pi">PI 수량</button>
        <button class="m-btn btn-gold" id="btn-dex">DEX 스왑</button>
        <button class="m-btn btn-green" id="btn-lp">LP 공급</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card"><span class="icon-img">🚀</span><span class="icon-txt" id="menu-1">송금</span></div>
        <div class="icon-card"><span class="icon-img">🛒</span><span class="icon-txt" id="menu-2">결제</span></div>
        <div class="icon-card"><span class="icon-img">💰</span><span class="icon-txt" id="menu-3">예치</span></div>
        <div class="icon-card"><span class="icon-img">🏅</span><span class="icon-txt" id="menu-4">보상</span></div>
        <div class="icon-card"><span class="icon-img">🏦</span><span class="icon-txt" id="menu-5">기본소득</span></div>
        <div class="icon-card"><span class="icon-img">🔄</span><span class="icon-txt" id="menu-6">스왑</span></div>
    </div>

    <div class="shield-box">
        <div class="shield-title">🛡 <span id="shield-head">HK 양자 방패 가동 중</span></div>
        <div style="font-size: 0.8rem; color: #999; line-height: 1.6;">
            • <span id="s1">보안 기술 V23 적용</span><br>
            • <span id="s2">메인넷 자산 자동 연동</span><br>
            • <span id="s3">AI 실시간 자산 보호</span>
        </div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터 가동</button>

    <div class="faq-section" id="faqBox">
        <div id="faq-list"></div>
    </div>

    <div class="social-grid">
        <a href="#" class="soc-btn" style="background:#FF0000">YouTube</a>
        <a href="#" class="soc-btn" style="background:#000; border: 1px solid #333;">TikTok</a>
    </div>
</div>

<div id="ai-bot" onclick="openChat()">AI</div>

<div id="chat-box">
    <div id="txt-ai-ask" style="color:black; font-weight:bold; margin-bottom:10px; font-size:0.9rem;">무엇을 도와 드릴까요?</div>
    <input type="text" id="userMsg" placeholder="Message...">
    <button onclick="closeChat()" style="margin-top:10px; width:100%; padding:8px; background:#111; color:white; border:none; border-radius:5px;">Close</button>
</div>

<script>
    const i18n = {
        ko: { 
            ledger: "메인 자산 통합 원장", st: "스테이킹 이율", lp: "유동성 수익", total: "전체 유동성 LP 공급", 
            btn1: "PI 수량", btn2: "DEX 스왑", btn3: "LP 공급",
            m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑",
            shield: "HK 양자 방패 가동 중", s1: "보안 기술 V23 적용", s2: "메인넷 자산 자동 연동", s3: "AI 실시간 자산 보호",
            center: "글로벌 AI 고객지원센터 가동", ai: "무엇을 도와 드릴까요?",
            q11: "11. UBI 재원은 어떻게 만드나요?", a11: "독자적인 유동성 알고리즘과 글로벌 AI 수익 모델을 통해 창출됩니다."
        },
        en: { 
            ledger: "Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", total: "Total Liquidity LP", 
            btn1: "PI Amount", btn2: "DEX Swap", btn3: "LP Supply",
            m1: "Transfer", m2: "Payment", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap",
            shield: "HK Quantum Shield Active", s1: "Security V23 Applied", s2: "Mainnet Auto-Link", s3: "AI Asset Protection",
            center: "Global AI Support Active", ai: "How can I help you?",
            q11: "11. How is UBI funded?", a11: "Created via unique liquidity algorithms and global AI revenue models."
        },
        pt: { 
            ledger: "Livro de Ativos Principal", st: "Taxa de Staking", lp: "Rendimento Liquidez", total: "Suprimento Total LP", 
            btn1: "Qtd PI", btn2: "DEX Swap", btn3: "Prover LP",
            m1: "Transferir", m2: "Pagamento", m3: "Depósito", m4: "Recompensa", m5: "Renda Básica", m6: "Swap",
            shield: "Escudo Quântico HK Ativo", s1: "Tecnologia V23", s2: "Sincronização Mainnet", s3: "Proteção IA",
            center: "Centro de Suporte IA Global", ai: "Como posso ajudar?",
            q11: "11. Como criar fundos UBI?", a11: "Através de algoritmos de liquidez e modelos de lucro de IA."
        }
        // 나머지 언어들도 동일한 구조로 추가 가능
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('btn-pi').innerText = d.btn1;
        document.getElementById('btn-dex').innerText = d.btn2;
        document.getElementById('btn-lp').innerText = d.btn3;
        document.getElementById('menu-1').innerText = d.m1;
        document.getElementById('menu-2').innerText = d.m2;
        document.getElementById('menu-3').innerText = d.m3;
        document.getElementById('menu-4').innerText = d.m4;
        document.getElementById('menu-5').innerText = d.m5;
        document.getElementById('menu-6').innerText = d.m6;
        document.getElementById('shield-head').innerText = d.shield;
        document.getElementById('s1').innerText = d.s1;
        document.getElementById('s2').innerText = d.s2;
        document.getElementById('s3').innerText = d.s3;
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('txt-ai-ask').innerText = d.ai;

        const list = document.getElementById('faq-list');
        list.innerHTML = "";
        for(let i=1; i<=11; i++) {
            let qStr = i === 11 ? d.q11 : `FAQ ${i} - HK World Bank Service`;
            let aStr = i === 11 ? d.a11 : `Global AI Support provides 24/7 automated management and security for your assets.`;
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${qStr}</div><div class="faq-a">${aStr}</div></div>`;
        }
    }

    function toggleFaq() { 
        const box = document.getElementById('faqBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block'; 
    }
    function openChat() { document.getElementById('chat-box').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-box').style.display = 'none'; }
    
    // 초기 실행
    changeLanguage();
</script>
</body>
</html>
