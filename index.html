<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Global UBI DEX</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 120px; }
       
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 140px; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(255,215,0,0.7); }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; color: var(--neon-st); transition: 0.5s; }
       
        .pi-display { font-size: 2.8rem; font-weight: bold; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-variant-numeric: tabular-nums; }

        .token-info { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--neon-blue); text-align: center; }
        .token-supply { color: var(--neon-blue); font-weight: bold; font-size: 1.4rem; font-variant-numeric: tabular-nums; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
        .rate-val { font-size: 1.2rem; font-weight: bold; }
       
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { font-size: 1.5rem; font-weight: 900; color: white; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .icon-card span { display: block; margin-top: 8px; font-size: 0.85rem; font-weight: bold; color: #ddd; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
       
        .faq-section { display: block; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #444; margin-bottom: 20px; }
        .faq-q { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; border-left: 3px solid var(--gold); padding-left: 8px; margin-top: 15px; }
        .faq-a { color: #ccc; font-size: 0.85rem; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #222; }

        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 3000; color: white; animation: pulse 2s infinite; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 330px; height: 480px; background: #111; border: 2px solid var(--neon-lp); border-radius: 20px; z-index: 3001; flex-direction: column; overflow: hidden; }
        #chat-header { background: var(--neon-lp); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .ai-msg { background: #222; align-self: flex-start; border-left: 4px solid var(--neon-lp); }
        .user-msg { background: var(--neon-blue); align-self: flex-end; }
        .chat-input-box { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; }
        #user-input { flex: 1; background: #222; border: none; border-radius: 8px; color: white; padding: 10px; outline: none; }
        #send-btn { background: var(--neon-lp); border: none; color: white; padding: 0 15px; margin-left: 8px; border-radius: 8px; cursor: pointer; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 0, 255, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">통합 자산 관리 시스템</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="token-info">
        <div style="font-size:0.75rem; color:#aaa; margin-bottom:5px;">HKWB TOKEN REAL-TIME SUPPLY</div>
        <div class="token-supply" id="token-num">6,280,000.0000</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card">
            <div style="color:var(--neon-st); font-size:0.8rem;">Staking</div>
            <div class="rate-val" id="live-st" style="color:var(--neon-st);">17.38%</div>
        </div>
        <div class="rate-card">
            <div style="color:var(--neon-lp); font-size:0.8rem;">LP Profit</div>
            <div class="rate-val" id="live-lp" style="color:var(--neon-lp);">28.12%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div style="font-size:0.8rem; color:var(--neon-green); margin-bottom:5px;">Total Liquidity (DEX LP)</div>
        <div id="lp-total-num">$ 88,432,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" id="btn-wallet" style="background:#fff;" onclick="PiSDK.connect()">Connect Wallet</button>
        <button class="m-btn" id="btn-swap" style="background:var(--gold);" onclick="PiSDK.swap()">DEX Swap</button>
        <button class="m-btn" id="btn-stake" style="background:#28a745; color:white;" onclick="PiSDK.provideLP()">LP Staking</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="PiSDK.action('send')">🚀<span id="m1">Send</span></div>
        <div class="icon-card" onclick="PiSDK.action('pay')">🛒<span id="m2">Pay</span></div>
        <div class="icon-card" onclick="PiSDK.action('depo')">💰<span id="m3">Deposit</span></div>
        <div class="icon-card" onclick="PiSDK.action('reward')">🏅<span id="m4">Reward</span></div>
        <div class="icon-card" onclick="PiSDK.action('ubi')">🏦<span id="m5">UBI</span></div>
        <div class="icon-card" onclick="PiSDK.action('ex')">🔄<span id="m6">Exchange</span></div>
    </div>

    <button class="center-btn" id="btn-center">Global AI Support Center</button>
    <div class="faq-section" id="faqBox">
        <div id="faq-list"></div>
    </div>
</div>

<div id="ai-bot" onclick="toggleChat()">AI</div>
<div id="chat-window">
    <div id="chat-header"><span id="txt-ai-name">HKWB AI Bini</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span></div>
    <div id="chat-messages"><div class="msg ai-msg" id="txt-ai-greet">Greetings, Brother Hyekong!</div></div>
    <div class="chat-input-box">
        <input type="text" id="user-input" placeholder="Message..." onkeypress="if(event.key==='Enter') askAI()">
        <button id="send-btn" onclick="askAI()">SEND</button>
    </div>
</div>

<script>
    /* 50개국어 지원 리스트 */
    const languages = [
        {c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}, {c:"vi", n:"Tiếng Việt"},
        {c:"fr", n:"Français"}, {c:"de", n:"Deutsch"}, {c:"es", n:"Español"}, {c:"pt", n:"Português"}, {c:"ru", n:"Русский"},
        {c:"ar", n:"العربية"}, {c:"hi", n:"हिन्दी"}, {c:"th", n:"ไทย"}, {c:"tr", n:"Türkçe"}, {c:"it", n:"Italiano"},
        {c:"nl", n:"Nederlands"}, {c:"pl", n:"Polski"}, {c:"sv", n:"Svenska"}, {c:"id", n:"Indonesia"}, {c:"ms", n:"Melayu"},
        {c:"fa", n:"فارسی"}, {c:"he", n:"עברית"}, {c:"el", n:"Ελληνικά"}, {c:"hu", n:"Magyar"}, {c:"cs", n:"Čeština"},
        {c:"ro", n:"Română"}, {c:"no", n:"Norsk"}, {c:"da", n:"Dansk"}, {c:"fi", n:"Suomi"}, {c:"bg", n:"Български"},
        {c:"uk", n:"Українська"}, {c:"hr", n:"Hrvatski"}, {c:"sk", n:"Slovenčina"}, {c:"sl", n:"Slovenščina"}, {c:"lt", n:"Lietuvių"},
        {c:"lv", n:"Latviešu"}, {c:"et", n:"Eesti"}, {c:"sr", n:"Српски"}, {c:"az", n:"Azərbaycan"}, {c:"ka", n:"ქართული"},
        {c:"uz", n:"O'zbek"}, {c:"kk", n:"Қазақ"}, {c:"mn", n:"Монгол"}, {c:"bn", n:"বাংলা"}, {c:"pa", n:"ਪੰਜਾਬੀ"},
        {c:"ta", n:"தமிழ்"}, {c:"te", n:"తెలుగు"}, {c:"kn", n:"ಕನ್ನಡ"}, {c:"ml", n:"മലയാളം"}, {c:"sw", n:"Kiswahili"}
    ];

    const i18n = {
        ko: { ledger: "통합 자산 관리 시스템", wallet: "지갑 연동", swap: "DEX 스왑", stake: "LP 스테이킹", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "UBI", m6: "전환", greet: "반갑습니다 혜공 형님! 테스트 파이 지갑이 활성화되었습니다." },
        en: { ledger: "Asset Management System", wallet: "Connect Wallet", swap: "DEX Swap", stake: "LP Staking", m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Exchange", greet: "Greetings, Brother Hyekong! Test-Pi Wallet is Active." },
        zh: { ledger: "综合资产管理系统", wallet: "连接钱包", swap: "DEX 交换", stake: "LP 质押", m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "UBI", m6: "兑换", greet: "您好，惠公大哥！测试 Pi 钱包已激活。" }
    };

    /* Pi SDK 연동 (Test-Pi 구동용) */
    const PiSDK = {
        connect: async () => {
            try {
                // 실제 Pi Browser에서 구동 시 인증 팝업
                // const scopes = ['payments', 'username'];
                // const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                alert("[Test-Pi] 혜공 형님, 지갑 연결 성공!\n주소: GD2X...TEST_HKWB");
            } catch (e) { alert("Pi Browser에서 실행해주세요."); }
        },
        swap: () => alert("DEX 엔진 가동: Test-Pi를 HKWB 토큰으로 스왑합니다."),
        provideLP: () => alert("2월 26일 거버넌스 이벤트: 1080 Test-Pi 예치 명령 수신."),
        action: (type) => alert(`[Testnet Call] ${type.toUpperCase()} 트랜잭션 성공.`)
    };

    /* FAQ 20개 정갈하게 배치 */
    function loadFaq() {
        const faqData = [
            {q: "UBI의 핵심 비전은?", a: "20억 인류에게 보편적 기본소득을 자동 지급하는 것입니다."},
            {q: "2월 26일의 의미는?", a: "1080개 테스트 파이를 LP에 예치하여 거버넌스를 확보하는 날입니다."},
            {q: "HK-WorldBank의 수익 구조는?", a: "DEX 거래 수수료의 30%가 재단 기금으로 적립됩니다."},
            {q: "테스트 파이는 어디에 쓰이나요?", a: "메인넷 전환 전 모든 생태계의 안정성을 검증하는 데 사용됩니다."},
            {q: "50개국어를 지원하는 이유는?", a: "전 세계 누구나 장벽 없이 디지털 자산에 접근하기 위함입니다."},
            {q: "5월 18일 예정된 이벤트는?", a: "테스트 데이터가 실제 자산으로 동기화되는 마이그레이션 단계입니다."},
            {q: "보안은 어떻게 유지되나요?", a: "양자 암호화 기술과 삐니 AI가 실시간으로 감시합니다."},
            {q: "송금 수수료는 얼마인가요?", a: "네트워크 유지를 위한 최소 수수료 0.01 Pi가 적용됩니다."},
            {q: "HKWB 토큰 총 발행량은?", a: "희소성을 고려한 6,280,000개입니다."},
            {q: "개인정보 보호는?", a: "별도 가입 없이 Pi 지갑 주소로만 익명성을 보장합니다."},
            {q: "DEX 스왑 비율은?", a: "실시간 GCV 시세를 반영하여 자동 계산됩니다."},
            {q: "스테이킹 보상은 언제 지급되나요?", a: "실시간으로 누적되며 언제든 인출 가능합니다."},
            {q: "UBI 대상자는?", a: "전 세계 취약계층부터 시작하여 점진적으로 확대됩니다."},
            {q: "삐니 AI의 역할은?", a: "사용자 상담, 자산 분석 및 시스템 이상 감지입니다."},
            {q: "Pi SDK 연동의 장점은?", a: "Pi Browser 내에서 강력한 보안과 간편 결제를 제공합니다."},
            {q: "오프라인 매장 결제는?", a: "QR 코드 시스템을 통해 전 세계 가맹점에서 지원 예정입니다."},
            {q: "거버넌스 투표란?", a: "LP 예치자가 프로젝트의 주요 결정을 직접 투표하는 시스템입니다."},
            {q: "시스템 서버 위치는?", a: "탈중앙화 노드를 통해 전 세계에 분산 운영됩니다."},
            {q: "재단 운영의 투명성은?", a: "모든 트랜잭션은 블록체인 상에 공개되어 누구나 확인 가능합니다."},
            {q: "향후 로드맵은?", a: "글로벌 뱅크 인프라 완성을 거쳐 우주 인프라 결제까지 확장합니다."}
        ];
        document.getElementById('faq-list').innerHTML = faqData.map(i => `<div class="faq-q">${i.q}</div><div class="faq-a">${i.a}</div>`).join('');
    }

    /* 언어 변경 & 삐니 동기화 */
    function changeLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('btn-wallet').innerText = d.wallet;
        document.getElementById('btn-swap').innerText = d.swap;
        document.getElementById('btn-stake').innerText = d.stake;
        document.getElementById('txt-ai-greet').innerText = d.greet; // 삐니 인사말 동기화
        ['m1','m2','m3','m4','m5','m6'].forEach(id => document.getElementById(id).innerText = d[id]);
    }

    /* 실시간 숫자 엔진 */
    setInterval(() => {
        document.getElementById('main-pi').innerText = (412.314 + Math.random() * 0.001).toFixed(4);
        document.getElementById('main-val').innerText = (129540600 + Math.floor(Math.random()*1000)).toLocaleString();
        document.getElementById('lp-total-num').innerText = '$ ' + (88432159375 + Math.floor(Math.random()*50000)).toLocaleString();
    }, 1500);

    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }
    function askAI() { /* 이전 챗봇 로직과 동일 */ }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        languages.forEach(l => { const o = document.createElement('option'); o.value=l.c; o.innerText=l.n; sel.appendChild(o); });
        loadFaq();
        changeLanguage(); // 초기 실행 시 동기화
    };
</script>
</body>
</html>
