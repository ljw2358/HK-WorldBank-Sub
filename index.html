
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - BPINI MASTER</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; position: relative; }

        /* [1] 상단 바 - 언어 선택 우측 상단 고정 */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; gap: 10px; width: 100%; }
        #langSelect { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 5px 10px; border-radius: 8px; font-weight: 900; cursor: pointer; outline: none; }
        .node-tag { color: var(--gold); font-weight: 900; font-size: 0.8rem; margin-right: auto; }

        /* [2] 헤더 섹션 */
        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        .sub-title { font-weight: bold; margin-top: 10px; font-size: 1.1rem; color: var(--neon-st); }
        .pi-display { font-size: 3rem; font-weight: 900; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .gcv-box { background: rgba(57, 255, 20, 0.05); color: var(--neon-green); padding: 10px 30px; border: 1.5px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: 900; font-size: 1.3rem; }

        /* [3] 실시간 데이터 카드 */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .label { font-size: 0.75rem; color: #aaa; font-weight: bold; margin-bottom: 8px; }
        .val-blue { color: var(--neon-blue); font-weight: 900; font-size: 1.7rem; font-variant-numeric: tabular-nums; }
        .val-st { color: var(--neon-st); font-weight: 900; font-size: 1.4rem; }
        .val-lp { color: var(--neon-lp); font-weight: 900; font-size: 1.4rem; }

        /* [4] 버튼 & 아이콘 그리드 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 0.85rem; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .icon-item { background: var(--card); padding: 20px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .icon-item i { font-style: normal; font-size: 1.6rem; display: block; margin-bottom: 10px; }
        .icon-item span { font-size: 0.85rem; font-weight: bold; color: #ddd; }

        /* [5] FAQ 박스 (스크롤 가능) */
        .center-btn { width: 100%; background: #ff4d6d; color: white; padding: 20px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .faq-box { display: none; background: #0a0a0a; border: 1px solid #444; border-radius: 0 0 15px 15px; padding: 20px; max-height: 350px; overflow-y: auto; text-align: left; }
        .faq-q { color: var(--gold); font-weight: 900; margin-top: 15px; border-left: 3px solid var(--gold); padding-left: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; margin-top: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        /* [6] SNS & 푸터 */
        .sns-row { display: flex; gap: 10px; margin: 30px 0; }
        .sns-btn { flex: 1; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; color: white; font-weight: 900; }
        footer { text-align: center; padding: 30px; border-top: 1px solid #222; color: #777; font-size: 0.8rem; }

        /* [7] 삐니 AI 챗봇 */
        #bpini-trigger { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 999; color: white; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 320px; height: 450px; background: #000; border: 2px solid var(--neon-lp); border-radius: 20px; flex-direction: column; overflow: hidden; z-index: 1000; }
        .chat-h { background: var(--neon-lp); padding: 15px; font-weight: 900; display: flex; justify-content: space-between; }
        .chat-b { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .ai { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; }
        .chat-i { display: flex; padding: 10px; background: #111; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="node-tag">NODE ACTIVE [2/2]</div>
        <select id="langSelect" onchange="translateAll()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="t-sub" class="sub-title">통합 자산 관리 시스템</div>
        <div class="pi-display"><span id="l-pi">412.3149</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-box">$ <span id="l-gcv">129,541,312</span></div>
    </header>

    <div class="card">
        <div class="label" id="t-supply-l">HKWB TOKEN REAL-TIME SUPPLY</div>
        <div class="val-blue" id="l-supply">6280000.5042</div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <div class="card" style="flex:1;"><div class="label" id="t-st">스테이킹</div><div class="val-st" id="l-st">17.75%</div></div>
        <div class="card" style="flex:1;"><div class="label" id="t-lp">LP 수익률</div><div class="val-lp" id="l-lp">28.80%</div></div>
    </div>

    <div class="card" style="border:3px solid var(--neon-green);">
        <div class="label" id="t-total-lp" style="color:var(--neon-green)">전체 유동성 공급 (DEX LP)</div>
        <div class="val-blue" id="l-total-lp" style="color:white">$ 88,432,103,868</div>
    </div>

    <div class="btn-grid">
        <button class="m-btn" id="t-b1" style="background:#fff;">PI 수량</button>
        <button class="m-btn" id="t-b2" style="background:var(--gold);">DEX 스왑</button>
        <button class="m-btn" id="t-b3" style="background:var(--neon-green);">LP 스테이킹</button>
    </div>

    <div class="icon-grid">
        <div class="icon-item"><i>🚀</i><span id="m1">송금</span></div>
        <div class="icon-item"><i>🛒</i><span id="m2">결제</span></div>
        <div class="icon-item"><i>💰</i><span id="m3">예치</span></div>
        <div class="icon-item"><i>🏅</i><span id="m4">보상</span></div>
        <div class="icon-item"><i>🏦</i><span id="m5">UBI</span></div>
        <div class="icon-item"><i>🔄</i><span id="m6">스왑</span></div>
    </div>

    <button class="center-btn" id="t-center" onclick="toggleFaq()">글로벌 AI 지원센터</button>
    <div class="faq-box" id="faq-box"></div>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-btn" style="background:#f00;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn" style="background:#000; border:1px solid #fff;">TikTok</a>
    </div>

    <footer>
        <p>© 2026 HK WORLD BANK FOUNDATION<br>SECURED BY HKWB PROTOCOL</p>
    </footer>
</div>

<div id="bpini-trigger" onclick="toggleChat()">삐니</div>
<div id="chat-window">
    <div class="chat-h"><span id="t-chat-h">BPINI AI Manager</span><span onclick="toggleChat()" style="cursor:pointer;">✕</span></div>
    <div class="chat-b" id="chat-box"></div>
    <div class="chat-i"><input type="text" id="chat-input" onkeypress="if(event.key==='Enter') askAI()"></div>
</div>

<script>
    const languages = [
        {c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}, {c:"vi", n:"Tiếng Việt"},
        {c:"es", n:"Español"}, {c:"fr", n:"Français"}, {c:"de", n:"Deutsch"}, {c:"pt", n:"Português"}, {c:"ru", n:"Русский"},
        {c:"hi", n:"हिन्दी"}, {c:"ar", n:"العربية"}, {c:"id", n:"Indonesia"}, {c:"th", n:"ไทย"}, {c:"tr", n:"Türkçe"},
        {c:"it", n:"Italiano"}, {c:"nl", n:"Nederlands"}, {c:"pl", n:"Polski"}, {c:"sv", n:"Svenska"}, {c:"fil", n:"Filipino"},
        {c:"ms", n:"Bahasa Melayu"}, {c:"fa", n:"فارسی"}, {c:"bn", n:"বাংলা"}, {c:"pa", n:"ਪੰਜਾਬੀ"}, {c:"te", n:"తెలుగు"},
        {c:"mr", n:"मराठी"}, {c:"ta", n:"தமிழ்"}, {c:"ur", n:"اردو"}, {c:"gu", n:"ગુજરાતી"}, {c:"kn", n:"ಕನ್ನಡ"},
        {c:"ml", n:"മലയാളം"}, {c:"uk", n:"Українська"}, {c:"ro", n:"Română"}, {c:"hu", n:"Magyar"}, {c:"el", n:"Ελληνικά"},
        {c:"cs", n:"Čeština"}, {c:"he", n:"עברית"}, {c:"da", n:"Dansk"}, {c:"fi", n:"Suomi"}, {c:"no", n:"Norsk"},
        {c:"sk", n:"Slovenčina"}, {c:"bg", n:"Български"}, {c:"hr", n:"Hrvatski"}, {c:"sr", n:"Српски"}, {c:"sl", n:"Slovenščina"},
        {c:"et", n:"Eesti"}, {c:"lv", n:"Latviešu"}, {c:"lt", n:"Lietuvių"}, {c:"sw", n:"Kiswahili"}, {c:"am", n:"አማርኛ"}
    ];

    const i18n = {
        ko: { sub:"통합 자산 관리 시스템", supply:"HKWB 실시간 공급량", st:"스테이킹", lp:"LP 수익률", total:"전체 유동성 (DEX LP)", b1:"PI 수량", b2:"DEX 스왑", b3:"LP 스테이킹", center:"글로벌 AI 지원센터", m1:"송금", m2:"결제", m3:"예치", m4:"보상", m5:"UBI", m6:"스왑", chatH:"삐니 AI 매니저", greet:"안녕하십니까. 시스템 매니저 삐니입니다. 무엇을 도와드릴까요?", win:"HKWB의 글로벌 승리는 이미 시스템적으로 확정되었습니다.", sync:"데이터 동기화가 완료되었습니다." },
        en: { sub:"Integrated Asset Management", supply:"HKWB Real-time Supply", st:"Staking", lp:"LP Yield", total:"Total Liquidity (DEX LP)", b1:"PI Qty", b2:"DEX Swap", b3:"LP Staking", center:"Global AI Center", m1:"Send", m2:"Pay", m3:"Deposit", m4:"Reward", m5:"UBI", m6:"Swap", chatH:"BPINI AI Manager", greet:"Hello. I am Bpini, the system manager. How can I help you?", win:"The global victory of HKWB is already confirmed systematically.", sync:"Data synchronization complete." }
    };

    const faqTopics = ["Vision", "Liquidity", "Mainnet Sync", "Dual Nodes", "Total Supply", "Staking Reward", "GCV Value", "Encryption", "UBI Distribution", "Instant Swap", "Bio Data", "UAM Mobility", "AI Robotics", "Space Banking", "KYB Process", "Daily Bonus", "Global Charity", "Secure Wallet", "Layer 2 scaling", "Global Governance"];

    function translateAll() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;
        
        document.getElementById('t-sub').innerText = d.sub;
        document.getElementById('t-supply-l').innerText = d.supply;
        document.getElementById('t-st').innerText = d.st;
        document.getElementById('t-lp').innerText = d.lp;
        document.getElementById('t-total-lp').innerText = d.total;
        document.getElementById('t-b1').innerText = d.b1; document.getElementById('t-b2').innerText = d.b2; document.getElementById('t-b3').innerText = d.b3;
        document.getElementById('t-center').innerText = d.center;
        document.getElementById('t-chat-h').innerText = d.chatH;
        for(let i=1; i<=6; i++) document.getElementById('m'+i).innerText = d['m'+i] || i18n.en['m'+i];

        const fBox = document.getElementById('faq-box');
        fBox.innerHTML = faqTopics.map((t, idx) => `<div class="faq-q">${idx+1}. [${l.toUpperCase()}] ${t}?</div><div class="faq-a">Protocol ${t} is fully optimized for 2026 global standards.</div>`).join('');
        document.getElementById('chat-box').innerHTML = `<div class="msg ai">${d.greet}</div>`;
    }

    function runLiveNumbers() {
        let pi=412.3149, supply=6280000.5042, gcv=129541312, lp=88432103868, st=17.75, lp_r=28.80;
        setInterval(() => {
            pi += (Math.random()*0.0004 - 0.0002);
            supply += (Math.random()*0.0001);
            gcv += Math.floor(Math.random()*40 - 20);
            lp += Math.floor(Math.random()*2000 - 1000);
            st += (Math.random()*0.02 - 0.01);
            lp_r += (Math.random()*0.02 - 0.01);
            
            document.getElementById('l-pi').innerText = pi.toFixed(4);
            document.getElementById('l-supply').innerText = supply.toFixed(4);
            document.getElementById('l-gcv').innerText = gcv.toLocaleString();
            document.getElementById('l-total-lp').innerText = '$ ' + lp.toLocaleString();
            document.getElementById('l-st').innerText = st.toFixed(2) + '%';
            document.getElementById('l-lp').innerText = lp_r.toFixed(2) + '%';
        }, 1200);
    }

    function askAI() {
        const inp = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if(!inp.value.trim()) return;
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;

        box.innerHTML += `<div class="msg user">${inp.value}</div>`;
        const v = inp.value; inp.value = '';
        
        setTimeout(() => {
            let res = d.sync;
            if(v.includes("우승") || v.toLowerCase().includes("win")) res = d.win;
            box.innerHTML += `<div class="msg ai">${res}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 600);
    }

    function toggleFaq() { const f = document.getElementById('faq-box'); f.style.display = (f.style.display==='block')?'none':'block'; }
    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        languages.forEach(lan => { const o = document.createElement('option'); o.value=lan.c; o.innerText=lan.n; sel.appendChild(o); });
        translateAll(); runLiveNumbers();
    };
</script>
</body>
</html>
