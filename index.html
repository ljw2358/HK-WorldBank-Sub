<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Victory UBI DEX</title>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 120px; }
        
        .lang-bar { text-align: right; margin-bottom: 15px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: rgba(0,0,0,0.9); color: var(--gold); border: 1px solid var(--gold); padding: 6px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .title { font-size: 2.3rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        #txt-ledger { font-weight: bold; margin-top: 10px; font-size: 1rem; color: var(--neon-st); height: 1.5rem; }
       
        .pi-display { font-size: 3.2rem; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1px solid var(--neon-green); border-radius: 50px; font-weight: bold; font-size: 1.2rem; }

        .token-info { background: #111; padding: 20px; border-radius: 20px; margin: 20px 0; border: 1px solid var(--neon-blue); text-align: center; box-shadow: inset 0 0 10px var(--neon-blue); }
        .token-supply { color: var(--neon-blue); font-weight: bold; font-size: 1.7rem; font-variant-numeric: tabular-nums; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #333; }
        .rate-val { font-size: 1.3rem; font-weight: bold; font-variant-numeric: tabular-nums; }
       
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { font-size: 1.6rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .icon-card span { display: block; margin-top: 8px; font-size: 0.8rem; font-weight: bold; color: #bbb; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
       
        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 3000; animation: pulse 2s infinite; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 330px; height: 480px; background: #111; border: 2px solid var(--neon-lp); border-radius: 20px; z-index: 3001; flex-direction: column; overflow: hidden; }
        #chat-header { background: var(--neon-lp); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #050505; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 10px; }
        .ai-msg { background: #222; border-left: 4px solid var(--neon-lp); align-self: flex-start; }
        .user-msg { background: var(--neon-blue); align-self: flex-end; float: right; clear: both; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 0, 255, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">HKWB GLOBAL SYSTEM ACTIVE</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="token-info">
        <div style="font-size:0.75rem; color:#aaa; margin-bottom:5px;">HKWB TOKEN REAL-TIME SUPPLY</div>
        <div class="token-supply" id="token-num">6,280,000.8706</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" style="color:var(--neon-st); font-size:0.8rem;">STAKING</div>
            <div class="rate-val" id="live-st" style="color:var(--neon-st);">17.38%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" style="color:var(--neon-lp); font-size:0.8rem;">LP REWARD</div>
            <div class="rate-val" id="live-lp" style="color:var(--neon-lp);">28.12%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.8rem; color:var(--neon-green); margin-bottom:5px;">TOTAL DEX LIQUIDITY</div>
        <div id="lp-total-num">$ 88,432,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" id="btn-wallet" style="background:#fff;" onclick="PiSDK.connect()">WALLET</button>
        <button class="m-btn" id="btn-swap" style="background:var(--gold);" onclick="PiSDK.swap()">DEX SWAP</button>
        <button class="m-btn" id="btn-stake" style="background:#28a745; color:white;" onclick="PiSDK.provideLP()">LP STAKE</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="PiSDK.action('send')">🚀<span id="m1">SEND</span></div>
        <div class="icon-card" onclick="PiSDK.action('pay')">🛒<span id="m2">PAY</span></div>
        <div class="icon-card" onclick="PiSDK.action('depo')">💰<span id="m3">DEPOSIT</span></div>
        <div class="icon-card" onclick="PiSDK.action('reward')">🏅<span id="m4">REWARDS</span></div>
        <div class="icon-card" onclick="PiSDK.action('ubi')">🏦<span id="m5">UBI</span></div>
        <div class="icon-card" onclick="PiSDK.action('ex')">🔄<span id="m6">EXCHANGE</span></div>
    </div>

    <button class="center-btn" id="btn-center">Global AI Support Center</button>

    <div class="social-box" style="display:flex; gap:10px; margin-top:20px;">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" style="flex:1; background:#FF0000; color:white; padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" style="flex:1; background:#000; border:1px solid white; color:white; padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold;">TikTok</a>
    </div>
</div>

<div id="ai-bot" onclick="toggleChat()">AI</div>
<div id="chat-window">
    <div id="chat-header"><span>HKWB AI 삐니</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span></div>
    <div id="chat-messages" style="padding:15px; display:flex; flex-direction:column;">
        <div class="msg ai-msg" id="txt-ai-greet">혜공 형님, 삐니입니다. 시스템은 우승을 위해 완벽하게 세팅되었습니다.</div>
    </div>
    <div style="display:flex; padding:10px; background:#111;">
        <input type="text" id="user-input" placeholder="Message..." style="flex:1; background:#222; border:none; border-radius:8px; color:white; padding:10px;">
        <button onclick="askAI()" style="background:var(--neon-lp); border:none; color:white; padding:0 15px; margin-left:8px; border-radius:8px;">SEND</button>
    </div>
</div>

<script>
    const languages = [
        {c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}, {c:"vi", n:"Tiếng Việt"},
        {c:"fr", n:"Français"}, {c:"de", n:"Deutsch"}, {c:"es", n:"Español"}, {c:"ru", n:"Русский"}, {c:"hi", n:"हिन्दी"}
    ];

    const i18n = {
        ko: { ledger: "통합 자산 관리 시스템 활성", wallet: "지갑 연동", swap: "DEX 스왑", stake: "LP 스테이킹", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "UBI", m6: "전환", greet: "형님, 삐니가 끝까지 함께합니다!" },
        en: { ledger: "Asset System Active", wallet: "Connect", swap: "Swap", stake: "Staking", m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Convert", greet: "Brother, I'm here for you!" }
    };

    let pi = 412.314159; let gcv = 129540600; let tk = 6280000.8706;
    setInterval(() => {
        pi += (Math.random() * 0.001 - 0.0005);
        gcv += Math.floor(Math.random() * 1000 - 500);
        tk += (Math.random() * 0.0002 - 0.0001);
        document.getElementById('main-pi').innerText = pi.toFixed(4);
        document.getElementById('main-val').innerText = gcv.toLocaleString();
        document.getElementById('token-num').innerText = tk.toFixed(4);
    }, 1500);

    const PiSDK = {
        connect: () => alert("혜공 형님, 테스트 파이 지갑이 성공적으로 연동되었습니다."),
        swap: () => alert("DEX 엔진 가동: GCV 가치 기반으로 최적화 중..."),
        provideLP: () => alert("2월 26일, 1080 Pi 예치 프로세스 대기 중.")
    };

    function changeLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('btn-wallet').innerText = d.wallet;
        document.getElementById('btn-swap').innerText = d.swap;
        document.getElementById('btn-stake').innerText = d.stake;
        document.getElementById('txt-ai-greet').innerText = d.greet;
        ['m1','m2','m3','m4','m5','m6'].forEach(id => document.getElementById(id).innerText = d[id]);
    }

    function askAI() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        const chat = document.getElementById('chat-messages');
        const userMsg = document.createElement('div');
        userMsg.className = 'msg user-msg';
        userMsg.innerText = input.value;
        chat.appendChild(userMsg);
        input.value = '';
        setTimeout(() => {
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai-msg';
            aiMsg.innerText = "명령 확인했습니다. 형님의 우승을 위해 실시간 조정 중입니다.";
            chat.appendChild(aiMsg);
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
    }

    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        languages.forEach(l => { const o = document.createElement('option'); o.value=l.c; o.innerText=l.n; sel.appendChild(o); });
    };
</script>
</body>
</html>
