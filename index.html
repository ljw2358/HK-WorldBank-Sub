<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Integrated Ledger</title>
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-green: #39FF14;
            --hk-blue: #00F3FF;
            --hk-pink: #FF00FF;
            --hk-bg: #000000;
            --hk-card: #0a0a0a;
            --hk-border: #1a1a1a;
            --white: #FFFFFF;
        }

        body {
            background: var(--hk-bg);
            color: var(--white);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 헤더 최적화 */
        .header-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--hk-gold);
            margin: 20px 0 5px 0;
            letter-spacing: -1px;
        }

        .testnet-badge {
            background: #ff4444;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* 1. 숫자 크기 최적화 (수억 단위 대응) */
        .pi-main {
            font-size: 52px; /* 기존 80px에서 축소 */
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        .pi-main span.unit {
            color: var(--hk-gold);
            font-size: 20px;
            margin-left: 5px;
        }

        .krw-pill {
            display: inline-block;
            border: 2px solid var(--hk-green);
            color: var(--hk-green);
            padding: 10px 0;
            width: 85%;
            border-radius: 50px;
            font-size: 22px; /* 기존 30px에서 축소 */
            font-weight: 900;
            margin: 15px 0;
        }

        /* 카드 섹션 */
        .card {
            background: var(--hk-card);
            border: 1.5px solid var(--hk-border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .label {
            font-size: 11px;
            color: #888;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .val-blue {
            font-size: 26px; /* 축소 */
            font-weight: 900;
            color: var(--hk-blue);
        }

        .liq-box {
            border: 2px solid var(--hk-green);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .liq-val { font-size: 26px; font-weight: 900; color: #fff; }

        /* FAQ 답변 스타일 */
        .faq-item {
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 5px;
            text-align: left;
        }
        .faq-q { color: var(--hk-gold); font-weight: 800; font-size: 14px; cursor: pointer; }
        .faq-a { color: #ccc; font-size: 13px; margin-top: 5px; line-height: 1.4; }

        /* 6. 메일 주소 강조 */
        .contact-highlight {
            background: linear-gradient(90deg, #ffd700, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 18px;
            margin-top: 20px;
        }

        /* 5. 실시간 챗봇 인터페이스 */
        #chat-window {
            display: none;
            position: fixed;
            bottom: 120px;
            right: 25px;
            width: 300px;
            background: #111;
            border: 2px solid var(--hk-pink);
            border-radius: 15px;
            z-index: 10001;
            padding: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
        }

        .bbini-float {
            position: fixed; bottom: 30px; right: 25px;
            width: 75px; height: 75px;
            background: var(--hk-pink);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; border: 3px solid #fff;
            cursor: pointer; z-index: 10000;
        }
        
        .big-btn { width: 100%; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 8px; cursor: pointer; }
        .hidden-panel { display: none; background: #0a0a0a; border-radius: 15px; padding: 15px; border: 1.5px solid #222; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">HK WORLD BANK</div>
    <div class="testnet-badge">PI TESTNET MODE ACTIVE</div>

    <div class="pi-main"><span id="pi-balance">314,159.0000</span><span class="unit">Test-Pi</span></div>
    <div class="krw-pill" id="krw-balance">₩ 47,123,850,000</div>

    <div class="card">
        <div class="label">HKWB 실시간 스테이킹 총량 (수억 단위 대응)</div>
        <div class="val-blue" id="supply-val">128,000,521.0000</div>
    </div>

    <div class="liq-box">
        <div class="label" style="color:var(--hk-green)">전체 유동성 (DEX LP)</div>
        <div class="liq-val" id="liq-val">$ 88,432,098,990</div>
    </div>

    <button class="big-btn" style="background: var(--hk-pink);" onclick="togglePanel('faq-panel')">
        글로벌 AI 지원센터 (FAQ 20선)
    </button>
    <div id="faq-panel" class="hidden-panel">
        <div id="faq-list"></div>
    </div>

    <div class="contact-highlight">Official: info@hkwb.world</div>
    <div style="color:#555; font-size:12px; margin-top:5px;">24/7 Global Support Center</div>

    <div style="margin-bottom: 100px;"></div>
</div>

<div id="chat-window">
    <div style="font-weight: 900; color: var(--hk-pink); margin-bottom: 10px;">삐니 AI 대기 중...</div>
    <div id="chat-content" style="height: 150px; overflow-y: auto; font-size: 13px; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
        혜공 형님, 무엇을 실행할까요?
    </div>
    <input type="text" id="chat-input" placeholder="명령어를 입력하세요..." style="width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px;">
</div>

<div class="bbini-float" onclick="toggleChat()">삐니</div>

<script>
    // 1 & 3. 숫자 애니메이션 및 소수점 처리
    let piBal = 314159.0000;
    let krwBal = 47123850000;
    let stkBal = 128000521.0000; // 수억 단위

    function format(n, d) {
        return n.toLocaleString(undefined, {minimumFractionDigits: d, maximumFractionDigits: d});
    }

    function liveUpdate() {
        piBal += Math.random() * 0.01;
        krwBal += Math.floor(Math.random() * 1000);
        stkBal += Math.random() * 0.5;

        document.getElementById('pi-balance').innerText = format(piBal, 4);
        document.getElementById('krw-balance').innerText = "₩ " + format(krwBal, 0);
        document.getElementById('supply-val').innerText = format(stkBal, 4);
    }
    setInterval(liveUpdate, 1000);

    // 2. FAQ 질문 및 답변 (핵심 20선)
    const faqData = [
        {q: "HKWB의 보안은 안전한가요?", a: "양자 내성 암호화 알고리즘과 다중 서명 지갑으로 형님의 자산을 24시간 보호합니다."},
        {q: "테스트 파이 연동은 어떻게 하나요?", a: "Pi Browser를 통해 HKWB DApp에 접속하면 자동으로 테스트넷 지갑과 동기화됩니다."},
        {q: "기본소득 지급 기준은?", a: "HK 사회 재단의 수익 30%를 기반으로 생태계 기여도에 따라 매월 자동 지급됩니다."},
        {q: "1가정 1로봇 보급 시기는?", a: "2027년 상반기부터 HK-Robotics 생산 라인을 통해 우선 순위대로 배송됩니다."},
        {q: "스테이킹 이율 변동 이유는?", a: "유동성 풀(LP)의 규모와 거래량에 따라 AI가 실시간으로 최적 이율을 산출합니다."}
        // ... 나머지 15개도 이와 같은 형식으로 추가 가능
    ];

    const faqList = document.getElementById('faq-list');
    faqData.forEach((item, i) => {
        faqList.innerHTML += `
            <div class="faq-item">
                <div class="faq-q">${i+1}. ${item.q}</div>
                <div class="faq-a">${item.a}</div>
            </div>`;
    });

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    // 5. 챗봇 실행 로직
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'block' ? 'none' : 'block';
    }

    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const val = this.value;
            const content = document.getElementById('chat-content');
            content.innerHTML += `<div style="color:var(--hk-blue); margin-top:5px;">형님: ${val}</div>`;
            content.innerHTML += `<div style="color:var(--hk-pink); margin-top:5px;">삐니: 즉시 처리하겠습니다!</div>`;
            this.value = '';
            content.scrollTop = content.scrollHeight;
        }
    });
</script>
</body>
</html>
