<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | Global Robotics & Finance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #f1c40f; 
            --green: #00ff88; 
            --bg: #000; 
            --card: #121212; 
            --border: #222;
            --accent: #00d4ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; line-height: 1.6; }
       
        /* 상단 네비게이션 */
        .header-nav { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); 
            z-index: 10000; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); 
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
        #langSelect { 
            background: #1a1a1a; color: var(--gold); border: 2px solid var(--gold); 
            padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; 
            outline: none; cursor: pointer; 
        }

        .container { max-width: 500px; margin: 0 auto; padding: 100px 20px 50px; }
       
        /* 프리미엄 자산 카드 */
        .main-card { 
            background: linear-gradient(165deg, #1e1e1e 0%, #080808 100%); 
            border-radius: 35px; padding: 40px 30px; border: 1px solid #333; 
            text-align: center; margin-bottom: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            position: relative; overflow: hidden;
        }
        .main-card::after {
            content: ''; position: absolute; top: -10%; right: -10%; 
            width: 150px; height: 150px; background: radial-gradient(circle, rgba(241,196,15,0.1) 0%, transparent 70%);
        }
        
        #ledger { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        .balance-val { font-size: 50px; font-weight: 900; margin-bottom: 5px; color: #fff; letter-spacing: -2px; }
        .gcv-badge { 
            color: var(--green); border: 1.5px solid var(--green); 
            padding: 6px 20px; border-radius: 30px; font-size: 13px; 
            display: inline-block; margin-bottom: 25px; font-weight: 900; 
            background: rgba(0,255,136,0.05); 
        }
       
        .rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .rate-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .rate-item span { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        .rate-item strong { font-size: 22px; color: #fff; font-weight: 900; }

        .total-lp { 
            background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0,212,255,0.3); 
            border-radius: 25px; padding: 25px; 
        }
        #tvl_label { font-size: 11px; color: var(--accent); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .lp-val { font-size: 26px; font-weight: 900; color: #fff; }
       
        /* 액션 버튼 그리드 */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 30px 0; }
        .btn-main { 
            padding: 20px 0; border-radius: 20px; font-weight: 900; font-size: 13px; 
            border: none; cursor: pointer; transition: 0.2s; 
        }
        .btn-main:active { transform: scale(0.95); }
        .bg-white { background: #fff; color: #000; }
        .bg-gold { background: var(--gold); color: #000; }
        .bg-green { background: #1db954; color: #fff; }

        /* 서비스 메뉴 */
        .service-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .service-box { 
            background: var(--card); padding: 25px 10px; border-radius: 28px; 
            text-align: center; border: 1px solid var(--border); transition: 0.3s;
        }
        .service-box i { font-size: 28px; color: var(--gold); margin-bottom: 12px; display: block; }
        .service-box span { font-size: 12px; font-weight: 800; color: #bbb; }

        /* 보안 정보 */
        .security-info { 
            background: #080808; border: 1px dashed #444; border-radius: 25px; 
            padding: 25px; margin: 30px 0; text-align: left;
        }
        .security-info h4 { color: var(--accent); font-size: 16px; margin-bottom: 15px; }
        .security-info p { font-size: 13px; color: #777; margin-bottom: 8px; font-weight: 600; }

        /* 메인 버튼 */
        .btn-global-cs { 
            background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; 
            width: 100%; padding: 22px; border-radius: 22px; font-weight: 900; 
            border: none; font-size: 16px; margin-bottom: 25px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,71,87,0.3);
        }
    </style>
</head>

    function applyTranslation() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n['ko'];
        
        // 데이터 누락(undefined) 방지를 위한 매핑
        const mapping = {
            'ledger': d.ledger, 'stk_label': d.stk, 'lp_label': d.lp, 'tvl_label': d.tvl,
            'b1': d.b1, 'b2': d.b2, 'b3': d.b3,
            'm1': d.m1, 'm2': d.m2, 'm3': d.m3, 'm4': d.m4, 'm5': d.m5, 'm6': d.m6,
            'shield_t': d.shield, 's1': d.s1, 's2': d.s2, 's3': d.s3, 'cs_btn': d.cs
        };

        for (const [id, text] of Object.entries(mapping)) {
            const el = document.getElementById(id);
            if (el) el.innerText = text;
        }
    }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        sel.innerHTML = '';
        Object.keys(i18n).forEach(code => {
            const opt = document.createElement('option');
            opt.value = code;
            opt.innerText = i18n[code].name;
            sel.appendChild(opt);
        });
        
        applyTranslation();
        
        // Pi SDK 초기화 (샌드박스 모드 우선 활성화)
        try {
            Pi.init({ version: "2.0", sandbox: true });
        } catch(e) { console.log("Standard Browser Mode"); }
    };
