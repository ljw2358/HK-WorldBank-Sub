    function applyTranslation() {
        const select = document.getElementById('langSelect');
        if (!select) return;
        const lang = select.value;
        const d = i18n[lang];
        const en = i18n['en'];
        if (!d) return;

        // 1. 핵심 UI 요소 업데이트 (undefined 방지 3중 락)
        const targets = {
            'ledger': d.ledger || en.ledger,
            'stk_label': d.stk || en.stk,
            'lp_label': d.lp || en.lp,      
            'tvl_label': d.tvl || en.tvl,
            'b1': d.b1 || en.b1,
            'b2': d.b2 || en.b2,            
            'b3': d.b3 || en.b3,
            'm1': d.m1 || en.m1, 'm2': d.m2 || en.m2, 'm3': d.m3 || en.m3,
            'm4': d.m4 || en.m4, 'm5': d.m5 || en.m5, 'm6': d.m6 || en.m6,
            'shield_t': d.shield || en.shield,
            's1': d.s1 || en.s1, 's2': d.s2 || en.s2, 's3': d.s3 || en.s3
        };

        Object.keys(targets).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerText = targets[id];
        });

        // 2. 고객지원센터 (형님의 명령: 가동 제외 30개국어 성역화)
        const csBtn = document.getElementById('cs_btn');
        if (csBtn) {
            // 한국어만 '가동'을 붙여 형님의 강력한 서비스 의지 표명
            csBtn.innerText = (lang === 'ko') ? finalCSMap[lang] + " 가동" : finalCSMap[lang] || finalCSMap['en'];
        }
    }

    // [시스템 가동 엔진] 초기화 및 자동 연동
    const selectBox = document.getElementById('langSelect');
    if (selectBox) {
        selectBox.innerHTML = '';
        Object.keys(i18n).forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.innerText = i18n[l].name || l.toUpperCase();
            selectBox.appendChild(opt);
        });
        selectBox.onchange = applyTranslation;
       
        // 무조건적인 가동 보장 (실전용 3중 실행)
        applyTranslation();
        setTimeout(applyTranslation, 100);
        window.onload = applyTranslation;
    }
