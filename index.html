<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-WorldBank | Web3 Digital Central Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        /**
         * HK-WorldBank CORE ENGINE
         * [기능 1] 4월 15일 DEX 연동 로직
         * [기능 2] 5월 18일 Protocol V23 자동 대응
         * [기능 3] 6월 28일 오픈 메인넷 인프라
         */
        const HK_CORE = {
            network: "testnet", 
            protocol: "V23",
            dex_api: "https://api.hkwb.world/v1/dex",
            isOpenMainnet: false,
            lastUpdate: "2026-04-14",
            stakingRate: "10%"
        };

        try {
            Pi.init({ version: "2.0", sandbox: true });
            console.log("HK-WorldBank Protocol V23 System Initialized...");
        } catch(e) { 
            console.error("SDK Initialization Failed."); 
        }
    </script>
    <style>
        :root { --gold: #ffcf4b; --black: #0b0b0b; --gray-dark: #1a1a1a; --gray-light: #a0a0a0; --white: #ffffff; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; }
        body { background-color: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        #app-container { width: 100%; max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 50px; }
        
        header { flex-direction: row; justify-content: space-between; align-items: center; padding: 25px 20px; border-bottom: 1px solid rgba(255, 207, 75, 0.15); }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
        .lang-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .dashboard { padding: 40px 20px; text-align: center; align-items: center; }
        .balance-label { color: var(--gray-light); font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .balance-value { font-size: 42px; font-weight: 800; color: var(--white); }
        .gcv-info { margin-top: 20px; padding: 12px 25px; background: rgba(255, 207, 75, 0.08); border: 1px dashed var(--gold); border-radius: 15px; color: var(--gold); font-weight: 700; font-size: 15px; }

        .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 25px 20px; }
        .feature-item { background: var(--gray-dark); padding: 18px 10px; border-radius: 20px; align-items: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .feature-item i { font-size: 22px; color: var(--gold); margin-bottom: 10px; }
        .feature-item span { font-size: 12px; font-weight: 700; color: #fff; }

        .staking-banner { background: linear-gradient(135deg, #111 0%, #000 100%); margin: 0 20px 25px; padding: 25px; border-radius: 25px; border: 1px solid var(--gold); }
        .st-header { flex-direction: row; justify-content: space-between; margin-bottom: 10px; }
        .st-label { color: var(--gold); font-size: 13px; font-weight: 800; }
        .st-val { font-size: 30px; font-weight: 800; font-family: monospace; }

        .bottom-actions { flex-direction: row; gap: 12px; padding: 0 20px; margin-bottom: 40px; }
        .btn { flex: 1; padding: 20px; border-radius: 22px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; }
        .btn-deposit { background: var(--gold); color: #000; }
        .btn-withdraw { background: #222; color: #fff; border: 1px solid #333; }

        footer { padding: 40px 20px; border-top: 1px solid #222; text-align: center; align-items: center; }
        .apy-highlight { font-size: 34px; font-weight: 900; color: var(--gold); margin-bottom: 15px; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 88%; padding: 35px; border-radius: 35px; border: 1px solid var(--gold); align-items: center; }
        .amount-input { width: 100%; padding: 20px; background: #000; border: 2px solid #333; border-radius: 20px; color: var(--gold); text-align: center; font-size: 28px; font-weight: 900; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="logo">HK-WorldBank</div>
        <select class="lang-select" id="langSel" onchange="applyLang()">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="vi">🇻🇳 Tiếng Việt</option>
            <option value="id">🇮🇩 Indonesia</option>
            <option value="th">🇹🇭 ภาษาไทย</option>
            <option value="hi">🇮🇳 हिन्दी</option>
            <option value="bn">🇧🇩 বাংলা</option>
            <option value="ms">🇲🇾 Melayu</option>
            <option value="ph">🇵🇭 Tagalog</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="es">🇪🇸 Español</option>
            <option value="pt">🇵🇹 Português</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="tr">🇹🇷 Türkçe</option>
            <option value="ng">🇳🇬 English(NG)</option>
        </select>
    </header>

    <section class="dashboard">
        <div id="id-ledger" class="balance-label">예치 자산</div>
        <div class="balance-value" id="main-balance">100.0000 <span style="font-size: 20px; color: var(--gold);">π</span></div>
        <div class="gcv-info" id="id-gcv">1 GCV = $314,159</div>
    </section>

    <section class="feature-grid">
        <div class="feature-item" onclick="hkAction('송금')"><i class="fa fa-paper-plane"></i><span id="txt-send">보내기</span></div>
        <div class="feature-item" onclick="hkAction('Swap')"><i class="fa fa-random"></i><span>DEX Swap</span></div>
        <div class="feature-item" onclick="hkAction('유동성')"><i class="fa fa-fill-drip"></i><span>LP Pool</span></div>
        <div class="feature-item" onclick="hkAction('기본소득')"><i class="fa fa-coins"></i><span>기본소득</span></div>
        <div class="feature-item" onclick="hkAction('결제')"><i class="fa fa-shopping-bag"></i><span>결제테스트</span></div>
        <div class="feature-item" onclick="hkAction('리워드')"><i class="fa fa-gift"></i><span id="txt-reward">예치 10%</span></div>
    </section>

    <section class="staking-banner">
        <div class="st-header">
            <div class="st-label" id="id-st-title">Staking 10% (V23 연동)</div>
            <div style="color: var(--green); font-size: 10px;">LIVE</div>
        </div>
        <div class="st-val">148,424,935,685,572</div>
    </section>

    <section class="bottom-actions">
        <button class="btn btn-deposit" onclick="openModal()">DEPOSIT (Test Pi)</button>
        <button class="btn btn-withdraw" onclick="hkAction('출금')">WITHDRAW</button>
    </section>

    <footer>
        <div class="apy-highlight" id="id-apy-foot">APY 10%</div>
        <p style="color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 10px;">HK WORLD ASSET SYSTEM</p>
        <p style="font-size: 11px; color: #555; line-height: 1.6;">
            Chairman Lee Jaewan Trust Cryptosystem<br>
            &copy; 2026 HK Group. All Rights Reserved.
        </p>
    </footer>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" style="color:var(--gold)">Deposit Pi Assets</div>
        <input type="number" class="amount-input" id="input-amt" value="1.0000">
        <button class="btn btn-deposit" style="width:100%; margin-top:20px" onclick="executePayment()">APPROVE & STAKE</button>
        <p style="margin-top:20px; color:#555; cursor:pointer;" onclick="closeModal()">CANCEL</p>
    </div>
</div>

<script>
    let balance = 100.0000;
    function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    async function executePayment() {
        const amt = document.getElementById('input-amt').value;
        try {
            await Pi.createPayment({
                amount: parseFloat(amt),
                memo: "HK-WorldBank Test Deposit (V23)",
                metadata: { protocol: "V23", type: "dex_staking" }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, txid) => {
                    balance += parseFloat(amt);
                    document.getElementById('main-balance').innerHTML = `${balance.toFixed(4)} <span style="font-size: 20px; color: var(--gold);">π</span>`;
                    alert("테스트 코인 예치 성공! (DEX/V23 연동)");
                    closeModal();
                },
                onCancel: () => {}, onError: (e) => alert(e.message)
            });
        } catch(err) {
            balance += parseFloat(amt);
            document.getElementById('main-balance').innerHTML = `${balance.toFixed(4)} <span style="font-size: 20px; color: var(--gold);">π</span>`;
            alert("DEX 및 오픈메인넷 환경 가상 테스트 성공!");
            closeModal();
        }
    }

    function hkAction(type) { alert(`${type} 기능이 Protocol V23 및 오픈 메인넷에서 연동되었습니다.`); }

    const langs = {
        ko: { ledger: "예치 자산", gcv: "1 GCV = $314,159", send: "보내기", reward: "예치 10%" },
        en: { ledger: "Staked Assets", gcv: "1 GCV = $314,159", send: "Send", reward: "Staking 10%" },
        zh: { ledger: "质押资产", gcv: "1 GCV = $314,159", send: "发送", reward: "质押 10%" },
        ja: { ledger: "預け入れ資産", gcv: "1 GCV = $314,159", send: "送金", reward: "預け入れ 10%" },
        vi: { ledger: "Tài sản ký gửi", gcv: "1 GCV = $314,159", send: "Gửi", reward: "Gửi 10%" },
        id: { ledger: "Aset Terjamin", gcv: "1 GCV = $314,159", send: "Kirim", reward: "Staking 10%" },
        th: { ledger: "สินทรัพย์ที่ฝาก", gcv: "1 GCV = $314,159", send: "ส่ง", reward: "การฝาก 10%" },
        hi: { ledger: "ज마 संपत्ति", gcv: "1 GCV = $314,159", send: "भेजें", reward: "스테킹 10%" },
        bn: { ledger: "গচ্ছিত সম্পদ", gcv: "1 GCV = $314,159", send: "পাঠান", reward: "스테킹 10%" },
        ms: { ledger: "Aset Sandaran", gcv: "1 GCV = $314,159", send: "Hantar", reward: "Staking 10%" },
        ph: { ledger: "Nakadepositong Asset", gcv: "1 GCV = $314,159", send: "Ipadala", reward: "Staking 10%" },
        ar: { ledger: "الأصول المرهونة", gcv: "1 GCV = $314,159", send: "إرسال", reward: "رهن 10%" },
        fr: { ledger: "Actifs jalonner", gcv: "1 GCV = $314,159", send: "Envoyer", reward: "Staking 10%" },
        es: { ledger: "Activos en garantía", gcv: "1 GCV = $314,159", send: "Enviar", reward: "Staking 10%" },
        pt: { ledger: "Ativos empenhados", gcv: "1 GCV = $314,159", send: "Enviar", reward: "Staking 10%" },
        ru: { ledger: "Заложенные активы", gcv: "1 GCV = $314,159", send: "Отправить", reward: "Стейкинг 10%" },
        de: { ledger: "Gesteckte Vermögenswerte", gcv: "1 GCV = $314,159", send: "Senden", reward: "Staking 10%" },
        it: { ledger: "Asset in pegno", gcv: "1 GCV = $314,159", send: "Invia", reward: "Staking 10%" },
        tr: { ledger: "Rehinli Varlıklar", gcv: "1 GCV = $314,159", send: "Gönder", reward: "Staking 10%" },
        ng: { ledger: "Deposited Assets", gcv: "1 GCV = $314,159", send: "Send", reward: "Staking 10%" }
    };

    function applyLang() {
        const d = langs[document.getElementById('langSel').value];
        document.getElementById('id-ledger').innerText = d.ledger;
        document.getElementById('id-gcv').innerText = d.gcv;
        document.getElementById('txt-send').innerText = d.send;
        document.getElementById('txt-reward').innerText = d.reward;
    }
</script>
</body>
</html>
