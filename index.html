<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - Global 50 Mastery</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }

        /* [1] 상단 바 & 언어 선택 */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; gap: 10px; }
        #langSelect { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 6px; border-radius: 8px; font-weight: 900; }
        .node-tag { color: var(--gold); font-weight: 900; font-size: 0.8rem; margin-right: auto; }

        /* [2] 헤더 & 메인 디스플레이 */
        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        .sub-title { color: var(--neon-st); font-weight: bold; margin-top: 5px; }
        .pi-display { font-size: 3rem; font-weight: 900; margin: 15px 0; }
        .gcv-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1.5px solid var(--neon-green); border-radius: 50px; font-weight: 900; }

        /* [3] 데이터 카드 */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .val-blue { color: var(--neon-blue); font-size: 1.8rem; font-weight: 900; }
        .stat-row { display: flex; gap: 10px; }
        .stat-card { flex: 1; border: 1px solid #444; border-radius: 15px; padding: 12px; }

        /* [4] FAQ & 버튼 */
        .center-btn { width: 100%; background: #ff4d6d; color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; margin: 20px 0; }
        .faq-box { display: none; background: #0a0a0a; border: 1px solid #444; border-radius: 15px; padding: 15px; max-height: 400px; overflow-y: auto; text-align: left; }
        .faq-q { color: var(--gold); font-weight: 900; margin-top: 10px; border-left: 3px solid var(--gold); padding-left: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        /* [5] SNS & 푸터 */
        .sns-row { display: flex; gap: 10px; margin: 20px 0; }
        .sns-btn { flex: 1; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; color: white; font-weight: 900; }
        footer { text-align: center; padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid #222; }

        /* [6] 삐니 챗봇 */
        #bpini-trigger { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 15px var(--neon-lp); cursor: pointer; z-index: 1000; }
        #chat-window { display: none; position: fixed; bottom: 100px; right: 20px; width: 300px; height: 400px; background: #000; border: 2px solid var(--neon-lp); border-radius: 20px; flex-direction: column; z-index: 1001; }
        .chat-h { background: var(--neon-lp); padding: 10px; font-weight: 900; display: flex; justify-content: space-between; }
        .chat-b { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; }
        .ai { background: #222; align-self: flex-start; border-left: 3px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; }
        .chat-i { display: flex; padding: 10px; background: #111; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="node-tag">ACTIVE NODES [2/2]</div>
        <select id="langSelect" onchange="applyGlobalSync()"></select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div class="sub-title" id="t-sub">Asset Management System</div>
        <div class="pi-display"><span id="l-pi">412.3149</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-box">$ <span id="l-gcv">129,541,312</span> (GCV)</div>
    </header>

    <div class="card">
        <div id="t-supply-lab" style="font-size:0.7rem; color:#888; font-weight:bold;">REAL-TIME SUPPLY</div>
        <div class="val-blue" id="l-supply">6280000.5042</div>
    </div>

    <div class="stat-row">
        <div class="stat-card"><div id="t-st" style="color:var(--neon-st)">Staking</div><div style="font-weight:900;">17.75%</div></div>
        <div class="stat-card"><div id="t-lp" style="color:var(--neon-lp)">LP Yield</div><div style="font-weight:900;">28.80%</div></div>
    </div>

    <button class="center-btn" id="t-btn-center" onclick="toggleFaq()">Global AI Support</button>
    <div class="faq-box" id="faq-box"></div>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-btn" style="background:#f00;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn" style="background:#000; border:1px solid #fff;">TikTok</a>
    </div>

    <footer>
        <p>© 2026 HK WORLD BANK FOUNDATION<br>MASTER: HYEKONG HYUNG-NIM</p>
    </footer>
</div>

<div id="bpini-trigger" onclick="toggleChat()">삐니</div>
<div id="chat-window">
    <div class="chat-h"><span id="t-chat-title">AI BPINI</span><span onclick="toggleChat()" style="cursor:pointer;">✕</span></div>
    <div class="chat-b" id="chat-box"></div>
    <div class="chat-i"><input type="text" id="chat-input" onkeypress="if(event.key==='Enter') askAI()"></div>
</div>

<script>
    const languages = [
        {c:"ko", n:"한국어"}, {c:"en", n:"English"}, {c:"zh", n:"中文"}, {c:"ja", n:"日本語"}, {c:"vi", n:"Tiếng Việt"},
        {c:"es", n:"Español"}, {c:"fr", n:"Français"}, {c:"de", n:"Deutsch"}, {c:"pt", n:"Português"}, {c:"ru", n:"Русский"},
        {c:"hi", n:"हिन्दी"}, {c:"ar", n:"العربية"}, {c:"id", n:"Indonesia"}, {c:"th", n:"ไทย"}, {c:"tr", n:"Türkçe"},
        {c:"it", n:"Italiano"}, {c:"nl", n:"Nederlands"}, {c:"pl", n:"Polski"}, {c:"sv", n:"Svenska"}, {c:"fil", n:"Filipino"},
        {c:"ms", n:"Bahasa Melayu"}, {c:"fa", n:"فارسی"}, {c:"bn", n:"বাংলা"}, {c:"pa", n:"ਪੰਜਾਬੀ"}, {c:"te", n:"తెలుగు"},
        {c:"mr", n:"मराठी"}, {c:"ta", n:"தமிழ்"}, {c:"ur", n:"اردو"}, {c:"gu", n:"ગુજરાતી"}, {c:"kn", n:"ಕನ್ನಡ"},
        {c:"ml", n:"മലയാളം"}, {c:"uk", n:"Українська"}, {c:"ro", n:"Română"}, {c:"hu", n:"Magyar"}, {c:"el", n:"Ελληνικά"},
        {c:"cs", n:"Čeština"}, {c:"he", n:"עברית"}, {c:"da", n:"Dansk"}, {c:"fi", n:"Suomi"}, {c:"no", n:"Norsk"},
        {c:"sk", n:"Slovenčina"}, {c:"bg", n:"Български"}, {c:"hr", n:"Hrvatski"}, {c:"sr", n:"Српски"}, {c:"sl", n:"Slovenščina"},
        {c:"et", n:"Eesti"}, {c:"lv", n:"Latviešu"}, {c:"lt", n:"Lietuvių"}, {c:"sw", n:"Kiswahili"}, {c:"am", n:"አማርኛ"}
    ];

    const faqKeys = ["Core Vision", "Liquidity", "Mainnet", "Node", "Supply", "UBI", "KYB", "DEX", "Yield", "Global", "Asset", "Token", "Contract", "Scaling", "AI Center", "SDK", "Privacy", "Latency", "Growth", "Authority"];

    const i18n = {
        ko: { sub: "통합 자산 관리 시스템", supply: "HKWB TOKEN 실시간 공급량", st: "스테이킹", lp: "LP 수익률", center: "글로벌 AI 지원센터", chat: "삐니 AI 매니저", greet: "반갑습니다 고객님! 삐니가 글로벌 동기화를 마쳤습니다. 무엇을 도와드릴까요?", win: "고객님, 우리의 우승은 확정적입니다!", sync: "데이터 동기화 완료." },
        en: { sub: "Integrated Asset System", supply: "HKWB TOKEN REAL-TIME SUPPLY", st: "Staking", lp: "LP Yield", center: "Global AI Center", chat: "BPINI AI Manager", greet: "Welcome customer! Bpini has completed global sync. How can I help you?", win: "Customer, our victory is certain!", sync: "Data sync complete." },
        // 타 언어는 시뮬레이션 엔진에서 en 기반으로 자동 생성됨
    };

    function applyGlobalSync() {
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;
        
        document.getElementById('t-sub').innerText = d.sub;
        document.getElementById('t-supply-lab').innerText = d.supply;
        document.getElementById('t-st').innerText = d.st;
        document.getElementById('t-lp').innerText = d.lp;
        document.getElementById('t-btn-center').innerText = d.center;
        document.getElementById('t-chat-title').innerText = d.chat;
        
        const fBox = document.getElementById('faq-box');
        fBox.innerHTML = faqKeys.map((k, i) => `<div class="faq-q">${i+1}. [${l.toUpperCase()}] ${k}?</div><div class="faq-a">The system protocol for ${k} is fully optimized for 2026.</div>`).join('');
        
        document.getElementById('chat-box').innerHTML = `<div class="msg ai">${d.greet}</div>`;
    }

    function askAI() {
        const i = document.getElementById('chat-input');
        const b = document.getElementById('chat-box');
        if(!i.value.trim()) return;
        const l = document.getElementById('langSelect').value;
        const d = i18n[l] || i18n.en;

        b.innerHTML += `<div class="msg user">${i.value}</div>`;
        const v = i.value; i.value = '';

        setTimeout(() => {
            let r = d.sync;
            if(v.includes("우승") || v.toLowerCase().includes("win")) r = d.win;
            b.innerHTML += `<div class="msg ai">${r}</div>`;
            b.scrollTop = b.scrollHeight;
        }, 600);
    }

    function startEngine() {
        let p = 412.3149; let s = 6280000.5042;
        setInterval(() => {
            p += (Math.random()*0.0001); s += (Math.random()*0.0001);
            document.getElementById('l-pi').innerText = p.toFixed(4);
            document.getElementById('l-supply').innerText = s.toFixed(4);
        }, 1000);
    }

    function toggleFaq() { const f = document.getElementById('faq-box'); f.style.display = (f.style.display==='block')?'none':'block'; }
    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        languages.forEach(l => { const o = document.createElement('option'); o.value=l.c; o.innerText=l.n; sel.appendChild(o); });
        applyGlobalSync();
        startEngine();
    };
</script>
</body>
</html>
