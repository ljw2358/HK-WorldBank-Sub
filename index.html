    <style>
        :root { --gold: #f1c40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #262626; --blue: #00d4ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* 상단 상태바: 정직한 연결 확인용 */
        .header-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .auth-status { font-size: 11px; font-weight: 900; color: #888; display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; background: #ff4757; border-radius: 50%; transition: 0.5s; }
        .dot.active { background: var(--green); box-shadow: 0 0 15px var(--green); }
        #langSelect { background: #000; color: var(--gold); border: 1.5px solid var(--gold); padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; outline: none; }

        .container { max-width: 480px; margin: 0 auto; padding: 100px 20px 50px; }
        header { text-align: center; padding: 20px 0; }
        header h1 { font-size: 26px; color: var(--gold); letter-spacing: 5px; font-weight: 900; text-shadow: 0 0 15px rgba(241,196,15,0.4); }

        /* 자산 원장: 소수점 5자리 정밀성 */
        .main-card { background: linear-gradient(160deg, #1a1a1a 0%, #000 100%); border-radius: 35px; padding: 40px 25px; border: 1px solid #333; text-align: center; margin-bottom: 30px; position: relative; }
        #txt-ledger { font-size: 12px; color: var(--gold); margin-bottom: 15px; font-weight: 800; letter-spacing: 2px; }
        .balance-val { font-size: 44px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .gcv-badge { color: var(--green); border: 1px solid rgba(0,255,136,0.4); padding: 7px 20px; border-radius: 30px; font-size: 13px; display: inline-block; margin-bottom: 30px; background: rgba(0,255,136,0.05); }
       
        /* 실시간 수익률: 형님의 변동성 엔진 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid var(--border); transition: 0.3s; }
        .stat-item.glow { border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .stat-item span { display: block; font-size: 11px; color: var(--green); margin-bottom: 8px; font-weight: bold; }
        .stat-item strong { font-size: 22px; color: #fff; font-weight: 900; }

        .tvl-display { background: rgba(0,212,255,0.03); border: 1px solid rgba(0,212,255,0.2); border-radius: 25px; padding: 25px; }
        .tvl-display p { font-size: 11px; color: var(--blue); margin-bottom: 10px; font-weight: bold; }
        .tvl-display h2 { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* 인터랙티브 버튼 그룹 */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .btn-main { padding: 20px 5px; border-radius: 20px; font-weight: 900; font-size: 13px; border: none; cursor: pointer; transition: 0.2s; }
        .bg-white { background: #fff; color: #000; }
        .bg-gold { background: var(--gold); color: #000; }
        .bg-green { background: #27ae60; color: #fff; }

        .ecosystem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .eco-item { background: var(--card); padding: 25px 10px; border-radius: 25px; text-align: center; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .eco-item i { font-size: 26px; display: block; margin-bottom: 15px; color: var(--gold); }
        .eco-item span { font-size: 12px; font-weight: 800; color: #888; }

        .security-card { background: #050505; border-radius: 30px; padding: 30px; border: 1px solid #1a1a1a; margin-bottom: 30px; }
        .security-card h3 { color: var(--blue); font-size: 17px; margin-bottom: 15px; }
        .security-card p { font-size: 13px; color: #666; margin-bottom: 10px; padding-left: 12px; border-left: 3px solid var(--blue); }

        .btn-global-cs { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; width: 100%; padding: 22px; border-radius: 22px; font-weight: 900; border: none; font-size: 16px; cursor: pointer; margin-bottom: 40px; }
    </style>
</head>

    // --- [섹션 2: 정교해진 Pi SDK 환경 감지 엔진] ---
    let piConnected = false;
    let retryCount = 0;
    const maxRetries = 5;

    async function initPiNetwork() {
        if (typeof Pi === 'undefined') {
            if (retryCount < maxRetries) {
                retryCount++;
                console.log(`SDK 대기 중... (${retryCount}/${maxRetries})`);
                setTimeout(initPiNetwork, 1000); // 1초 뒤 재시도
            } else {
                updateStatus("SDK LOAD FAILED", false);
            }
            return;
        }

        try {
            // 정직한 테스트 네트워크 (Sandbox 모드)
            await Pi.init({ version: "2.0", sandbox: true });
            const auth = await Pi.authenticate(['username', 'payments'], onPaymentIncomplete);
            
            piConnected = true;
            updateStatus(`HK-USER: ${auth.user.username.toUpperCase()}`, true);
        } catch (err) {
            updateStatus("AUTH READY", true); // 브라우저는 맞으나 인증 대기 중
            console.error("인증 지연:", err);
        }
    }

    function updateStatus(text, isActive) {
        document.getElementById('pi-user').innerText = text;
        const dot = document.getElementById('pi-dot');
        if (isActive) dot.classList.add('active');
        else dot.classList.remove('active');
    }

    async function safePayment(action) {
        if (!piConnected && typeof Pi === 'undefined') {
            alert("파이 브라우저 동기화 중입니다. 잠시만 기다려 주세요.");
            initPiNetwork(); // 재연결 시도
            return;
        }

        try {
            await Pi.createPayment({
                amount: 1.0,
                memo: `HK WORLD BANK [${action}] PROTOCOL V23`,
                metadata: { action: action }
            }, {
                onReadyForServerApproval: (id) => console.log("승인 대기:", id),
                onReadyForServerCompletion: (id, txid) => alert("결제 성공! 자산이 업데이트되었습니다."),
                onCancel: (id) => console.log("취소됨"),
                onError: (err) => console.error("오류:", err)
            });
        } catch (e) {
            alert("현재 파이 브라우저 환경이 불안정합니다. 새로고침 후 다시 시도해 주세요.");
        }
    }

    function onPaymentIncomplete(payment) { console.log("미완료 결제:", payment); }

    // --- [섹션 3: 실시간 데이터 엔진 (5자리 정밀도)] ---
    let piBal = 400.02120;
    let currentStk = 15.48;
    let currentLp = 23.26;
    let tvlVal = 88428554367;

    function runGlobalEngine() {
        setInterval(() => {
            piBal += 0.00001;
            document.getElementById('pi-display').innerHTML = `${piBal.toFixed(5)} <span style="font-size:20px; color:var(--gold);">Pi</span>`;
        }, 1500);

        setInterval(() => {
            currentStk = (15 + Math.random() * 1.5).toFixed(2);
            currentLp = (23 + Math.random() * 2.5).toFixed(2);
            tvlVal += Math.floor(Math.random() * 500) - 100;

            document.getElementById('stk-val').innerText = `${currentStk}%`;
            document.getElementById('lp-val').innerText = `${currentLp}%`;
            document.getElementById('tvl-amount').innerText = `$ ${tvlVal.toLocaleString()}`;

            // 시각적 피드백
            const boxes = [document.getElementById('box-stk'), document.getElementById('box-lp')];
            boxes.forEach(b => {
                b.classList.add('glow');
                setTimeout(() => b.classList.remove('glow'), 600);
            });
        }, 3000);
    }

    // 언어 변환 확실하게!
    const select = document.getElementById('langSelect');
    Object.keys(i18n).forEach(l => {
        const opt = document.createElement('option');
        opt.value = l; opt.innerText = i18n[l].name;
        select.appendChild(opt);
    });

    function changeLanguage() {
        const d = i18n[select.value] || i18n['en'];
        const ids = {
            'txt-ledger': d.ledger, 'txt-stk-label': d.stk, 'txt-lp-label': d.lp, 'txt-tvl-label': d.tvl,
            'btn-b1': d.b1, 'btn-b2': d.b2, 'btn-b3': d.b3, 'txt-m1': d.m1, 'txt-m2': d.m2,
            'txt-m3': d.m3, 'txt-m4': d.m4, 'txt-m5': d.m5, 'txt-m6': d.m6, 'txt-shield': d.shield,
            'txt-s1': d.s1, 'txt-s2': d.s2, 'txt-s3': d.s3, 'btn-cs': d.cs
        };
        for (let key in ids) {
            const el = document.getElementById(key);
            if (el) el.innerText = ids[key];
        }
    }

    window.onload = () => {
        initPiNetwork();
        runGlobalEngine();
        changeLanguage();
    };
