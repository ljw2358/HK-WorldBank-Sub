<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - GLOBAL MASTER v2.5</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; position: relative; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; width: 100%; }
        #langSelect { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        .sub-title { font-weight: bold; margin-top: 5px; font-size: 0.95rem; color: var(--neon-st); }
        .pi-display { font-size: 3.2rem; font-weight: 900; margin: 15px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .gcv-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 30px; border: 2px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: 900; font-size: 1.3rem; }
        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .label { font-size: 0.7rem; color: #aaa; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .val-blue { color: var(--neon-blue); font-weight: 900; font-size: 1.7rem; font-variant-numeric: tabular-nums; }
        .val-st { color: var(--neon-st); font-weight: 900; font-size: 1.4rem; }
        .val-lp { color: var(--neon-lp); font-weight: 900; font-size: 1.4rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 0.85rem; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .icon-item { background: var(--card); padding: 20px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .center-btn { width: 100%; background: #ff4d6d; color: white; padding: 20px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .faq-box { display: none; background: #080808; border: 1px solid #444; border-radius: 0 0 15px 15px; padding: 20px; max-height: 300px; overflow-y: auto; }
        .faq-q { color: var(--gold); font-weight: 900; margin-top: 15px; font-size: 0.9rem; }
        .faq-a { color: #bbb; font-size: 0.8rem; margin-top: 5px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #bpini-trigger { position: fixed; bottom: 30px; right: 20px; width: 70px; height: 70px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 999; color: white; border: 2px solid white; }
        #chat-window { display: none; position: fixed; bottom: 110px; right: 20px; width: 320px; height: 450px; background: #000; border: 2px solid var(--neon-lp); border-radius: 20px; flex-direction: column; overflow: hidden; z-index: 1000; }
        .chat-h { background: var(--neon-lp); padding: 15px; font-weight: 900; display: flex; justify-content: space-between; }
        .chat-b { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.85rem; }
        .ai { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--neon-lp); }
        .user { background: var(--neon-blue); align-self: flex-end; }
        .chat-i { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        footer { text-align: center; padding: 30px; color: #555; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar"><select id="langSelect" onchange="updateLanguage()"></select></div>
    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="t-sub" class="sub-title">Loading...</div>
        <div class="pi-display"><span id="l-pi">0.0000</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-box">$ <span id="l-gcv">0</span></div>
    </header>

    <div class="card" style="border: 1px solid var(--neon-blue);">
        <div class="label" id="t-supply-l">Supply</div>
        <div class="val-blue" id="l-supply">0.0000</div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <div class="card" style="flex:1;"><div class="label" id="t-st">Staking</div><div class="val-st" id="l-st">0%</div></div>
        <div class="card" style="flex:1;"><div class="label" id="t-lp">Yield</div><div class="val-lp" id="l-lp">0%</div></div>
    </div>

    <div class="card" style="border:2px solid var(--neon-green);">
        <div class="label" id="t-total-lp">Liquidity</div>
        <div class="val-blue" id="l-total-lp" style="color:white">$ 0</div>
    </div>

    <div class="btn-grid">
        <button class="m-btn" id="t-b1" style="background:#fff;">PI Qty</button>
        <button class="m-btn" id="t-b2" style="background:var(--gold);">DEX</button>
        <button class="m-btn" id="t-b3" style="background:var(--neon-green);">Staking</button>
    </div>

    <div class="icon-grid">
        <div class="icon-item"><i>🚀</i><br><span id="m1">Send</span></div>
        <div class="icon-item"><i>🛒</i><br><span id="m2">Pay</span></div>
        <div class="icon-item"><i>💰</i><br><span id="m3">Deposit</span></div>
        <div class="icon-item"><i>🏅</i><br><span id="m4">Reward</span></div>
        <div class="icon-item"><i>🏦</i><br><span id="m5">UBI</span></div>
        <div class="icon-item"><i>🔄</i><br><span id="m6">Swap</span></div>
    </div>

    <button class="center-btn" id="t-center" onclick="toggleFaq()">Support Center</button>
    <div class="faq-box" id="faq-box"></div>

    <footer>© 2026 HK WORLD BANK FOUNDATION</footer>
</div>

<div id="bpini-trigger" onclick="toggleChat()">삐니</div>
<div id="chat-window">
    <div class="chat-h"><span id="t-chat-h">BPINI</span><span onclick="toggleChat()" style="cursor:pointer;">✕</span></div>
    <div class="chat-b" id="chat-box"></div>
    <div class="chat-i"><input type="text" id="chat-input" onkeypress="if(event.key==='Enter') askAI()" placeholder="..."></div>
</div>

        id: { sub:"Manajemen Aset Terpadu", supply:"Pasokan HKWB", st:"Staking", lp:"Hasil LP", total:"Total Likuiditas", b1:"Jumlah PI", b2:"Tukar DEX", b3:"Staking LP", center:"Pusat Dukungan AI", m1:"Kirim", m2:"Bayar", m3:"Deposit", m4:"Hadiah", m5:"UBI", m6:"Tukar", greet:"Halo Bos. Ada yang bisa saya bantu?", win:"Kemenangan sudah dipastikan.", sync:"Sinkronisasi selesai." },

        it: { sub:"Gestione asset integrata", supply:"Fornitura HKWB", st:"Staking", lp:"Rendimento LP", total:"Liquidità totale", b1:"Qtà PI", b2:"DEX Swap", b3:"Staking LP", center:"Centro AI Globale", m1:"Invia", m2:"Paga", m3:"Deposito", m4:"Premio", m5:"UBI", m6:"Scambio", greet:"Buongiorno. Come posso aiutarla?", win:"La vittoria è confermata.", sync:"Sincronizzazione completata." },

        ar: { sub:"إدارة الأصول المتكاملة", supply:"عرض HKWB", st:"رهن", lp:"عائد LP", total:"إجمالي السيولة", b1:"كمية PI", b2:"تبادل DEX", b3:"رهن LP", center:"مركز دعم AI", m1:"إرسال", m2:"دفع", m3:"إيداع", m4:"مكافأة", m5:"UBI", m6:"تبادل", greet:"مرحباً سيدي. كيف يمكنني مساعدتك؟", win:"النصر مؤكد.", sync:"تم المزامنة." },

    function updateLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = dic[l] || dic.en;
        document.getElementById('t-sub').innerText = d.sub;
        document.getElementById('t-supply-l').innerText = d.supply;
        document.getElementById('t-st').innerText = d.st;
        document.getElementById('t-lp').innerText = d.lp;
        document.getElementById('t-total-lp').innerText = d.total;
        document.getElementById('t-b1').innerText = d.b1; document.getElementById('t-b2').innerText = d.b2; document.getElementById('t-b3').innerText = d.b3;
        document.getElementById('t-center').innerText = d.center;
        document.getElementById('t-chat-h').innerText = d.chatH;
        for(let i=1; i<=6; i++) document.getElementById('m'+i).innerText = d['m'+i];
        const fBox = document.getElementById('faq-box');
        fBox.innerHTML = ["Vision", "Security", "UBI"].map(t => `<div class="faq-q">${t}?</div><div class="faq-a">${d.sync} BPINI AI is monitoring.</div>`).join('');
        document.getElementById('chat-box').innerHTML = `<div class="msg ai">${d.greet}</div>`;
    }

    function startSimulation() {
        let pi=412.3149, supply=6280000.5042, gcv=129541312, lp=88432103868, st=17.75, lp_r=28.80;
        setInterval(() => {
            pi += (Math.random()*0.0012 - 0.0006); supply += (Math.random()*0.0002);
            gcv += Math.floor(Math.random()*150 - 75); lp += Math.floor(Math.random()*20000 - 10000);
            st += (Math.random()*0.1 - 0.05); lp_r += (Math.random()*0.1 - 0.05);
            document.getElementById('l-pi').innerText = pi.toFixed(4);
            document.getElementById('l-supply').innerText = supply.toFixed(4);
            document.getElementById('l-gcv').innerText = gcv.toLocaleString();
            document.getElementById('l-total-lp').innerText = '$ ' + lp.toLocaleString();
            document.getElementById('l-st').innerText = Math.abs(st).toFixed(2) + '%';
            document.getElementById('l-lp').innerText = Math.abs(lp_r).toFixed(2) + '%';
        }, 1000);
    }

    function askAI() {
        const inp = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if(!inp.value.trim()) return;
        const l = document.getElementById('langSelect').value;
        const d = dic[l] || dic.en;
        box.innerHTML += `<div class="msg user">${inp.value}</div>`;
        const v = inp.value; inp.value = '';
        setTimeout(() => {
            let res = d.sync;
            if(v.includes("우승") || v.toLowerCase().includes("win")) res = d.win;
            box.innerHTML += `<div class="msg ai">${res}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 600);
    }

    function toggleFaq() { const f = document.getElementById('faq-box'); f.style.display = (f.style.display==='block')?'none':'block'; }
    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        Object.keys(dic).forEach(k => { const o = document.createElement('option'); o.value=k; o.innerText=k.toUpperCase(); sel.appendChild(o); });
        updateLanguage();
        startSimulation();
    };
</script>
</body>
</html>
