<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL SUPREME</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #f1c40f; --green: #00ff88; --blue: #3498db; --bg: #000; 
            --card: #111; --border: #222; --pink: #ff4757; --txt: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: var(--txt); overflow-x: hidden; }

        /* [1. 상단 내비게이션 & 거대 국기 바] */
        .top-nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.98); 
            backdrop-filter: blur(15px); z-index: 1000; padding: 15px 20px; 
            border-bottom: 2px solid var(--gold); text-align: center;
        }
        .logo-main { font-size: 30px; font-weight: 900; color: var(--gold); letter-spacing: -1px; margin-bottom: 12px; }
        
        .flag-bar { 
            width: 100%; overflow-x: auto; display: flex; gap: 15px; padding: 10px 0;
            scrollbar-width: none;
        }
        .flag-bar::-webkit-scrollbar { display: none; }
        .flag-btn { 
            flex: 0 0 auto; font-size: 28px; cursor: pointer; padding: 8px; 
            border: 2px solid transparent; border-radius: 12px; transition: 0.3s;
            background: #111;
        }
        .flag-btn.active { border-color: var(--gold); background: #222; transform: scale(1.1); }

        /* [2. 메인 컨테이너] */
        .container { max-width: 500px; margin: 0 auto; padding: 180px 20px 60px; }

        /* [3. 실시간 대시보드] */
        .main-card { 
            background: linear-gradient(165deg, #1a1a1a, #000); border-radius: 40px; 
            padding: 40px 25px; border: 1px solid #333; text-align: center; 
            margin-bottom: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }
        .ledger-title { font-size: 13px; color: #777; font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; }
        .bal-val { font-size: 52px; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; color: #fff; }
        .gcv-val { color: var(--green); font-size: 17px; font-weight: 800; margin-bottom: 35px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-item { background: #080808; padding: 22px 10px; border-radius: 25px; border: 1px solid var(--border); }
        .stat-label { font-size: 11px; font-weight: 900; margin-bottom: 8px; display: block; }
        .stat-num { font-size: 22px; font-weight: 900; }

        /* [4. ★핵심★ 국가별 맞춤 설명서] */
        .guide-card { 
            background: #0d0d0d; border-radius: 30px; padding: 30px; margin-bottom: 25px; 
            border-top: 5px solid var(--gold); position: relative;
        }
        .guide-h { font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .guide-b { font-size: 15px; color: #ccc; line-height: 1.8; word-break: keep-all; }
        .country-tag { position: absolute; top: -15px; right: 20px; background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 12px; }

        /* [5. 글로벌 AI 고객센터] */
        .btn-cs { background: linear-gradient(45deg, #ff4757, #ff6b81); color: #fff; width: 100%; padding: 25px; border-radius: 35px; font-weight: 900; font-size: 18px; border: none; cursor: pointer; box-shadow: 0 15px 30px rgba(255,71,87,0.4); }

        .onion-wrap { position: fixed; bottom: -100%; left: 0; width: 100%; height: 96%; background: #050505; border-top: 6px solid var(--pink); border-radius: 45px 45px 0 0; z-index: 2000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); padding: 30px; overflow-y: auto; }
        .onion-wrap.active { bottom: 0; }
        
        .faq-item { background: #111; padding: 22px; border-radius: 25px; margin-bottom: 12px; border: 1px solid #222; }
        .faq-q { color: var(--gold); font-weight: 900; font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .faq-a { color: #999; font-size: 14px; margin-top: 15px; display: none; line-height: 1.7; border-top: 1px solid #333; padding-top: 15px; }
        .faq-item.open .faq-a { display: block; }

        /* [6. 하단 메뉴] */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .menu-box { background: var(--card); padding: 25px 5px; border-radius: 25px; text-align: center; border: 1px solid var(--border); }
        .menu-box i { font-size: 28px; color: var(--gold); margin-bottom: 12px; display: block; }
        .menu-box span { font-size: 12px; font-weight: 900; color: #777; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="logo-main">HK WORLD BANK</div>
    <div class="flag-bar" id="flagContainer"></div>
</nav>

<div class="container">
    <div class="main-card">
        <p class="ledger-title" id="t_ledger">메인 자산 통합 원장</p>
        <div class="bal-val" id="v_bal">400.02120000</div>
        <div class="gcv-val" id="t_gcv">Value: $ 314,159 (GCV Standard)</div>
       
        <div class="stat-grid">
            <div class="stat-item"><span class="stat-label" style="color:var(--gold);" id="t_stk">스테이킹 이율</span><div class="stat-num" id="v_stk">15.482%</div></div>
            <div class="stat-item"><span class="stat-label" style="color:var(--green);" id="t_lp">유동성 수익</span><div class="stat-num" id="v_lp">23.261%</div></div>
        </div>
    </div>

    <div class="guide-card">
        <div class="country-tag" id="t_country">KOREA</div>
        <div class="guide-h"><i class="fas fa-shield-alt"></i> <span id="t_guide_h">운영 지침</span></div>
        <p class="guide-b" id="t_guide_b">설명서 로딩 중...</p>
    </div>

    <div class="menu-grid">
        <div class="menu-box"><i class="fas fa-paper-plane"></i><span id="m1">송금</span></div>
        <div class="menu-box"><i class="fas fa-shopping-cart"></i><span id="m2">결제</span></div>
        <div class="menu-box"><i class="fas fa-vault"></i><span id="m3">예치</span></div>
        <div class="menu-box"><i class="fas fa-award"></i><span id="m4">보상</span></div>
        <div class="menu-box"><i class="fas fa-coins"></i><span id="m5">기본소득</span></div>
        <div class="menu-box"><i class="fas fa-random"></i><span id="m6">스왑</span></div>
    </div>

    <button class="btn-cs" id="t_cs_btn" onclick="toggleOnion(true)">글로벌 AI 고객지원센터 가동</button>
</div>

<div id="onionBox" class="onion-wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px;">
        <h2 style="color:var(--pink); font-weight:900;" id="t_cs_h">AI SUPPORT CENTER</h2>
        <button onclick="toggleOnion(false)" style="background:none; border:none; color:#fff; font-size:40px;">&times;</button>
    </div>
    <div id="faqContainer"></div>
</div>

<script>
    const fullDB = {
        ko: { 
            name: "KOREA", ledger: "메인 자산 통합 원장", stk: "스테이킹 이율", lp: "유동성 수익", m1:"송금", m2:"결제", m3:"예치", m4:"보상", m5:"기본소득", m6:"스왑", cs_btn: "AI 고객지원센터 가동", cs_h: "AI 지원 센터", guide_h: "대한민국 운영 지침", 
            guide_b: "본 시스템은 한국의 IT 인프라와 HK Protocol V23 보안 기술을 결합하여 최적화되었습니다. 모든 자산은 1초 단위로 실시간 결산되며, GCV 표준 가치에 따라 국내외 송금 및 결제가 무제한 지원됩니다. 울산/경주 허브를 통해 물리적 보안이 강화되었습니다.",
            faqs: [
                ["GCV 가치는 한국에서 유효한가요?", "네, HK Group의 전 생태계에서 1Pi당 $314,159 가치로 고정되어 거래를 지원합니다."],
                ["보상 출금은 언제 가능한가요?", "매 초 단위로 지갑에 보상이 합산되며, 즉시 외부 송금이 가능합니다."],
                ["기본소득 신청 자격은?", "HK-WorldBank 가입자라면 누구나 수익의 30%를 배분받을 자격이 생깁니다."],
                ["보안 V23은 안전한가요?", "양자 컴퓨터의 공격까지 방어하는 최첨단 암호화 체계가 적용되었습니다."],
                ["고객센터 운영 시간은?", "AI가 24시간 실시간 응대하며 혜공 형님의 지휘 아래 운영됩니다."],
                ["DEX 스왑 수수료?", "내부망 이용 시 0.01% 미만의 최소 수수료가 적용됩니다."],
                ["노드 설치 가이드?", "설정에서 'Korea Node'를 선택하시면 국내 전용 망에 연결됩니다."],
                ["비밀번호 분실 시?", "보안 구문(Seed Phrase)을 통해서만 복구가 가능하니 각별히 유의하세요."],
                ["글로벌 파트너사 정보?", "현재 삼성, SK 등 국내 대기업과의 컨소시엄을 추진 중에 있습니다."],
                ["가스비 정책은?", "네트워크 혼잡도에 따라 자동 조정되며 파이 코인으로 결제됩니다."],
                ["계정 정지 기준?", "부정 거래 및 해킹 시도 적발 시 V23 시스템이 즉시 차단합니다."],
                ["이율 변동 주기는?", "실시간 시장 유동성에 따라 1초마다 소수점 단위로 변동됩니다."],
                ["API 연동 방법?", "개발자 포털을 통해 발급받은 키로 인프라 구축이 가능합니다."],
                ["KYB 인증 절차?", "기업 회원의 경우 정식 사업자 등록증 확인 후 승인됩니다."],
                ["오프라인 매장 결제?", "전국 HK 가맹점에서 QR 코드로 즉시 결제가 가능합니다."]
            ]
        },
        en: { 
            name: "GLOBAL (US)", ledger: "MAIN ASSET LEDGER", stk: "STAKING APR", lp: "LIQUIDITY YIELD", m1:"TRANSFER", m2:"PAYMENT", m3:"VAULT", m4:"REWARD", m5:"UBI", m6:"SWAP", cs_btn: "LAUNCH AI CENTER", cs_h: "AI SUPPORT", guide_h: "GLOBAL OPERATING GUIDE",
            guide_b: "HK Protocol V23 provides high-end banking services globally. Our systems are optimized for international financial regulations and integrated with 256-bit quantum encryption. We ensure 1-second settlement for all cross-border transactions under the GCV standard.",
            faqs: [
                ["What is the GCV value?", "It is the standard valuation of $314,159 per Pi within our ecosystem."],
                ["Withdrawal timing?", "Rewards are calculated every second and are withdrawable instantly."],
                ["Security Features?", "V23 Shield provides total protection against external cyber threats."],
                ["UBI Eligibility?", "30% of global net profit is distributed to active users."],
                ["AI Support availability?", "24/7 real-time AI assistance for global users."],
                ["Swap Fees?", "Internal DEX swaps incur a minimum fee of 0.01%."],
                ["Node Connectivity?", "Available via global high-speed relay servers."],
                ["Loss of Password?", "Recovery is only available via your Private Seed Phrase."],
                ["Consortium Info?", "Collaborating with global deep-tech and robotics giants."],
                ["Gas Fee calculation?", "Dynamic gas fee management integrated with Pi Mainnet."],
                ["Account Security?", "Biometric and multi-layer authentication are supported."],
                ["Yield variation?", "Fluctuates in real-time based on global liquidity."],
                ["Dev API Access?", "Full documentation is available on the HK Developer Portal."],
                ["KYC Requirements?", "Global regulatory compliance (KYC/KYB) is mandatory."],
                ["Retail Acceptance?", "Global merchants accept HK Pay via QR and NFC."]
            ]
        },
        zh: { 
            name: "CHINA", ledger: "主资产账本", stk: "质押利率", lp: "流动性收益", m1:"转账", m2:"支付", m3:"存款", m4:"奖励", m5:"基本收入", m6:"交换", cs_btn: "启动 AI 中心", cs_h: "AI 支持中心", guide_h: "中国区运行指南",
            guide_b: "HK Protocol V23 为中国用户量身定制。该系统符合全球最高安全标准，所有资产均受量子加密保护。通过 GCV 价值标准，实现秒级跨境结算，并提供全面的本地化支持。",
            faqs: [["什么是 GCV？", "每 1 Pi 价值 314,159 美元的生态标准。"]]
        }
    };

    function changeLang(key) {
        const d = fullDB[key] || fullDB['en'];
        document.getElementById('t_country').innerText = d.name;
        document.getElementById('t_ledger').innerText = d.ledger;
        document.getElementById('t_stk').innerText = d.stk;
        document.getElementById('t_lp').innerText = d.lp;
        document.getElementById('t_guide_h').innerText = d.guide_h;
        document.getElementById('t_guide_b').innerText = d.guide_b;
        document.getElementById('t_cs_btn').innerText = d.cs_btn;
        document.getElementById('t_cs_h').innerText = d.cs_h;
        ['m1','m2','m3','m4','m5','m6'].forEach((id, i) => document.getElementById(id).innerText = d['m'+(i+1)]);

        const fCont = document.getElementById('faqContainer');
        fCont.innerHTML = '';
        const questions = d.faqs || fullDB['en'].faqs;
        questions.forEach(f => {
            const div = document.createElement('div');
            div.className = 'faq-item';
            div.onclick = () => div.classList.toggle('open');
            div.innerHTML = `<div class="faq-q"><span>${f[0]}</span><i class="fas fa-plus"></i></div><div class="faq-a">${f[1]}</div>`;
            fCont.appendChild(div);
        });

        document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
    }

    const flagList = ["🇰🇷","🇺🇸","🇨🇳","🇯🇵","🇻🇳","🇵🇭","🇮🇩","🇹🇭","🇷🇺","🇩🇪","🇫🇷","🇪🇸","🇮🇹","🇬🇧","🇦🇪","🇮🇳","🇧🇷","🇲🇽","🇨🇦","🇦🇺"];
    const keyMap = ["ko","en","zh","en","en","en","en","en","en","en","en","en","en","en","en","en","en","en","en","en"];
    const container = document.getElementById('flagContainer');
    flagList.forEach((f, i) => {
        const b = document.createElement('div'); b.className = 'flag-btn'; b.innerText = f;
        b.onclick = () => { changeLang(keyMap[i]); b.classList.add('active'); };
        container.appendChild(b);
    });

    setInterval(() => {
        document.getElementById('v_bal').innerText = (400.0212 + Math.random()*0.0001).toFixed(8);
        document.getElementById('v_stk').innerText = (15.48 + Math.random()*0.01).toFixed(3) + "%";
        document.getElementById('v_lp').innerText = (23.26 + Math.random()*0.01).toFixed(3) + "%";
    }, 1000);

    function toggleOnion(s) { document.getElementById('onionBox').classList.toggle('active', s); }
    window.onload = () => { changeLang('ko'); document.querySelector('.flag-btn').classList.add('active'); };
</script>
</body>
</html>
