<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-WorldBank Global Ecosystem V2</title>
    <style>
        :root {
            --gold: #D4AF37;
            --neon-green: #39FF14;
            --neon-blue: #00F3FF;
            --neon-purple: #BC13FE;
            --neon-red: #FF3131;
            --bg-black: #020202;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 왼쪽 섹션: 금융 원장 */
        .main-panel {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #1a1a1a;
        }

        .brand-title { font-size: 45px; font-weight: 900; color: var(--gold); margin-bottom: 5px; }
        .brand-desc { font-size: 14px; color: #555; letter-spacing: 3px; margin-bottom: 40px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #0a0a0a; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        .card .label { font-size: 13px; color: #777; margin-bottom: 10px; font-weight: bold; }
        
        /* 실시간 숫자 칼날 */
        .val-lg { font-size: 28px; font-weight: bold; color: var(--neon-green); }
        .val-gcv { font-size: 28px; font-weight: bold; color: var(--gold); }
        .val-st { font-size: 28px; font-weight: bold; color: var(--neon-blue); }
        .val-pr { font-size: 28px; font-weight: bold; color: var(--neon-purple); }
        .val-lp { font-size: 28px; font-weight: bold; color: var(--neon-red); } /* LP 공급 강렬한 칼날 */

        /* 오른쪽 섹션: 국기 50개 & 국가별 상세 설명 */
        .side-panel {
            flex: 0.8;
            background: #050505;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .manual-box {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border-top: 3px solid var(--gold);
            height: 220px;
            margin-bottom: 25px;
            font-size: 15px;
            line-height: 1.8;
            overflow-y: auto;
            color: #ccc;
            box-shadow: inset 0 0 20px #000;
        }

        .flag-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding-right: 10px;
        }

        .flag-btn {
            font-size: 32px;
            cursor: pointer;
            text-align: center;
            background: #151515;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .flag-btn:hover { background: var(--gold); transform: translateY(-3px); }

        /* 하단 메뉴 */
        .action-row { margin-top: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--gold); color: #000; }

        /* 60초 타이머 */
        #timer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .time-num { font-size: 100px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="brand-title">HK-WORLD BANK</div>
    <div class="brand-desc">GLOBAL INTEGRATED LEDGER & UBI INFRA</div>

    <div class="dashboard">
        <div class="card">
            <div class="label">메인 자산 통합 원장 (전례지)</div>
            <div id="lg-num" class="val-lg">400.00000000 PI</div>
        </div>
        <div class="card">
            <div class="label">GCV 가치 (USD)</div>
            <div id="gcv-num" class="val-gcv">$314,159.00</div>
        </div>
        <div class="card">
            <div class="label">스테이킹 실시간 이율</div>
            <div id="st-num" class="val-st">24.500%</div>
        </div>
        <div class="card">
            <div class="label">유동성 수익 분배율</div>
            <div id="pr-num" class="val-pr">12.80%</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <div class="label">전체 유동성 LP 공급 (아들지)</div>
            <div id="lp-num" class="val-lp">1,240,500,000.00</div>
        </div>
    </div>

    <div class="action-row">
        <button class="btn" onclick="trigger60('수량 DEX 스왑')">DEX 스왑</button>
        <button class="btn" onclick="trigger60('LP 공급')">LP 공급</button>
        <button class="btn" onclick="alert('FAQ 10선 로드 중...')">고객센터</button>
    </div>
</div>

<div class="side-panel">
    <div id="manual-content" class="manual-box">
        <strong style="color:var(--gold)">[안내]</strong><br>
        오른쪽의 국기를 선택하십시오. 해당 국가 노드의 <strong>전례지 연동 현황</strong>과 <strong>아들지 관리 지침</strong>이 즉시 표시됩니다.
    </div>
    <div class="flag-container" id="flag-list"></div>
</div>

<div id="timer-overlay">
    <div class="time-num" id="timer-val">60</div>
    <div style="color: var(--gold); letter-spacing: 10px;">NODE SYNCING...</div>
</div>

    // 국기 버튼 생성
    const list = document.getElementById('flag-list');
    countries.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'flag-btn';
        btn.innerHTML = c.f;
        btn.onclick = () => {
            document.getElementById('manual-content').innerHTML = `
                <strong style="color:var(--gold)">[${c.n} Node Manual]</strong><br>
                ${c.d}<br><br>

    // 3. 60초 프로세스
    function trigger60(name) {
        let count = 60;
        const overlay = document.getElementById('timer-overlay');
        const val = document.getElementById('timer-val');
        overlay.style.display = 'flex';
        const inter = setInterval(() => {
            count--;
            val.innerText = count;
            if(count <= 0) {
                clearInterval(inter);
                overlay.style.display = 'none';
                alert(name + " 처리 완료. 아들지 원장에 기록되었습니다.");
            }
        }, 1000);
    }
</script>
