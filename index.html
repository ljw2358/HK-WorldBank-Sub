            padding: 12px;

            background: #111;

            color: var(--gray);
            padding: 8px 0;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;

        .lang-item.active {
            border-color: var(--hk-gold);
            color: var(--hk-gold);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 10px var(--glow-gold);

        .brand-zone { text-align: center; margin: 20px 0 40px 0; }
        .brand-title {
            font-size: 46px;
            font-weight: 950;
            color: var(--hk-gold);
            letter-spacing: -2px;
            text-shadow: 0 0 25px var(--glow-gold);
            margin: 0;

        .brand-sub {
            font-size: 14px;
            color: var(--hk-blue);
            font-weight: 800;
            letter-spacing: 4px;
            margin-top: 8px;

            font-weight: 900;

            display: flex;
            align-items: center;

            font-size: 30px;
            margin-left: 15px;
            font-weight: 900;

            border-radius: 60px;
            font-size: 32px;
            font-weight: 900;
            margin-top: 20px;
            background: rgba(57, 255, 20, 0.05);
            box-shadow: 0 0 30px var(--glow-green);
        }

        /* 데이터 대시보드 그리드 */
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .dash-card {
            background: var(--hk-card);
            border: 1.5px solid var(--hk-border);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .dash-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--hk-blue), transparent);
        }

        .card-label { font-size: 11px; color: var(--gray); font-weight: 800; margin-bottom: 8px; display: block; }
        .card-val { font-size: 26px; font-weight: 900; color: var(--white); }
        .val-neon { color: var(--hk-blue); }
        .val-pink { color: var(--hk-pink); }

        /* 6구 핵심 메뉴 */
        .menu-6 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: var(--hk-card);
            border: 1px solid var(--hk-border);
            border-radius: 20px;
            padding: 25px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;

        .menu-item.active { border: 2px solid var(--hk-gold); background: rgba(255, 215, 0, 0.05); }

        .menu-label { font-size: 16px; font-weight: 800; color: var(--soft-white); }
        .menu-item.active .menu-label { color: var(--hk-gold); }

        .mega-btn {
            width: 100%;
            padding: 25px;
            border-radius: 22px;
            font-size: 19px;
            font-weight: 900;
            color: #fff;
            border: none;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);

            display: none;
            background: #080808;
            border-radius: 20px;
            padding: 20px;
            margin-top: -10px;
            margin-bottom: 20px;
            border: 1.5px solid #222;

 * ✅ 2. 엔진 초기화 및 렌더링 시스템
 */
function init() {
    const hub = document.getElementById('langContainer');
    langs.forEach(l => {
        const d = document.createElement('div');
        d.className = `lang-item ${l.id === curLang ? 'active' : ''}`;
        d.innerText = l.n;
        d.onclick = () => switchLang(l.id);
        hub.appendChild(d);
    });
    
    switchLang('ko');
    startSim();
    injectFAQ();
}

    });

    const d = i18n[id] || i18n['en'];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if(d[k]) el.innerText = d[k];
    });

    renderVision();
}

/**
 * ✅ 3. 고도화된 실시간 금융 시뮬레이션
 */
let pV = 314159.00;
let sV = 8520441.12;
let aV = 18.44;

function startSim() {
    setInterval(() => {
        pV += (Math.random() * 0.0005);
        document.getElementById('dyn-pi').innerText = pV.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        // 형님의 위상을 고려한 고정 환율 시뮬레이션 (1 Pi = 150,000 KRW 가정)
        let kTotal = Math.floor(pV * 150000);
        document.getElementById('dyn-krw').innerText = "₩ " + kTotal.toLocaleString();

        sV += (Math.random() * 1.5);
        document.getElementById('dyn-supply').innerText = sV.toLocaleString(undefined, {minimumFractionDigits: 2});

        aV += (Math.random() * 0.02 - 0.01);
        document.getElementById('dyn-apy').innerText = aV.toFixed(2) + "%";
    }, 1000);
}

/**
 * ✅ 4. 데이터 인젝션 (FAQ & Vision)
 */
function renderVision() {
    const v = document.getElementById('vision-inject');
    const d = i18n[curLang];
    v.innerHTML = '';
    d.v_titles.forEach((t, i) => {
        v.innerHTML += `
            <div class="list-row">
                <span class="list-title">Phase ${i+1}: ${t}</span>
                <span class="list-desc">${d.v_descs[i]}</span>
            </div>
        `;
    });
}

function injectFAQ() {
    const f = document.getElementById('faq-inject');
    const faqs = [
        "Quantum Security Protocol v2.1", "Decentralized UBI Logic",
        "HKWB Wallet Integration Guide", "Node Validator Rewards",
        "Cross-Chain Liquidity Bridge", "Smart Contract Audit Report",
        "AI Governance Voting", "Global Hub Infrastructure",
        "Energy Independent Network", "Human-Robot Interaction Standards"
    ];
    faqs.forEach((q, i) => {
        f.innerHTML += `
            <div class="list-row">
                <span class="list-title" style="color:var(--hk-blue)">Q${i+1}. ${q}</span>
            </div>
        `;
    });
}

/**
 * ✅ 5. 인터랙션 시스템
 */
function togglePanel(id) {
    const p = document.getElementById(id);
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function bbiniChat() {
    alert(i18n[curLang].chat);
}

window.onload = init;
