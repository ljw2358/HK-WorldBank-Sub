
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - FULL INTERFACE</title>
    <style>
        /* 영상의 느낌을 그대로 살린 투박하고 강력한 블랙 테마 */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* 최상단 헤더 */
        .top-header { 
            padding: 25px 20px; 
            font-size: 28px; 
            font-weight: 900; 
            font-style: italic; 
            letter-spacing: -1px;
            border-bottom: 1px solid #222;
        }

        /* 메인 대시보드 컨테이너 */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }

        /* 자산 표시부 */
        .asset-box { 
            text-align: center; 
            padding: 60px 0; 
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 30px;
        }
        .asset-label { font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 15px; }
        .asset-value { font-size: 72px; font-weight: bold; margin: 10px 0; }
        .asset-unit { font-size: 24px; color: #fff; margin-left: 10px; }

        /* 하단 3열 데이터 그리드 */
        .data-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 50px;
        }
        .data-card { 
            background: #0a0a0a; 
            padding: 25px; 
            border: 1px solid #222; 
            border-radius: 4px;
            text-align: center;
        }
        .data-label { font-size: 12px; color: #666; margin-bottom: 10px; }
        .data-number { font-size: 20px; font-weight: bold; color: #eee; }

        /* 실시간 거래 로그 (내용을 더 길게 보이기 위한 장치) */
        .log-section {
            background: #050505;
            padding: 20px;
            border: 1px solid #111;
            font-family: monospace;
            font-size: 12px;
            color: #00ff00;
            height: 150px;
            overflow-y: hidden;
            margin-bottom: 50px;
            border-radius: 4px;
        }
        .log-line { margin-bottom: 5px; opacity: 0.8; }

        /* 글로벌 AI 고객지원센터 FAQ (확장판) */
        .faq-section { margin-top: 60px; padding-bottom: 100px; }
        .faq-title { 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 30px; 
            color: #fff;
            padding-left: 10px;
            border-left: 4px solid #fff;
        }
        .faq-item { 
            margin-bottom: 15px; 
            background: #0f0f0f; 
            border: 1px solid #222; 
            border-radius: 8px;
            overflow: hidden;
        }
        details summary { 
            padding: 20px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            list-style: none;
            display: flex;
            justify-content: space-between;
        }
        details summary:after { content: '+'; color: #888; }
        details[open] summary:after { content: '-'; }
        .faq-content { 
            padding: 0 20px 20px 20px; 
            font-size: 14px; 
            color: #aaa; 
            line-height: 1.6; 
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
        }

        /* 언어 선택기 (30개국을 위해 크게 배치) */
        .lang-footer {
            background: #0a0a0a;
            padding: 40px 20px;
            border-top: 1px solid #222;
            text-align: center;
        }
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: 20px auto;
        }
        .lang-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
        }
        .lang-btn:hover { background: #333; color: #fff; }
        .lang-btn.active { border-color: #fff; color: #fff; font-weight: bold; }

    </style>
</head>
<body>

    <div class="top-header italic">HK WORLD BANK</div>

    <div class="container">
        <div class="asset-box">
            <div class="asset-label" id="txt-main-title">MAIN ASSET INTEGRATED BALANCE</div>
            <div class="asset-value">
                <span id="main-num">400.0212</span><span class="asset-unit">Pi</span>
            </div>
            <div style="font-size: 12px; color: #00ff00; margin-top: 10px;" id="txt-sync">● LIVE NETWORK SYNCING...</div>
        </div>

        <div class="data-grid">
            <div class="data-card">
                <div class="data-label" id="txt-node">NODE POWER</div>
                <div class="data-number" id="node-val">12.4592</div>
            </div>
            <div class="data-card">
                <div class="data-label" id="txt-staking">STAKING REWARD</div>
                <div class="data-number" id="stake-val">85.1023</div>
            </div>
            <div class="data-card">
                <div class="data-label" id="txt-traffic">NETWORK TRAFFIC</div>
                <div class="data-number" id="traffic-val">1024 GB</div>
            </div>
        </div>

        <div class="log-section" id="log-container">
            </div>

        <div class="faq-section">
            <div class="faq-title" id="txt-faq-title">GLOBAL AI CUSTOMER SUPPORT CENTER (FAQ)</div>
            <div id="faq-list">
                </div>
        </div>
    </div>

    <div class="lang-footer">
        <div style="font-size: 12px; color: #555; margin-bottom: 15px;">SELECT LANGUAGE (30 COUNTRIES SUPPORTED)</div>
        <div class="lang-grid" id="lang-grid">
            </div>
    </div>

    <script>
        // 1. 30개국 언어 지원 데이터 (핵심 샘플)
        const langData = {
            ko: {
                mainTitle: "메인 자산 통합 잔장",
                sync: "● 라이브 네트워크 동기화 중...",
                node: "노드 연산 파워",
                staking: "스테이킹 보상",
                traffic: "네트워크 트래픽",
                faqHead: "글로벌 AI 고객지원센터 FAQ",
                faqs: [
                    ["HKWB는 무엇인가요?", "HK World Bank는 Pi 생태계를 위한 차세대 Web3 금융 플랫폼입니다."],
                    ["보안은 안전한가요?", "군사급 암호화와 분산형 노드 보안 시스템을 적용하고 있습니다."],
                    ["수수료는 얼마인가요?", "플랫폼 내 이체 수수료는 0.01 Pi로 고정되어 있습니다."],
                    ["어떻게 가입하나요?", "Pi 브라우저를 통해 지갑을 연결하면 즉시 가입됩니다."],
                    ["인출 제한이 있나요?", "검증 완료된 노드 참여자는 실시간 인출이 가능합니다."],
                    ["스테이킹 기간은?", "유연한 스테이킹 정책으로 언제든 설정 변경이 가능합니다."],
                    ["AI 지원센터는 24시간인가요?", "네, 전 세계 어디서든 24시간 실시간 응답을 제공합니다."],
                    ["다국어 지원 범위는?", "현재 30개 주요 언어를 완벽하게 지원하고 있습니다."],
                    ["메인넷 전환은 언제인가요?", "Pi 네트워크의 메인넷 로드맵에 맞추어 실시간 연동됩니다."],
                    ["고객 센터 연락처는?", "앱 내 AI 챗봇을 통해 1:1 기술 지원을 요청할 수 있습니다."]
                ]
            },
            en: {
                mainTitle: "MAIN ASSET INTEGRATED BALANCE",
                sync: "● LIVE NETWORK SYNCING...",
                node: "NODE COMPUTE POWER",
                staking: "STAKING REWARD",
                traffic: "NETWORK TRAFFIC",
                faqHead: "GLOBAL AI SUPPORT CENTER FAQ",
                faqs: [
                    ["What is HKWB?", "HK World Bank is a next-gen Web3 financial platform for the Pi ecosystem."],
                    ["Is it secure?", "We use military-grade encryption and node security."],
                    ["Fees?", "Transaction fees are fixed at 0.01 Pi."],
                    ["How to join?", "Connect via Pi Browser wallet instantly."],
                    ["Withdrawals?", "Verified node users have real-time withdrawal access."],
                    ["Staking?", "Flexible policies allow changes anytime."],
                    ["24/7 AI?", "Yes, 24/7 real-time global support."],
                    ["Languages?", "Supporting 30 major global languages."],
                    ["Mainnet?", "Syncs with Pi Network's mainnet roadmap."],
                    ["Contact?", "1:1 tech support via in-app AI chatbot."]
                ]
            }
            // ... 나머지 언어들도 동일 구조로 추가 가능
        };

        const languages = [
            {code: 'ko', name: '한국어'}, {code: 'en', name: 'English'}, {code: 'zh', name: '中文'},
            {code: 'ja', name: '日本語'}, {code: 'vi', name: 'Tiếng Việt'}, {code: 'de', name: 'Deutsch'},
            {code: 'fr', name: 'Français'}, {code: 'es', name: 'Español'}, {code: 'th', name: 'ไทย'},
            {code: 'id', name: 'Bahasa'}, {code: 'pt', name: 'Português'}, {code: 'ru', name: 'Русский'},
            {code: 'ar', name: 'العربية'}, {code: 'hi', name: 'हिन्दी'}, {code: 'tr', name: 'Türkçe'}
            // 30개국까지 리스트업 가능
        ];

        // 2. 초기 렌더링
        function init() {
            renderLang('ko');
            
            // 언어 버튼 생성
            const grid = document.getElementById('lang-grid');
            languages.forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'lang-btn';
                btn.innerText = l.name;
                btn.onclick = () => renderLang(l.code);
                grid.appendChild(btn);
            });

            // 실시간 숫자 변동 시작
            setInterval(updateNumbers, 800);
            setInterval(addLog, 2000);
        }

        function renderLang(code) {
            const d = langData[code] || langData['en'];
            document.getElementById('txt-main-title').innerText = d.mainTitle;
            document.getElementById('txt-sync').innerText = d.sync;
            document.getElementById('txt-node').innerText = d.node;
            document.getElementById('txt-staking').innerText = d.staking;
            document.getElementById('txt-traffic').innerText = d.traffic;
            document.getElementById('txt-faq-title').innerText = d.faqHead;

            const list = document.getElementById('faq-list');
            list.innerHTML = '';
            d.faqs.forEach(f => {
                const item = document.createElement('div');
                item.className = 'faq-item';
                item.innerHTML = `<details><summary>${f[0]}</summary><div class="faq-content">${f[1]}</div></details>`;
                list.appendChild(item);
            });
        }

        // 3. 실시간 숫자 변동 로직
        function updateNumbers() {
            const main = document.getElementById('main-num');
            let mVal = parseFloat(main.innerText);
            main.innerText = (mVal + (Math.random() * 0.0002 - 0.00008)).toFixed(4);

            document.getElementById('node-val').innerText = (12.4592 + (Math.random() * 0.01)).toFixed(4);
            document.getElementById('stake-val').innerText = (85.1023 + (Math.random() * 0.005)).toFixed(4);
            document.getElementById('traffic-val').innerText = Math.floor(1024 + (Math.random() * 50)) + " GB";
        }

        // 4. 가짜 로그 생성 (시스템 활성도 연출)
        function addLog() {
            const logBox = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            const actions = ["[INFO] Node Synced", "[DB] Ledger Updated", "[AUTH] Wallet Verified", "[NET] Traffic Optimized"];
            const action = actions[Math.floor(Math.random() * actions.length)];
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = `> ${time} : ${action} ... OK`;
            logBox.prepend(line);
            if(logBox.childNodes.length > 8) logBox.removeChild(logBox.lastChild);
        }

        window.onload = init;
    </script>
</body>
</html>
