        .pi-main { font-size: 15vw; font-weight: 900; margin: 0; display: flex; align-items: baseline; justify-content: center; }
        .pi-main span.unit { color: var(--hk-gold); font-size: 9vw; margin-left: 8px; font-weight: 800; }

        .label-txt { font-size: 12px; color: var(--white); font-weight: 800; margin-bottom: 8px; display: block; opacity: 0.8; }
        .supply-val { color: var(--hk-blue); font-size: 8vw; font-weight: 900; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .box-sm { background: rgba(255,255,255,0.04); border: 1.5px solid #333; border-radius: 15px; padding: 15px 5px; }
        .val-bold { font-size: 6.5vw; font-weight: 900; color: var(--hk-blue); }

        .nav-btn { padding: 15px 2px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; font-size: 11px; color: #000; overflow: hidden; white-space: nowrap; }

        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 25px; }
        .btn-6 { background: #1a1a1a; border: 1px solid #444; padding: 18px 2px; border-radius: 12px; }
        .btn-6 span { font-size: 12px; font-weight: 900; color: var(--white); display: block; white-space: nowrap; }

        .hidden-panel { display: none; background: #0d0d0d; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; text-align: left; }

        document.getElementById('pi-val').innerText = currentPi.toFixed(4);

        document.getElementById('supply-val').innerText = currentSupply.toLocaleString(undefined, {minimumFractionDigits: 4});
        currentLiq += Math.floor(Math.random() * 500);
        document.getElementById('liq-val').innerText = "$ " + currentLiq.toLocaleString();
        currentUsd += Math.floor(Math.random() * 50);
        document.getElementById('usd-val').innerText = "$ " + currentUsd.toLocaleString();
        document.getElementById('st-rate').innerText = (17.8 + Math.random() * 0.1).toFixed(2) + "%";
        document.getElementById('lp-rate').innerText = (28.8 + Math.random() * 0.05).toFixed(2) + "%";
    }

    // 초기 실행
    updateAllLang();
    setInterval(liveUpdate, 600);
</script>
</body>
</html>
