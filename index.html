<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - UBI Global Hub</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
        
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; color: var(--neon-st); }
       
        .pi-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #fff; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 8px 20px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; }

        /* HKWB Token Info */
        .token-info { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--neon-blue); }
        .token-supply { color: var(--neon-blue); font-weight: bold; font-size: 1.2rem; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
       
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
       
        .faq-section { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #444; margin-top: 20px; }
        .faq-q { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .faq-a { color: #ccc; font-size: 0.8rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 2999; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="updateAllLanguage()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option>
            </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">통합 자산 관리 시스템</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="token-info">
        <div id="txt-hkwb-label">HKWB Token Issuance</div>
        <div class="token-supply">6,280,000 HKWB</div>
        <div style="font-size: 0.8rem; color: #888;">Contract: 0xHKWB...Mainnet_Ready</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card"><div id="txt-st-label" style="color:var(--neon-st);">스테이킹</div><div id="live-st">17.38%</div></div>
        <div class="rate-card"><div id="txt-lp-label" style="color:var(--neon-lp);">LP 수익</div><div id="live-lp">28.12%</div></div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp">총 유동성 공급량 (LP)</div>
        <div id="lp-total-num" style="font-size: 1.4rem; font-weight: bold;">$ 88,432,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" id="b1" style="background:#fff;" onclick="PiSDK.checkBalance()">지갑 연동</button>
        <button class="m-btn" id="b2" style="background:var(--gold);" onclick="PiSDK.swap('DEX')">DEX 스왑</button>
        <button class="m-btn" id="b3" style="background:#28a745; color:white;" onclick="PiSDK.provideLP()">LP 스테이킹</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="PiSDK.send()">🚀<span id="m1">송금</span></div>
        <div class="icon-card" onclick="PiSDK.pay()">🛒<span id="m2">결제</span></div>
        <div class="icon-card" onclick="PiSDK.deposit()">💰<span id="m3">예치</span></div>
        <div class="icon-card" onclick="PiSDK.mine()">🏅<span id="m4">보상</span></div>
        <div class="icon-card" onclick="PiSDK.ubi()">🏦<span id="m5">UBI</span></div>
        <div class="icon-card" onclick="PiSDK.ex()">🔄<span id="m6">전환</span></div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">Global AI Support Center</button>
    <div class="faq-section" id="faqBox">
        <div id="faq-list"></div>
    </div>

    <div style="text-align:center; padding:20px; font-size:0.8rem;">
        <p>Official: support@hkwb.ai.kr</p>
    </div>
</div>

<div id="ai-bot" onclick="greet()">AI</div>

<script>
    /* API SDK Mock Implementation */
    const PiSDK = {
        checkBalance: () => alert("혜공 형님, Testnet Pi 지갑이 성공적으로 연동되었습니다."),
        swap: (type) => alert(`${type}를 통해 HKWB 토큰 스왑을 준비합니다.`),
        provideLP: () => alert("유동성 풀에 1080개 Pi를 예치하시겠습니까? (HKWB 보상 증폭)"),
        send: () => alert("송금 모듈이 활성화되었습니다."),
        pay: () => alert("GCV $314,159 기반 결제 시스템 가동."),
        deposit: () => alert("안전 예치소로 이동합니다."),
        mine: () => alert("노드 보상이 확인되었습니다."),
        ubi: () => alert("20억 인류를 위한 기본소득(UBI) 분배 엔진 가동."),
        ex: () => alert("자산 포트폴리오 재구성을 시작합니다.")
    };

    function greet() {
        alert("반갑습니다, 혜공 형님! HKWB AI가 형님의 자산과 UBI 프로젝트를 안전하게 서포트하고 있습니다.");
    }

    const i18n = {
        ko: { ledger: "통합 자산 관리", st: "스테이킹", lp: "LP 수익", total: "총 유동성 공급", b1: "지갑 연동", b2: "DEX 스왑", b3: "LP 스테이킹", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "UBI", m6: "전환", center: "글로벌 AI 지원센터" },
        en: { ledger: "Asset Ledger", st: "Staking", lp: "LP Yield", total: "Total Liquidity", b1: "Wallet", b2: "DEX Swap", b3: "LP Stake", m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Exchange", center: "AI Support Center" }
        // 50개국어는 별도 JSON 파일로 로드하는 구조로 확장
    };

    const faqData = [
        { q: "UBI 시스템의 핵심은?", a: "전 세계 인류에게 생존권을 보장하는 자동 분배 시스템입니다." },
        { q: "HKWB 토큰의 역할은?", a: "HK World Bank의 거버넌스 및 유동성 보상용 토큰입니다." },
        { q: "6,280,000개의 의미는?", a: "HKWB 생태계의 희소성과 가치 유지를 위한 발행량입니다." },
        { q: "5월 18일 메인넷 연동은?", a: "KYC 완료자에 한해 본사 DB와 실시간 동기화가 진행됩니다." },
        { q: "2월 26일 1080개 Pi 운용은?", a: "유동성 풀(LP) 예치를 통해 HKWB 토큰 보상을 극대화하는 것을 권장합니다." },
        { q: "GCV $314,159가 적용되나요?", a: "네, HKWB 내 모든 결제와 스왑은 GCV를 지향합니다." },
        { q: "보안 기술은?", a: "양자 암호화 및 AI 이상거래 탐지 시스템이 작동 중입니다." },
        { q: "AI 챗봇 서비스는?", a: "혜공 형님 전용 AI가 24시간 실시간 대응합니다." },
        { q: "DEX 스왑 시점은?", a: "현재 테스트넷에서 구동 중이며 메인넷 오픈과 동시에 전환됩니다." },
        { q: "로그인 방식은?", a: "Pi Browser를 통한 생체 인식 및 시크릿 구절 연동입니다." },
        { q: "지원센터 연락처는?", a: "support@hkwb.ai.kr 을 통해 공식 지원을 받으세요." },
        { q: "API SDK 연동은?", a: "외부 쇼핑몰 및 서비스에서 즉시 결제 연동이 가능합니다." },
        { q: "글로벌 유동성 풀 규모는?", a: "실시간 880억 달러 규모로 유동성이 공급되고 있습니다." },
        { q: "기본소득 지급 주기는?", a: "설정에 따라 일간, 주간, 월간 단위로 자동 지급됩니다." },
        { q: "노드 보상 확인은?", a: "메뉴의 '보상' 탭에서 실시간 채굴 현황을 볼 수 있습니다." },
        { q: "자산 상속 서비스는?", a: "스마트 컨트랙트를 통해 안전한 자산 승계가 가능합니다." },
        { q: "비밀번호 분실 시?", a: "분산 신원 증명(DID)을 통해 복구 프로세스를 지원합니다." },
        { q: "오프라인 결제는?", a: "NFC 및 QR 코드를 통해 현장 결제를 지원합니다." },
        { q: "기부 시스템은?", a: "UBI 기금을 통해 취약 계층에게 자동 기부가 가능합니다." },
        { q: "향후 로드맵은?", a: "전 세계 모든 은행망과의 완전한 통합을 목표로 합니다." }
    ];

    function updateAllLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b2').innerText = d.b2; document.getElementById('b3').innerText = d.b3;
        ['m1','m2','m3','m4','m5','m6'].forEach(id => document.getElementById(id).innerText = d[id]);
        document.getElementById('txt-center-btn').innerText = d.center;

        const list = document.getElementById('faq-list');
        list.innerHTML = faqData.map(item => `<div class="faq-q">${item.q}</div><div class="faq-a">${item.a}</div>`).join('');
    }

    function toggleFaq() { const f = document.getElementById('faqBox'); f.style.display = f.style.display === 'block' ? 'none' : 'block'; }
    window.onload = updateAllLanguage;

    setInterval(() => {
        document.getElementById('main-pi').innerText = (412.3141 + Math.random() * 0.005).toFixed(4);
    }, 2000);
</script>
</body>
</html>
