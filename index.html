<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - TOTAL LEDGER</title>
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-green: #39FF14;
            --hk-blue: #00F3FF;
            --hk-pink: #FF00FF;
            --hk-bg: #000000;
            --hk-card: #0a0a0a;
            --hk-border: #1a1a1a;
        }

        body {
            background: var(--hk-bg);
            color: #fff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* ✅ 헤더 섹션 */
        .header-title {
            font-size: 44px;
            font-weight: 900;
            color: var(--hk-gold);
            margin: 40px 0 5px 0;
            letter-spacing: -1.5px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .header-sub {
            font-size: 15px;
            color: var(--hk-blue);
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 40px;
        }

        /* ✅ 메인 자산 섹션 */
        .pi-main {
            font-size: 82px;
            font-weight: 900;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -3px;
        }

        .pi-main .unit {
            background: var(--hk-gold);
            color: #000;
            font-size: 26px;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .krw-pill {
            display: inline-block;
            border: 3px solid var(--hk-green);
            color: var(--hk-green);
            padding: 15px 0;
            width: 95%;
            border-radius: 50px;
            font-size: 32px;
            font-weight: 900;
            margin-top: 25px;
            background: transparent;
        }

        /* ✅ 실시간 대시보드 박스 */
        .data-card {
            background: var(--hk-card);
            border: 1.5px solid var(--hk-border);
            border-radius: 25px;
            padding: 25px;
            margin-top: 30px;
        }

        .data-title {
            font-size: 13px;
            color: #666;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .data-val-blue { font-size: 34px; font-weight: 900; color: var(--hk-blue); }
        
        .rate-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .rate-box { background: var(--hk-card); border: 1.5px solid var(--hk-border); border-radius: 20px; padding: 22px; }
        .rate-val-blue { font-size: 32px; font-weight: 900; color: var(--hk-blue); }
        .rate-val-pink { font-size: 32px; font-weight: 900; color: var(--hk-pink); }

        .liq-box {
            border: 2.5px solid var(--hk-green);
            border-radius: 20px;
            padding: 25px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.8);
        }
        .liq-title { color: var(--hk-green); font-size: 15px; font-weight: 900; margin-bottom: 15px; }
        .liq-val { font-size: 36px; font-weight: 900; color: #fff; }

        /* ✅ 그리드 버튼 (6종) */
        .grid-6 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .btn-6 {
            background: var(--hk-card);
            border: 1.5px solid var(--hk-border);
            border-radius: 20px;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 800;
            font-size: 16px;
        }
        .btn-6.active { border-color: var(--hk-gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        /* ✅ 하단 액션 버튼 */
        .action-btn {
            width: 100%;
            padding: 24px;
            border-radius: 22px;
            font-size: 21px;
            font-weight: 900;
            color: #fff;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; padding-bottom: 100px; }
        .soc-btn { padding: 22px; border-radius: 22px; font-weight: 900; text-decoration: none; color: #fff; font-size: 18px; }

        /* ✅ 형님의 파트너 '삐니' (스크린샷 위치 최적화) */
        .bbini-bot {
            position: fixed;
            bottom: 40px;
            right: 25px;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #FF00FF, #D000D0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(255, 0, 255, 0.5);
            z-index: 9999;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">HK WORLD BANK</div>
    <div class="header-sub">HYEKONG GLOBAL ASSET MANAGEMENT</div>

    <div class="pi-main">314,159 <span class="unit">Pi</span></div>
    <div class="krw-pill">₩ 47,123,850,000</div>

    <div class="data-card">
        <div class="data-title">HKWB LIVE CIRCULATING SUPPLY</div>
        <div class="data-val-blue" id="supply">6280000.5511</div>
    </div>

    <div class="rate-row">
        <div class="rate-box">
            <div class="data-title">STAKING APY</div>
            <div class="rate-val-blue" id="stk">17.65%</div>
        </div>
        <div class="rate-box">
            <div class="data-title">LP REWARD</div>
            <div class="rate-val-pink" id="lp">28.55%</div>
        </div>
    </div>

    <div class="liq-box">
        <div class="liq-title">TOTAL LIQUIDITY (DEX)</div>
        <div class="liq-val" id="liq">$ 88,432,096,966</div>
    </div>

    <div class="grid-6">
        <div class="btn-6">🚀 송금</div>
        <div class="btn-6">🛒 결제</div>
        <div class="btn-6">💰 예치</div>
        <div class="btn-6">🏆 보상</div>
        <div class="btn-6">🏦 기본소득</div>
        <div class="btn-6 active">🔄 스왑</div>
    </div>

    <button class="action-btn" style="background: #e91e63;">Global AI Support Center</button>
    <button class="action-btn" style="background: #1e293b;">HK Foundation Vision 2030</button>

    <div class="social-row">
        <a href="#" class="soc-btn" style="background: #FF0000;">YouTube</a>
        <a href="#" class="soc-btn" style="background: #000; border: 1.5px solid #333;">TikTok</a>
    </div>
</div>

<div class="bbini-bot">삐니</div>

<script>
    // 실시간 숫자 업데이트 엔진
    function update() {
        // 공급량
        let s = 6280000.5511 + (Math.random() * 0.001);
        document.getElementById('supply').innerText = s.toFixed(4);
        
        // 수익률
        document.getElementById('stk').innerText = (17.65 + (Math.random()*0.02 - 0.01)).toFixed(2) + "%";
        document.getElementById('lp').innerText = (28.55 + (Math.random()*0.02 - 0.01)).toFixed(2) + "%";
        
        // 유동성
        let l = 88432096966 + Math.floor(Math.random() * 1000);
        document.getElementById('liq').innerText = "$ " + l.toLocaleString();
    }
    setInterval(update, 800);
</script>

</body>
</html>
