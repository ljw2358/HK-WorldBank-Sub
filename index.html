<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --accent-yellow: #f1c40f;
            --accent-green: #2ecc71;
            --text-white: #ffffff;
            --text-gray: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Header Area */
        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .bank-title {
            color: var(--accent-yellow);
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Main Asset Card */
        .asset-card {
            background-color: var(--card-bg);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        .asset-label {
            background-color: rgba(241, 196, 15, 0.2);
            color: var(--accent-yellow);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .balance-container {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .balance-container span {
            color: var(--accent-yellow);
            font-size: 24px;
            margin-left: 5px;
        }

        .valuation-badge {
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
        }

        /* Grid Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon { font-size: 24px; }
        .menu-label {
            background-color: #333;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        /* Quantum Shield Section */
        .shield-section {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #222;
        }

        .shield-title {
            color: #00f2fe;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shield-list {
            list-style: none;
            padding: 0;
            margin: 0;
            color: var(--text-gray);
            font-size: 14px;
            line-height: 2;
        }

        .shield-list li::before {
            content: "◆";
            color: #00f2fe;
            margin-right: 8px;
            font-size: 10px;
        }

        /* Staking Footer */
        .staking-footer {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
        }

        .staking-title {
            color: var(--accent-yellow);
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="bank-title">HK WORLD BANK</div>
        </header>

        <main>
            <div class="asset-card">
                <div class="asset-label">메인 자산 통합 원장</div>
                <div class="balance-container">
                    400.0212<span>Pi</span>
                </div>
                <div class="valuation-badge">
                    가치 평가: $ 125,663,600 (GCV)
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item">
                    <span class="icon">✈️</span>
                    <span class="menu-label">송금</span>
                </div>
                <div class="menu-item">
                    <span class="icon">🛒</span>
                    <span class="menu-label">결제</span>
                </div>
                <div class="menu-item">
                    <span class="icon">🐷</span>
                    <span class="menu-label">예치</span>
                </div>
                <div class="menu-item">
                    <span class="icon">🎁</span>
                    <span class="menu-label">보상</span>
                </div>
                <div class="menu-item">
                    <span class="icon">⚖️</span>
                    <span class="menu-label">기본소득</span>
                </div>
                <div class="menu-item">
                    <span class="icon">🔄</span>
                    <span class="menu-label">스왑</span>
                </div>
            </div>

            <div class="shield-section">
                <div class="shield-title">🛡️ HK 양자 방패 가동 중</div>
                <ul class="shield-list">
                    <li>양자 암호화 보안 적용</li>
                    <li>자산 보호 프로토콜 가동</li>
                    <li>AI 실시간 위협 탐지 중</li>
                </ul>
            </div>

            <div class="staking-footer">
                <div class="staking-title">예치 (APY 31.4%)</div>
            </div>
        </main>
    </div>

</body>
</html>
