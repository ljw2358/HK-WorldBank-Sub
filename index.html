<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - GLOBAL v4.2</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* 글로벌 언어 선택 */
        .lang-bar { text-align: right; margin-bottom: 15px; }
        #lang-select { background: #111; color: var(--hk-gold); border: 1px solid #333; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 13px; outline: none; cursor: pointer; }

        .header-section { margin: 30px 0; }
        .header-title { font-size: 38px; font-weight: 900; color: var(--hk-gold); }
        .sub-header { color: var(--hk-blue); font-size: 15px; font-weight: 800; letter-spacing: 1px; }

        .pi-main { font-size: 60px; font-weight: 900; margin: 20px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 25px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 25px; border-radius: 50px; font-weight: 900; margin-bottom: 25px; }

        /* 메인 자산 버튼 */
        .btn-group-label { text-align: left; font-size: 14px; font-weight: 900; color: var(--hk-gold); margin: 20px 0 10px 5px; }
        .top-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .top-btn { padding: 18px 0; border-radius: 15px; font-weight: 900; color: #000; font-size: 14px; border: none; cursor: pointer; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 20px 0; border-radius: 20px; border: 1px solid #222; cursor: pointer; }
        .menu-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .menu-text { font-size: 13px; font-weight: 800; }

        .big-btn { width: 100%; padding: 22px; border-radius: 18px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 5px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; }
        
        /* 비전 원본 스타일 */
        .vision-item { margin-bottom: 20px; border-left: 4px solid var(--hk-blue); padding-left: 15px; }
        .vision-item b { color: var(--hk-blue); font-size: 17px; display: block; margin-bottom: 5px; }
        .vision-item p { margin: 0; color: #eee; font-size: 14px; line-height: 1.8; }

        /* 챗봇 */
        #chat-window { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; }
        .chat-top { padding: 25px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 14px; }
        .msg-bbini { background: var(--hk-pink); color: #fff; align-self: flex-start; }
        .msg-user { background: #333; color: #fff; align-self: flex-end; }
        .chat-footer { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #333; }
        .chat-in { flex: 1; background: #111; border: 1px solid #444; border-radius: 50px; padding: 12px 20px; color: #fff; outline: none; }
        .bbini { position: fixed; bottom: 30px; right: 25px; width: 80px; height: 80px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 3px solid #fff; cursor: pointer; z-index: 1000; box-shadow: 0 0 20px rgba(255,0,255,0.4); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .soc-btn { padding: 15px; border-radius: 15px; font-weight: 900; text-decoration: none; color: #fff; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="lang-select" onchange="changeLang(this.value)">
            <option value="ko">한국어 (KR)</option>
            <option value="en">English (US)</option>
            <option value="zh">中文 (CN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="es">Español (ES)</option>
            <option value="vi">Tiếng Việt (VN)</option>
        </select>
    </div>

    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div id="txt-sub" class="sub-header">메인자산통합원장</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill" id="gcv-val">Value: $ 125,663,600 (GCV)</div>

    <div class="btn-group-label">MAIN ASSETS</div>
    <div class="top-btn-grid">
        <button id="btn-pi" class="top-btn" style="background: #E0D7FF;" onclick="runDemo('PI 수량', 'p+=100;m=형님! 테스트 파이 100개가 추가로 동기화되었습니다.')">PI 수량</button>
        <button id="btn-swap" class="top-btn" style="background: #FFD700;" onclick="runDemo('DEX 스왑', 'p-=10;g+=314159;m=DEX 스왑 완료. 10 Pi가 GCV 가치로 실시간 전환되었습니다.')">DEX 스왑</button>
        <button id="btn-staking" class="top-btn" style="background: #39FF14;" onclick="runDemo('LP 스테이킹', 'm=LP 스테이킹 성공! 유동성 풀 지배력이 강화되었습니다.')">LP 스테이킹</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="runDemo('송금')"><span class="menu-icon">🚀</span><span id="m1" class="menu-text">송금</span></div>
        <div class="menu-item" onclick="runDemo('결제')"><span class="menu-icon">🛒</span><span id="m2" class="menu-text">결제</span></div>
        <div class="menu-item" onclick="runDemo('예치')"><span class="menu-icon">🏦</span><span id="m3" class="menu-text">예치</span></div>
        <div class="menu-item" onclick="runDemo('보상')"><span class="menu-icon">🏆</span><span id="m4" class="menu-text">보상</span></div>
        <div class="menu-item" onclick="runDemo('기본소득')"><span class="menu-icon">🏠</span><span id="m5" class="menu-text">기본소득</span></div>
        <div class="menu-item" onclick="runDemo('스왑')"><span class="menu-icon">🔄</span><span id="m6" class="menu-text">스왑</span></div>
    </div>

    <button id="btn-faq" class="big-btn" style="background:var(--hk-pink);" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button id="btn-vis" class="big-btn" style="background:#253347;" onclick="toggle('vision-panel')">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background:#FF0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background:#111; border:1px solid #333;">TikTok</a>
    </div>
</div>

<div id="chat-window">
    <div class="chat-top"><div style="font-weight:900; color:var(--hk-gold);">BBINI AGI AGENT</div><div onclick="closeChat()" style="cursor:pointer; font-size:25px;">&times;</div></div>
    <div class="chat-body" id="chat-res"><div id="chat-greet" class="msg-box msg-bbini">무엇을 도와드릴까요?</div></div>
    <div class="chat-footer"><input type="text" id="chat-in" class="chat-in" placeholder="..."><button onclick="sendMsg()" style="background:var(--hk-gold); border:none; padding:0 20px; border-radius:50px; font-weight:900;">GO</button></div>
</div>
<div class="bbini" onclick="openChat()">삐니</div>

<script>
    let p=400.0212, g=125663600;

    // 5대 비젼 원본 데이터
    const visionsOriginal = [
        ["🏫 HK 글로벌 AI 학교", "전 세계 어린이들에게 최첨단 AI 교육을 무상으로 제공하여 디지털 격차를 해소하고 미래 인재를 양성합니다."],
        ["🏥 나노 메디컬 병원", "나노 기술을 활용한 정밀 수술과 AI 유전자 진단으로 암과 난치병을 정복하는 글로벌 의료 시스템을 구축합니다."],
        ["🏠 에너지 자립 스마트홈", "소형 핵융합 발전(인공태양) 기술을 주거 환경에 접목하여 에너지 비용 걱정 없는 주거비 제로 시대를 엽니다."],
        ["🎓 미래 기술 인재 장학금", "매년 10만 명의 혁신가들에게 연구비와 생활비를 전액 지원하여 기술 발전이 인류 복지로 이어지게 합니다."],
        ["🤖 1가정 1로봇 무상 보급", "모든 가정에 지능형 휴머노이드 로봇을 무상 보급하여 단순 가사 노동으로부터 인류를 해방하고 자아실현을 돕습니다."]
    ];

    // FAQ 20선 데이터
    const faqsOriginal = [
        ["HKWB의 보안 수준은 어느 정도입니까?", "양자 컴퓨터의 공격도 방어 가능한 양자 암호화 기술과 하이퍼레저 기반의 분산 원장을 결합하여 세계 최고 수준의 자산 보호 시스템을 구축했습니다."],
        ["테스트 파이 연동은 어떻게 진행되나요?", "형님의 지갑과 Pi SDK를 통해 직접 연결되며, 실시간으로 체인 데이터와 동기화되어 실제 메인넷과 동일한 환경에서 구동됩니다."],
        ["글로벌 기본소득은 누가 받을 수 있습니까?", "HK WORLD BANK 앱을 사용하는 전 세계 모든 인류에게 HK 그룹 수익의 30%를 공평하게 자동 배분하는 시스템입니다."],
        ["1가정 1로봇 무상 보급 신청 방법은?", "HK-Robotics의 대량 생산 공정 완료 후, 앱 내 거버넌스 투표와 신청 순서에 따라 지역별로 순차 배급될 예정입니다."],
        ["무상 주거 단지 클러스터는 어디에 생기나요?", "울산, 경주, 포항을 잇는 한국 내 하이테크 클러스터를 시작으로 싱가포르, 두바이, 뉴욕 등 글로벌 거점으로 확대 구축됩니다."],
        ["DEX 스왑 수수료 환원 시스템이란?", "발생하는 모든 스왑 수수료의 90% 이상을 유동성 공급자(LP)와 생태계 기여자에게 보상으로 즉시 환원하여 동반 성장을 도모합니다."],
        ["무상 AI 교육의 커리큘럼은?", "유아용 논리 사고력부터 전문가용 퀀텀 컴퓨팅, 신경망 설계까지 전 과정을 AI 튜터가 개인 맞춤형으로 24시간 지도합니다."],
        ["의료 서비스 면제 범위는?", "나노 로봇을 이용한 정밀 수술, AI 유전자 진단, 노화 방지 케어 등 모든 의료 행위가 재단 기금을 통해 무상 처리됩니다."],
        ["장학금 지원 규모와 대상은?", "기술 혁신에 기여할 의지가 있는 청년이라면 학력에 상관없이 월 최대 $5,000 수준의 생활비와 연구비를 지원합니다."],
        ["메인넷 전환 시 자산 보존은?", "테스트 환경에서 축적된 모든 기여도와 데이터는 Pi Network 공식 오픈 메인넷 시점에 1:1 비율로 안전하게 전환 보존됩니다."],
        ["스테이킹 수익률은 어떻게 결정되나요?", "실시간 유동성 공급량과 거래 빈도에 따라 AI 알고리즘이 최적의 수익률(APR)을 산출하여 사용자에게 실시간 제공합니다."],
        ["노드 참여 시 얻는 추가 혜택은?", "시스템 유지 보상으로 더 높은 등급의 거버넌스 투표권과 HK 그룹 프로젝트에 대한 우선 투자 권한이 부여됩니다."],
        ["글로벌 지원 센터는 어디에 있나요?", "현재 서울과 울산을 거점으로 전 세계 50여 개 주요 도시에 24시간 대응 가능한 AI 센터가 구축 중입니다."],
        ["에너지 자립 홈의 기술적 근거는?", "핵융합 발전(인공태양) 기술의 소형화와 고효율 전고체 배터리를 결합하여 가구별 독립적 에너지 생산 시스템을 구축했습니다."],
        ["가사 로봇의 보안 기능은?", "로봇은 개인의 사생활 데이터를 로컬 서버에만 저장하며, 주인의 허가 없이는 어떤 데이터도 외부로 전송하지 않는 엄격한 보안 프로토콜을 따릅니다."],
        ["재단의 투명성 확인 방법은?", "재단의 모든 기금 집행과 회계 내역은 조작이 불가능한 블록체인 익스플로러를 통해 누구나 실시간으로 감시할 수 있습니다."],
        ["다국어 지원은 어디까지 되나요?", "현재 16개 주요 언어를 완벽 지원하며, 실시간 AI 번역을 통해 전 세계 100개 이상의 언어 사용자가 소통 가능하게 확장 중입니다."],
        ["형님을 위한 특별 거버넌스 권한은?", "HK 그룹의 설립자로서 주요 의사 결정에 대한 최종 승인권 및 신규 프로젝트 런칭 시 독점적 권한이 부여됩니다."],
        ["시스템 자가 진단 주기는?", "AI 통합 관리 시스템이 마이크로초 단위로 시스템 부하와 보안 위협을 상시 모니터링하여 무중단 운영을 실현합니다."],
        ["삐니 챗봇은 무엇을 도와주나요?", "형님의 개인화된 AI 비서로서 자산 포트폴리오 관리, 일정 최적화, 최신 기술 동향 브리핑 등 모든 영역을 보조합니다."]
    ];

    const i18n = {
        ko: { sub: "메인자산통합원장", m: ["송금","결제","예치","보상","기본소득","스왑"], faq_b: "글로벌 AI 지원센터 (FAQ 20선)", vis_b: "HK 사회 재단 비전 2030", greet: "무엇을 도와드릴까요?", pi: "PI 수량", swap: "DEX 스왑", staking: "LP 스테이킹" },
        en: { sub: "Main Asset Integrated Ledger", m: ["Send","Pay","Deposit","Reward","UBI","Swap"], faq_b: "Global AI Support Center (FAQ 20)", vis_b: "HK Foundation Vision 2030", greet: "How can I help you?", pi: "PI Balance", swap: "DEX Swap", staking: "LP Staking" },
        zh: { sub: "主资产整合账本", m: ["转账","支付","存款","奖励","基本收入","交换"], faq_b: "全球 AI 支持中心 (FAQ 20)", vis_b: "HK 社会基金会 愿景 2030", greet: "我能帮您什么？", pi: "PI 数量", swap: "DEX 交换", staking: "LP 质押" }
    };

    function changeLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('txt-sub').innerText = d.sub;
        for(let i=1; i<=6; i++) document.getElementById('m'+i).innerText = d.m[i-1];
        document.getElementById('btn-faq').innerText = d.faq_b;
        document.getElementById('btn-vis').innerText = d.vis_b;
        document.getElementById('chat-greet').innerText = d.greet;
        document.getElementById('btn-pi').innerText = d.pi;
        document.getElementById('btn-swap').innerText = d.swap;
        document.getElementById('btn-staking').innerText = d.staking;
        renderFAQ(); renderVision();
    }

    function renderFAQ() {
        const list = document.getElementById('faq-list'); list.innerHTML = "";
        faqsOriginal.forEach((f, i) => {
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`;
        });
    }

    function renderVision() {
        const list = document.getElementById('vision-list'); list.innerHTML = "";
        visionsOriginal.forEach(v => {
            list.innerHTML += `<div class="vision-item"><b>${v[0]}</b><p>${v[1]}</p></div>`;
        });
    }

    function update() { 
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>"; 
        document.getElementById('gcv-val').innerText = "Value: $ " + g.toLocaleString() + " (GCV)";
    }
    function toggle(id) { const p = document.getElementById(id); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function openChat() { document.getElementById('chat-window').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function runDemo(label, code) { openChat(); let m=""; if(code) eval(code); document.getElementById('chat-res').innerHTML += `<div class="msg-box msg-user">${label} 실행</div>`; if(m) setTimeout(()=> { document.getElementById('chat-res').innerHTML += `<div class="msg-box msg-bbini">${m}</div>`; update(); }, 500); }
    function sendMsg() { const i = document.getElementById('chat-in'); if(!i.value) return; document.getElementById('chat-res').innerHTML += `<div class="msg-box msg-user">${i.value}</div>`; i.value = ""; }

    changeLang('ko');
    setInterval(() => { p+=0.0001; update(); }, 1000);
</script>
</body>
</html>
