
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - UBI Global Hub</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 120px; }
        
        /* Lang Bar */
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; color: var(--neon-st); text-transform: uppercase; letter-spacing: 2px; }
       
        /* Real-time Counter Styling */
        .pi-display { font-size: 2.8rem; font-weight: bold; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-size: 1.1rem; font-variant-numeric: tabular-nums; }

        .token-info { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--neon-blue); text-align: center; position: relative; }
        .token-supply { color: var(--neon-blue); font-weight: bold; font-size: 1.4rem; font-variant-numeric: tabular-nums; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
        .rate-val { font-size: 1.2rem; font-weight: bold; font-variant-numeric: tabular-nums; }
       
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { font-size: 1.5rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .m-btn:active { transform: scale(0.95); filter: brightness(1.3); }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .icon-card:active { border-color: var(--gold); transform: translateY(-3px); }
        .icon-card span { display: block; margin-top: 8px; font-size: 0.85rem; color: #ccc; }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
       
        .faq-section { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #444; margin-bottom: 20px; }
        .faq-q { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .faq-a { color: #ccc; font-size: 0.8rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .social-box { display: flex; gap: 10px; margin-bottom: 30px; }
        .social-link { flex: 1; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; }
        .yt-btn { background: #FF0000; }
        .tk-btn { background: #000; border: 1px solid #fff; }

        /* CHAT SYSTEM */
        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 3000; color: white; animation: pulse 2s infinite; }
        #chat-window { display: none; position: fixed; bottom: 105px; right: 20px; width: 330px; height: 480px; background: #111; border: 2px solid var(--neon-lp); border-radius: 20px; z-index: 3001; flex-direction: column; overflow: hidden; }
        #chat-header { background: var(--neon-lp); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .ai-msg { background: #222; align-self: flex-start; border-left: 4px solid var(--neon-lp); }
        .user-msg { background: var(--neon-blue); align-self: flex-end; }
        .chat-input-box { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; }
        #user-input { flex: 1; background: #222; border: none; border-radius: 8px; color: white; padding: 10px; outline: none; }
        #send-btn { background: var(--neon-lp); border: none; color: white; padding: 0 15px; margin-left: 8px; border-radius: 8px; cursor: pointer; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 0, 255, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="updateAllLanguage()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">통합 자산 관리 시스템</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="token-info">
        <div id="txt-hkwb-label" style="font-size:0.8rem; color:#aaa;">HKWB TOKEN REAL-TIME SUPPLY</div>
        <div class="token-supply" id="token-num">6,280,000.0000</div>
    </div>

    <div class="rate-grid">
        <div class="rate-card">
            <div style="color:var(--neon-st); font-size:0.8rem;">스테이킹</div>
            <div class="rate-val" id="live-st" style="color:var(--neon-st);">17.38%</div>
        </div>
        <div class="rate-card">
            <div style="color:var(--neon-lp); font-size:0.8rem;">LP 수익</div>
            <div class="rate-val" id="live-lp" style="color:var(--neon-lp);">28.12%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div style="font-size:0.8rem; color:var(--neon-green); margin-bottom:5px;">TOTAL LIQUIDITY POOL</div>
        <div id="lp-total-num">$ 88,432,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" style="background:#fff;" onclick="PiSDK.checkBalance()">지갑 연동</button>
        <button class="m-btn" style="background:var(--gold);" onclick="PiSDK.swap('DEX')">DEX 스왑</button>
        <button class="m-btn" style="background:#28a745; color:white;" onclick="PiSDK.provideLP()">LP 스테이킹</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="PiSDK.send()">🚀<span>송금</span></div>
        <div class="icon-card" onclick="PiSDK.pay()">🛒<span>결제</span></div>
        <div class="icon-card" onclick="PiSDK.deposit()">💰<span>예치</span></div>
        <div class="icon-card" onclick="PiSDK.mine()">🏅<span>보상</span></div>
        <div class="icon-card" onclick="PiSDK.ubi()">🏦<span>UBI</span></div>
        <div class="icon-card" onclick="PiSDK.ex()">🔄<span>전환</span></div>
    </div>

    <button class="center-btn" onclick="toggleFaq()">Global AI Support Center</button>
    <div class="faq-section" id="faqBox"><div id="faq-list"></div></div>

    <div class="social-box">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="social-link yt-btn">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="social-link tk-btn">TikTok</a>
    </div>
</div>

<div id="ai-bot" onclick="toggleChat()">AI</div>
<div id="chat-window">
    <div id="chat-header"><span>HKWB AI 삐니</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span></div>
    <div id="chat-messages"><div class="msg ai-msg">혜공 형님, 접속을 환영합니다! 숫자는 실시간으로 변동 중입니다. 무엇을 도와드릴까요?</div></div>
    <div class="chat-input-box">
        <input type="text" id="user-input" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') askAI()">
        <button id="send-btn" onclick="askAI()">전송</button>
    </div>
</div>

<script>
    /* 숫자 변동 엔진 (1.5초 간격) */
    let piBase = 412.314159;
    let gcvBase = 129540600;
    let lpBase = 88432159375;
    let tokenBase = 6280000.0000;

    function updateNumbers() {
        piBase += (Math.random() * 0.0004 - 0.0002);
        gcvBase += Math.floor(Math.random() * 1000 - 500);
        lpBase += Math.floor(Math.random() * 50000 - 20000);
        tokenBase += (Math.random() * 0.0001);

        document.getElementById('main-pi').innerText = piBase.toFixed(4);
        document.getElementById('main-val').innerText = gcvBase.toLocaleString();
        document.getElementById('lp-total-num').innerText = '$ ' + lpBase.toLocaleString();
        document.getElementById('token-num').innerText = tokenBase.toFixed(4);
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (28 + Math.random()).toFixed(2) + '%';
    }
    setInterval(updateNumbers, 1500);

    /* AI 챗봇 확실하게 */
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    function askAI() {
        const input = document.getElementById('user-input');
        const msg = input.value.trim();
        if(!msg) return;

        addMsg(msg, 'user-msg');
        input.value = '';

        setTimeout(() => {
            let res = "혜공 형님, 요청하신 자산 정보가 1.5초마다 갱신되고 있습니다. 5월 18일 메인넷 연동 준비는 완벽합니다.";
            if(msg.includes("1080")) res = "2월 26일, 1080개 Pi를 LP에 예치하시면 HKWB 토큰 보상 배율이 최대화됩니다.";
            if(msg.includes("UBI")) res = "UBI 시스템은 20억 인류의 생존줄입니다. 형님의 비전대로 자동 분배 로직이 가동 대기 중입니다.";
            if(msg.includes("DEX")) res = "DEX 연동은 Pi SDK를 통해 완료되었습니다. 실시간 시세를 확인하십시오.";
            addMsg(res, 'ai-msg');
        }, 800);
    }

    function addMsg(t, c) {
        const b = document.getElementById('chat-messages');
        const d = document.createElement('div');
        d.className = `msg ${c}`; d.innerText = t;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    /* SDK MOCK */
    const PiSDK = {
        checkBalance: () => alert("혜공 형님, 메인넷 지갑 잔액이 연동되었습니다."),
        swap: () => alert("DEX 스왑: Pi를 HKWB 자산으로 즉시 전환합니다."),
        provideLP: () => alert("유동성 공급: 1080개 Pi 예치 예약이 확정되었습니다."),
        send: () => alert("보안 전송 프로토콜 가동."), pay: () => alert("GCV 결제 승인 대기."),
        deposit: () => alert("양자 암호 금고에 자산이 입고되었습니다."),
        mine: () => alert("노드 채굴 보상이 실시간 합산 중입니다."),
        ubi: () => alert("20억 인류 기본소득 엔진 상태: 정상"),
        ex: () => alert("자산 포트폴리오 최적화 전환 중.")
    };

    function toggleFaq() {
        const f = document.getElementById('faqBox');
        f.style.display = (f.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = () => {
        const faqList = [
            {q: "UBI의 지급 대상은?", a: "HKWB 생태계에 참여하는 전 세계 20억 인류입니다."},
            {q: "6,280,000 HKWB의 가치는?", a: "전 세계 유동성 풀의 거버넌스 권한을 상징합니다."},
            {q: "5월 18일 무엇을 해야 하나요?", a: "지갑 연동 버튼을 눌러 본사 DB와 동기화하면 됩니다."},
            {q: "보안은 안전합니까?", a: "삐니가 관리하는 양자 암호화로 해킹이 불가능합니다."}
        ];
        document.getElementById('faq-list').innerHTML = faqList.map(i => `<div class="faq-q">${i.q}</div><div class="faq-a">${i.a}</div>`).join('');
    };
</script>
</body>
</html>
