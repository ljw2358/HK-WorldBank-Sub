<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - TOTAL MASTER</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg: #000; --card: #121212; --gold: #FFD700;
            --neon-pink: #FF00FF; --neon-blue: #00BFFF; --neon-green: #39FF14;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

        /* 언어 선택 */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        #langSelect { background: #000; color: var(--gold); border: 2px solid var(--gold); border-radius: 8px; padding: 5px; font-weight: 900; }

        /* 대시보드 */
        header { text-align: center; margin-bottom: 20px; }
        .title { color: var(--gold); font-size: 2.2rem; font-weight: 900; margin: 0; }
        .pi-display { font-size: 3.5rem; font-weight: 900; margin: 10px 0; text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .gcv-status { color: var(--neon-green); border: 2px solid var(--neon-green); padding: 8px 25px; border-radius: 50px; font-weight: 900; display: inline-block; }

        /* 메인 메뉴 그리드 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .btn-item { background: var(--card); padding: 20px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .btn-item i { font-style: normal; font-size: 2rem; display: block; margin-bottom: 8px; }
        .btn-item span { font-size: 0.85rem; font-weight: bold; }
        .ubi-glow { border: 2px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); animation: pulse 1.5s infinite; }

        /* 통째 통합 레이어 시스템 */
        .onion-layer { display: none; margin-top: 20px; animation: slideIn 0.4s ease-out; }
        
        /* 1단계: 재단 대문 */
        .foundation-box { background: linear-gradient(135deg, #FF00FF, #00BFFF); padding: 30px 20px; border-radius: 20px; text-align: center; cursor: pointer; }
        
        /* 2단계: 6대 복지 메뉴 */
        .welfare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .w-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--neon-blue); text-align: center; cursor: pointer; }

        /* 3단계: 상세 내용 + 유튜브/틱톡 통합 플레이어 */
        .detail-box { background: #080808; border: 2px solid var(--gold); border-radius: 25px; padding: 20px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 하단 미디어 퀵링크 */
        .media-footer { display: flex; gap: 10px; margin-top: 30px; }
        .media-btn { flex: 1; padding: 15px; border-radius: 12px; text-align: center; font-weight: 900; text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }

        #bpini-btn { position: fixed; bottom: 30px; right: 20px; width: 70px; height: 70px; background: var(--neon-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--neon-pink); cursor: pointer; z-index: 1000; border: 2px solid white; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav"><select id="langSelect" onchange="changeLanguage()"></select></div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div class="pi-display"><span id="pi-balance">412.3160</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="gcv-status" id="t-gcv">$ 129,541,372</div>
    </header>

    <div class="grid-6">
        <div class="btn-item"><i>🚀</i><span id="m1">송금</span></div>
        <div class="btn-item"><i>🛒</i><span id="m2">결제</span></div>
        <div class="btn-item"><i>💰</i><span id="m3">예치</span></div>
        <div class="btn-item"><i>🏅</i><span id="m4">보상</span></div>
        <div class="btn-item ubi-glow" onclick="peel(1)"><i>🏛️</i><span id="m5">UBI</span></div>
        <div class="btn-item"><i>🔄</i><span id="m6">스왑</span></div>
    </div>

    <div id="layer-foundation" class="onion-layer">
        <div class="foundation-box" onclick="peel(2)">
            <h2 id="t-f-name" style="margin:0;">🕊️ 혜공통일재단</h2>
            <p id="t-f-sub" style="margin:5px 0 0 0; font-size:0.9rem;">GLOBAL UNIFICATION SYSTEM</p>
        </div>
    </div>

    <div id="layer-welfare" class="onion-layer">
        <div class="welfare-grid">
            <div class="w-card" onclick="peel(3, 'bank')"><i>🏦</i><span id="w1">은행</span></div>
            <div class="w-card" onclick="peel(3, 'medical')"><i>🏥</i><span id="w2">의료</span></div>
            <div class="w-card" onclick="peel(3, 'edu')"><i>🎓</i><span id="w3">교육</span></div>
            <div class="w-card" onclick="peel(3, 'food')"><i>🍱</i><span id="w4">식량</span></div>
            <div class="w-card" onclick="peel(3, 'home')"><i>🏠</i><span id="w5">주거</span></div>
            <div class="w-card" onclick="peel(3, 'charity')"><i>🕊️</i><span id="w6">자선</span></div>
        </div>
    </div>

    <div id="layer-detail" class="onion-layer">
        <div class="detail-box">
            <div class="video-container" id="video-frame">
                </div>
            <div id="d-title" style="color:var(--gold); font-size:1.3rem; font-weight:900; margin-bottom:10px;"></div>
            <div id="d-desc" style="line-height:1.6; font-size:0.95rem; color:#ccc;"></div>
            <button onclick="peel(2)" style="width:100%; margin-top:20px; background:#222; border:none; color:white; padding:10px; border-radius:10px;">목록으로 돌아가기</button>
        </div>
    </div>

    <div class="media-footer">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="media-btn" style="background:#f00;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="media-btn" style="background:#000; border:1px solid #444;">TikTok</a>
    </div>

    <footer style="text-align:center; padding:30px; color:#444; font-size:0.7rem;">
        © 2026 HK WORLD BANK FOUNDATION<br>PI TESTNET ENGINE LOADED
    </footer>
</div>

<div id="bpini-btn">삐니</div>

<script>
    const langCodes = ["ko","en","zh","ja","vi","es","fr","de","pt","ru","hi","ar","id","th","tr","it","nl","pl","sv","no"];
    const dic = {
        ko: { m1:"송금", m2:"결제", m3:"예치", m4:"보상", m5:"UBI", m6:"스왑", fName:"🕊️ 혜공통일재단", w1:"은행", w2:"의료", w3:"교육", w4:"식량", w5:"주거", w6:"자선" },
        en: { m1:"Send", m2:"Pay", m3:"Deposit", m4:"Reward", m5:"UBI", m6:"Swap", fName:"🕊️ HK Foundation", w1:"Bank", w2:"Medical", w3:"Edu", w4:"Food", w5:"Home", w6:"Charity" }
    };

    const content = {
        bank: { t:"🏦 HK 금융 프로토콜", d:"전 인류 1인 1계좌 Pi 지급 실행안입니다.", vid:"https://www.youtube.com/embed/5F_P6tP_5_Y" },
        medical: { t:"🏥 글로벌 의료 복지", d:"24시간 AI 진료 및 무상 의료 시스템입니다.", vid:"https://www.youtube.com/embed/S2nBBMvvS88" },
        edu: { t:"🎓 혜공 기술 교육", d:"글자를 몰라도 성공하는 숏폼 기술 전수입니다.", vid:"https://www.youtube.com/embed/V6XNAn7P_3k" },
        food: { t:"🍱 식량 주권 네트워크", d:"전 세계 기아 제로화를 위한 스마트 팜 연동입니다.", vid:"https://www.youtube.com/embed/8vR-uH4qRj8" },
        home: { t:"🏠 스마트 주택 보급", d:"인간다운 삶을 위한 보편적 주거권 보장안입니다.", vid:"https://www.youtube.com/embed/9NfR7q_pUjI" },
        charity: { t:"🕊️ 인류 통일 자선", d:"투명한 블록체인 기반의 글로벌 구호 시스템입니다.", vid:"https://www.youtube.com/embed/mH8XfS5L6_E" }
    };

    function peel(step, key) {
        document.querySelectorAll('.onion-layer').forEach(l => l.style.display = 'none');
        if(step === 1) document.getElementById('layer-foundation').style.display = 'block';
        else if(step === 2) document.getElementById('layer-welfare').style.display = 'block';
        else if(step === 3) {
            const item = content[key];
            document.getElementById('d-title').innerText = item.t;
            document.getElementById('d-desc').innerText = item.d;
            document.getElementById('video-frame').innerHTML = `<iframe src="${item.vid}" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('layer-detail').style.display = 'block';
        }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function changeLanguage() { /* 언어 변경 로직 */ }

    window.onload = () => {
        const sel = document.getElementById('langSelect');
        langCodes.forEach(c => { const o = document.createElement('option'); o.value=c; o.innerText=c.toUpperCase(); sel.appendChild(o); });
        setInterval(() => {
            let b = document.getElementById('pi-balance');
            b.innerText = (parseFloat(b.innerText) + 0.0001).toFixed(4);
        }, 1000);
    };
</script>
</body>
</html>
