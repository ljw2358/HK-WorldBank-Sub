<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKWB - Global DEX Hub</title>
    <style>
        :root {
            --bg: #000000; --card: #0d0d0d; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; padding-bottom: 120px; }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(255,215,0,0.7); }
        #txt-ledger { font-weight: bold; margin-top: 10px; color: var(--neon-st); letter-spacing: 2px; }
       
        /* DEX 전용 스타일 */
        .dex-container { background: #1a1a1a; border-radius: 25px; padding: 20px; border: 2px solid var(--gold); margin-bottom: 20px; display: none; }
        .swap-box { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .swap-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .swap-input-row { display: flex; justify-content: space-between; align-items: center; }
        .swap-input { background: none; border: none; color: white; font-size: 1.5rem; font-weight: bold; width: 60%; outline: none; }
        .token-select { background: #222; padding: 5px 12px; border-radius: 20px; font-weight: bold; color: var(--gold); }

        .pi-display { font-size: 2.8rem; font-weight: bold; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 10px 25px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; }

        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { font-size: 1.5rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .m-btn:active { transform: scale(0.9); }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .icon-card span { display: block; margin-top: 8px; font-size: 0.85rem; font-weight: bold; color: #ddd; }

        /* Floating AI */
        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 3000; color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">LIVE DEX TERMINAL</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div id="dex-interface" class="dex-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-weight:bold; color:var(--gold);">DEX SWAP (Testnet)</span>
            <span onclick="toggleDex()" style="cursor:pointer; color:#888;">✕</span>
        </div>
        <div class="swap-box">
            <div class="swap-label">From</div>
            <div class="swap-input-row">
                <input type="number" class="swap-input" value="10.0" id="from-amount" oninput="calcSwap()">
                <div class="token-select">Pi (Test)</div>
            </div>
        </div>
        <div style="text-align:center; margin:-15px 0; position:relative; z-index:2; color:var(--gold);">⬇</div>
        <div class="swap-box">
            <div class="swap-label">To (Estimated)</div>
            <div class="swap-input-row">
                <input type="text" class="swap-input" value="3141590" id="to-amount" readonly>
                <div class="token-select">HKWB</div>
            </div>
        </div>
        <button onclick="confirmSwap()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--gold); font-weight:bold; cursor:pointer; font-size:1rem;">확정 및 스왑</button>
    </div>

    <div class="lp-total-box">
        <div style="font-size:0.8rem; color:var(--neon-green); margin-bottom:5px;">TOTAL LIQUIDITY POOL</div>
        <div id="lp-total-num">$ 88,432,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn" style="background:#fff;" onclick="PiSDK.connect()">지갑 연동</button>
        <button class="m-btn" style="background:var(--gold);" onclick="toggleDex()">DEX 스왑</button>
        <button class="m-btn" style="background:#28a745; color:white;" onclick="PiSDK.lp()">LP 스테이킹</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="PiSDK.action('송금')">🚀<span>송금</span></div>
        <div class="icon-card" onclick="PiSDK.action('결제')">🛒<span>결제</span></div>
        <div class="icon-card" onclick="PiSDK.action('예치')">💰<span>예치</span></div>
        <div class="icon-card" onclick="PiSDK.action('보상')">🏅<span>보상</span></div>
        <div class="icon-card" onclick="PiSDK.action('UBI')">🏦<span>UBI</span></div>
        <div class="icon-card" onclick="PiSDK.action('전환')">🔄<span>전환</span></div>
    </div>

    <button class="center-btn" onclick="alert('혜공 형님, 글로벌 지원 센터가 형님을 대기 중입니다.')">Global AI Support Center</button>
</div>

<div id="ai-bot" onclick="greet()">AI</div>

<script>
    /* 숫자 변동 엔진 (1.5초) */
    let piBase = 412.3141; let gcvBase = 129540600; let lpBase = 88432159375;
    setInterval(() => {
        piBase += (Math.random() * 0.002 - 0.001);
        gcvBase += Math.floor(Math.random() * 1000 - 500);
        lpBase += Math.floor(Math.random() * 50000 - 20000);
        document.getElementById('main-pi').innerText = piBase.toFixed(4);
        document.getElementById('main-val').innerText = gcvBase.toLocaleString();
        document.getElementById('lp-total-num').innerText = '$ ' + lpBase.toLocaleString();
    }, 1500);

    /* DEX 기능 */
    function toggleDex() {
        const dex = document.getElementById('dex-interface');
        dex.style.display = (dex.style.display === 'block') ? 'none' : 'block';
    }

    function calcSwap() {
        const from = document.getElementById('from-amount').value;
        const gcv = 314159; // GCV 기준가
        document.getElementById('to-amount').value = (from * gcv).toLocaleString();
    }

    function confirmSwap() {
        const amt = document.getElementById('from-amount').value;
        alert(`[DEX 연동 성공]\n혜공 형님, ${amt} Test Pi를 HKWB로 스왑 완료했습니다.\n\n메인넷 주소: 0xHKWB...SECURE`);
        toggleDex();
    }

    /* SDK Mock */
    const PiSDK = {
        connect: () => alert("혜공 형님, 테스트 파이 지갑이 DEX와 실시간 연동되었습니다."),
        lp: () => alert("2월 26일 유동성 공급 예약: 1080 Pi가 LP Pool에 할당되었습니다."),
        action: (n) => alert(`[HKWB Protocol] ${n} 명령을 수신했습니다.`)
    };

    function greet() {
        alert("반갑습니다 혜공 형님! 삐니가 DEX 유동성과 GCV 가치를 실시간으로 지키고 있습니다.");
    }
</script>
</body>
</html>
