<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Enterprise</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
       
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect {
            background: rgba(34, 34, 34, 0.9); color: var(--gold); border: 1px solid var(--gold);
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
        }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
       
        #txt-ledger {
            font-weight: bold; margin-top: 15px; font-size: 1.1rem;
            background: linear-gradient(90deg, #00FFCC, #FF00FF, #39FF14);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .m-btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-white { background: white; color: black; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-green { background: #28a745; color: white; }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .icon-img { font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .icon-txt { font-size: 0.8rem; font-weight: bold; color: #bbb; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-val { color: var(--neon-st); font-size: 1.5rem; font-weight: bold; }
        .lp-val { color: var(--neon-lp); font-size: 1.5rem; font-weight: bold; }

        .lp-total-box { border: 1px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.05); }
        #lp-total-num { color: var(--neon-green); font-size: 1.6rem; font-weight: bold; }

        .shield-box { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--neon-blue); }
        .shield-title { color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; }

        .center-btn {
            width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; 
            border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        .faq-section { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .faq-a { color: #aaa; font-size: 0.8rem; line-height: 1.5; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-bottom: 80px; }
        .soc-btn { padding: 14px; border-radius: 12px; text-align: center; text-decoration: none; color: white; font-weight: bold; transition: 0.3s; }
        .soc-btn:hover { filter: brightness(1.2); }

        #ai-bot {
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px;
            background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp);
            cursor: pointer; z-index: 1000; animation: float 3s infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
       
        #chat-box {
            display: none; position: fixed; bottom: 100px; right: 20px; width: 300px;
            background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 1001;
        }
        #chat-box input { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 10px; box-sizing: border-box; color: #333; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇵🇹</option><option value="ru">Русский 🇷🇺</option>
            <option value="de">Deutsch 🇩🇪</option><option value="fr">Français 🇫🇷</option>
            <option value="it">Italiano 🇮🇹</option><option value="tr">Türkçe 🇹🇷</option>
            <option value="id">Bahasa Indonesia 🇮🇩</option><option value="th">ไทย 🇹🇭</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="ar">العربية 🇸🇦</option>
            <option value="pl">Polski 🇵🇱</option><option value="nl">Nederlands 🇳🇱</option>
            <option value="sv">Svenska 🇸🇪</option><option value="ms">Bahasa Melayu 🇲🇾</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div style="font-size: 2.5rem; font-weight: bold; margin: 10px 0;"><span id="main-pi">400.0212</span> <span style="color:var(--gold)">Pi</span></div>
        <div style="background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 5px 20px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-size: 0.9rem;">
            Value: $ <span id="main-val">125,663,600</span> (GCV)
        </div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" style="color:var(--neon-st); font-size: 0.8rem; font-weight: bold; margin-bottom:5px;">스테이킹 이율</div>
            <div class="st-val" id="live-st">16.98%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" style="color:var(--neon-lp); font-size: 0.8rem; font-weight: bold; margin-bottom:5px;">유동성 수익</div>
            <div class="lp-val" id="live-lp">26.38%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.8rem; margin-bottom:8px; color:#aaa;">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,429,159,375</div>
    </div>

    <div class="main-btn-grid">
        <button class="m-btn btn-white" onclick="alert('PI Wallet Syncing...')">PI 수량</button>
        <button class="m-btn btn-gold" onclick="alert('DEX Interface Loading...')">DEX 스왑</button>
        <button class="m-btn btn-green" onclick="alert('Liquidity Pool Connected')">LP 공급</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="alert('Transfer System Ready')"><span class="icon-img">🚀</span><span class="icon-txt" id="m1">송금</span></div>
        <div class="icon-card" onclick="alert('Payment Gateway Active')"><span class="icon-img">🛒</span><span class="icon-txt" id="m2">결제</span></div>
        <div class="icon-card" onclick="alert('Staking Pool Locked')"><span class="icon-img">💰</span><span class="icon-txt" id="m3">예치</span></div>
        <div class="icon-card" onclick="alert('Rewards Checking...')"><span class="icon-img">🏅</span><span class="icon-txt" id="m4">보상</span></div>
        <div class="icon-card" onclick="alert('UBI Distribution Active')"><span class="icon-img">🏦</span><span class="icon-txt" id="m5">기본소득</span></div>
        <div class="icon-card" onclick="alert('Swap Engine Online')"><span class="icon-img">🔄</span><span class="icon-txt" id="m6">스왑</span></div>
    </div>

    <div class="shield-box">
        <div class="shield-title">🛡 <span id="sh0">HK 양자 방패 가동 중</span></div>
        <div style="font-size: 0.75rem; color: #888; line-height: 1.6;">
            • <span id="sh1">보안 기술 V23 적용</span><br>
            • <span id="sh2">메인넷 자산 자동 연동</span><br>
            • <span id="sh3">AI 실시간 자산 보호</span>
        </div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터 가동</button>

    <div class="faq-section" id="faqBox">
        <div id="faq-list"></div>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background:#FF0000">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background:#000; border: 1px solid #333;">TikTok</a>
    </div>
</div>

<div id="ai-bot" onclick="openChat()">AI</div>
<div id="chat-box">
    <div id="txt-ai-ask" style="color:black; font-weight:bold; margin-bottom:10px; font-size:0.9rem;">무엇을 도와 드릴까요?</div>
    <input type="text" placeholder="Message...">
    <button onclick="closeChat()" style="margin-top:10px; width:100%; padding:10px; background:#111; color:white; border:none; border-radius:8px; cursor:pointer;">Close</button>
</div>

<script>
    const i18n = {
        ko: { 
            ledger: "메인 자산 통합 원장", st: "스테이킹 이율", lp: "유동성 수익", total: "전체 유동성 LP 공급", 
            m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑",
            sh0: "HK 양자 방패 가동 중", sh1: "보안 기술 V23 적용", sh2: "메인넷 자산 자동 연동", sh3: "AI 실시간 자산 보호",
            center: "글로벌 AI 고객지원센터 가동", ai: "무엇을 도와 드릴까요?",
            q11: "11. UBI 재원은 어떻게 만드나요?", a11: "독자적인 유동성 알고리즘과 글로벌 AI 수익 모델을 통해 창출됩니다.",
            faqT: "HK 월드뱅크 서비스 안내", faqA: "24시간 자동화 시스템이 자산을 안전하게 관리합니다."
        },
        en: { 
            ledger: "Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", total: "Total Liquidity LP", 
            m1: "Send", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap",
            sh0: "Quantum Shield Active", sh1: "Security V23 Applied", sh2: "Mainnet Auto-Sync", sh3: "AI Asset Guard",
            center: "Global AI Support Center", ai: "How can I help you?",
            q11: "11. How is UBI funded?", a11: "Created via liquidity algorithms and global AI revenue models.",
            faqT: "HK Bank Service Info", faqA: "24/7 automated AI management for your assets."
        },
        zh: { ledger: "主资产账本", st: "质押利率", lp: "流动性收益", m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "基本收入", m6: "闪兑", sh0: "量子防护启动", center: "全球AI客服", ai: "有什么可以帮您？", q11: "11. UBI资金来源？", a11: "通过流动性算法和AI收益模型产生。" },
        ja: { ledger: "資産統合元帳", st: "利回り", lp: "収益率", m1: "送金", m2: "決済", m3: "預入", m4: "報酬", m5: "基本所得", m6: "交換", sh0: "量子シールド稼働", center: "AIサポート", ai: "何かお手伝いしますか？", q11: "11. UBI財源は？", a11: "独自のアルゴリズムとAIモデルで創出。" },
        vi: { ledger: "Sổ cái tài sản", st: "Lãi Staking", lp: "Lợi nhuận LP", m1: "Gửi tiền", m2: "Thanh toán", m3: "Gửi tiết kiệm", m4: "Thưởng", m5: "Thu nhập UBI", m6: "Hoán đổi", sh0: "Lá chắn Quantum", center: "Trung tâm hỗ trợ AI", ai: "Tôi có thể giúp gì?", q11: "11. Nguồn vốn UBI?", a11: "Tạo ra từ thuật toán thanh khoản và mô hình AI." },
        pt: { ledger: "Livro de Ativos", st: "Taxa Staking", lp: "Rendimento LP", m1: "Enviar", m2: "Pagar", m3: "Depositar", m4: "Recompensa", m5: "Renda UBI", m6: "Troca", sh0: "Escudo Quântico", center: "Suporte AI Global", ai: "Como posso ajudar?", q11: "11. Como criar UBI?", a11: "Algoritmos de liquidez e modelos de lucro IA." },
        es: { ledger: "Libro de Activos", st: "Tasa Staking", lp: "Rendimiento LP", m1: "Enviar", m2: "Pagar", m3: "Depositar", m4: "Premio", m5: "Renta UBI", m6: "Canje", sh0: "Escudo Cuántico", center: "Soporte IA Global", ai: "¿Cómo puedo ayudar?", q11: "11. ¿Origen de UBI?", a11: "Algoritmos de liquidez y modelos de IA." },
        ru: { ledger: "Реестр активов", st: "Стейкинг", lp: "Доходность LP", m1: "Перевод", m2: "Оплата", m3: "Депозит", m4: "Бонус", m5: "Доход UBI", m6: "Обмен", sh0: "Квантовый щит", center: "Центр ИИ поддержки", ai: "Чем помочь?", q11: "11. Источник UBI?", a11: "Алгоритмы ликвидности и модели ИИ." }
    };

    // 실시간 숫자 변동 함수
    function updateNumbers() {
        const pi = (400 + Math.random() * 0.1).toFixed(4);
        const val = (125663600 + Math.floor(Math.random() * 1000)).toLocaleString();
        const st = (16 + Math.random()).toFixed(2) + '%';
        const lp = (26 + Math.random()).toFixed(2) + '%';
        const totalLp = (88429159375 + Math.floor(Math.random() * 10000)).toLocaleString();

        document.getElementById('main-pi').innerText = pi;
        document.getElementById('main-val').innerText = val;
        document.getElementById('live-st').innerText = st;
        document.getElementById('live-lp').innerText = lp;
        document.getElementById('lp-total-num').innerText = '$ ' + totalLp;
    }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        ['m1','m2','m3','m4','m5','m6','sh0','sh1','sh2','sh3'].forEach(id => {
            if(d[id]) document.getElementById(id).innerText = d[id];
        });
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('txt-ai-ask').innerText = d.ai;

        const list = document.getElementById('faq-list');
        list.innerHTML = "";
        for(let i=1; i<=20; i++) {
            let q = i === 11 ? d.q11 : `FAQ ${i} - ${d.faqT || 'Service'}`;
            let a = i === 11 ? d.a11 : (d.faqA || 'Automated management system.');
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${q}</div><div class="faq-a">${a}</div></div>`;
        }
    }

    function toggleFaq() { 
        const b = document.getElementById('faqBox');
        b.style.display = (b.style.display === 'block') ? 'none' : 'block'; 
    }
    function openChat() { document.getElementById('chat-box').style.display = 'block'; }
    function closeChat() { document.getElementById('chat-box').style.display = 'none'; }
    
    setInterval(updateNumbers, 2000);
    changeLanguage();
</script>
</body>
</html>
