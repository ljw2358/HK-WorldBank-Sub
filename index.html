<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - THE 20 FAQ EMPIRE</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; text-align: center; }

        /* 언어 선택 */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .lang-box { background: #1a1a1a; border: 1.5px solid var(--hk-gold); border-radius: 8px; padding: 5px 10px; }
        .lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; }

        .header-title { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 0; }
        .header-sub { font-size: 14px; color: var(--hk-blue); font-weight: 700; margin-bottom: 25px; }

        /* 상단 핵심 3버튼 */
        .top-core { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .c-btn { padding: 12px 5px; border-radius: 10px; font-size: 12px; font-weight: 900; color: #000; }

        /* 메인 전산 수치 */
        .pi-main { font-size: 55px; font-weight: 900; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        .pi-main span { color: var(--hk-gold); font-size: 25px; }
        .usd-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 25px; border-radius: 30px; font-size: 22px; font-weight: 800; margin-bottom: 25px; }

        .box { background: rgba(255,255,255,0.03); border: 1.5px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .label { font-size: 11px; color: #888; font-weight: 800; margin-bottom: 5px; display: block; }
        .val { font-size: 24px; font-weight: 900; color: var(--hk-blue); font-variant-numeric: tabular-nums; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box-sm { background: rgba(255,255,255,0.03); border: 1.5px solid #222; border-radius: 15px; padding: 15px; text-align: left; }

        /* 6대 엔진 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .btn-6 span { font-size: 12px; font-weight: 800; display: block; margin-top: 8px; }

        /* 양파까기 섹션 */
        .action-btn { width: 100%; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; margin-bottom: 10px; border: none; color: white; }
        .hidden-panel { display: none; background: #0a0a0a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; text-align: left; }
        .onion-item { background: #151515; border-radius: 10px; padding: 15px; margin-bottom: 8px; border-left: 4px solid var(--hk-gold); }

        /* [핵심] FAQ 리스트 스타일 */
        .faq-list-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .faq-item { border-bottom: 1px solid #222; padding: 12px 0; }
        .faq-q { font-size: 13.5px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; color: #eee; }
        .faq-a { font-size: 12.5px; color: #aaa; margin-top: 8px; display: none; border-left: 3px solid var(--hk-pink); padding-left: 10px; line-height: 1.5; }

        /* 소셜 & 챗봇 */
        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .soc-btn { padding: 15px; border-radius: 12px; font-weight: 900; text-decoration: none; color: #fff; text-align: center; }
        .bbini-bot { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 20px var(--hk-pink); cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav"><div class="lang-box"><select><option>한국어</option><option>English</option></select></div></div>

    <h1 class="header-title">HK WORLD BANK</h1>
    <div class="header-sub">통합 자산 관리 시스템</div>

    <div class="top-core">
        <div class="c-btn" style="background:#fff;">PI 수량</div>
        <div class="c-btn" style="background:var(--hk-gold);">DEX 스왑</div>
        <div class="c-btn" style="background:var(--hk-green);">LP 스테이킹</div>
    </div>

    <div class="pi-main"><span id="pi-val">412.3144</span> <span>Pi</span></div>
    <div class="usd-pill" id="usd-val">$ 129,541,275</div>

    <div class="box">
        <span class="label">HKWB 실시간 공급량</span>
        <div class="val" id="supply-val">6,280,000.2141</div>
    </div>

    <div class="row-2">
        <div class="box-sm"><span class="label">스테이킹 수익률</span><div id="stake-rate" class="val" style="font-size:20px; color:var(--hk-blue);">14.55%</div></div>
        <div class="box-sm"><span class="label">LP 수익률</span><div id="lp-rate" class="val" style="font-size:20px; color:var(--hk-pink);">22.31%</div></div>
    </div>

    <div class="grid-6">
        <div class="btn-6"><span>🚀 송금</span></div><div class="btn-6"><span>🛒 결제</span></div><div class="btn-6"><span>💰 예치</span></div>
        <div class="btn-6"><span>🏆 보상</span></div><div class="btn-6"><span>🏦 UBI</span></div><div class="btn-6"><span>🔄 스왑</span></div>
    </div>

    <button class="action-btn" style="background: linear-gradient(90deg, #1e293b, #0f172a); border:1px solid #333;" onclick="togglePanel('foundation')">HK 사회 재단</button>
    <div id="foundation" class="hidden-panel">
        <div class="onion-item"><h4>🏫 학교 건립</h4><p>글로벌 인재 양성 인프라</p></div>
        <div class="onion-item"><h4>🏥 AI 병원</h4><p>24시간 원격 의료 서비스</p></div>
        <div class="onion-item"><h4>🏠 스마트 주거</h4><p>3D 프린팅 혁신 주택 보급</p></div>
        <div class="onion-item"><h4>📜 무제한 장학금</h4><p>꿈을 위한 전폭적 학비 지원</p></div>
    </div>

    <button class="action-btn" style="background: #e91e63;" onclick="togglePanel('ai-center')">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="ai-center" class="hidden-panel">
        <div class="faq-list-container" id="faq-inject">
            </div>
    </div>

    <div class="social-row">
        <a href="#" class="soc-btn" style="background:#ff0000;">YouTube</a>
        <a href="#" class="soc-btn" style="background:#111; border:1px solid #444;">TikTok</a>
    </div>
</div>

<div class="bbini-bot" onclick="alert('혜공 형님, 24시간 대기 중입니다!')">삐니</div>

<script>
    // 1초마다 모든 수치 실시간 변동 엔진
    function updateEngine() {
        document.getElementById('pi-val').innerText = (412.3144 + Math.random()*0.01).toFixed(4);
        document.getElementById('supply-val').innerText = (6280000.2141 + Math.random()*0.005).toFixed(4).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        document.getElementById('stake-rate').innerText = (10 + Math.random()*10).toFixed(2) + "%";
        document.getElementById('lp-rate').innerText = (15 + Math.random()*15).toFixed(2) + "%";
        document.getElementById('usd-val').innerText = "$ " + (129541275 + Math.floor(Math.random()*1000)).toLocaleString();
    }
    setInterval(updateEngine, 1000);

    function togglePanel(id) {
        const p = document.getElementById(id);
        const isShow = p.style.display === 'block';
        document.querySelectorAll('.hidden-panel').forEach(el => el.style.display = 'none');
        p.style.display = isShow ? 'none' : 'block';
    }

    // 형님이 찾으시던 대망의 FAQ 20선 데이터
    const faqs = [
        ["HK-WorldBank 설립 목적?", "인류 평등 금융 기여 및 글로벌 기본소득(UBI) 네트워크 구축."],
        ["6,280,000.2141의 의미?", "시스템 초기 신뢰 지표이자 실시간 공급량의 기준점."],
        ["5월 18일 메인넷 오픈?", "16개국 서비스 개방 및 실전 보상 모드 가동일."],
        ["사회재단 재원 마련?", "수익 로직과 기부 시스템을 통한 투명한 재원 확보."],
        ["스테이킹 최대 이율?", "생태계 안정을 위해 연 최대 20% 이하로 가변 적용."],
        ["3D 프린팅 주거 지원?", "주거 소외 계층을 위한 혁신 주택 보급 사업."],
        ["글로벌 장학금 대상?", "능력이 입증된 인재라면 국적 불문 무제한 지원."],
        ["AI 병원 이용 방법?", "앱 내 AI 진단 센터를 통해 24시간 즉시 이용."],
        ["기본소득 지급 방식?", "전산 참여도에 따라 매일 자동 정산 및 지급."],
        ["보안 및 해킹 대책?", "분산 원장 및 다중 보안 노드 설계로 원천 차단."],
        ["결제 API 상용화?", "전 세계 온/오프라인 가맹점 즉시 연동 표준화."],
        ["저수지 물량 투입?", "유동성 공급 증명 후 순차적 생태계 투입."],
        ["50개 언어 지원?", "자체 AI 엔진을 통해 전 세계 언어 실시간 소통."],
        ["DEX 스왑 수수료?", "사용자 부담을 최소화한 최저가 전산 유지비 책정."],
        ["유튜브/틱톡 채널?", "생태계 소식을 전 세계에 알리는 홍보 및 교육 창구."],
        ["스왑 처리 속도?", "초고속 분산 엔진으로 1초 이내 트랜잭션 완료."],
        ["2035 국가 경영 비전?", "HK 비전을 뒷받침하는 강력한 경제적 토대."],
        ["참여 보상 정산?", "매일 자정 알고리즘에 의해 자동 정산 및 전송."],
        ["동훈 풀(Pool)의 역할?", "가격 변동성 방어 및 유동성 안정성 확보."],
        ["삐니 챗봇의 임무?", "형님 보필 및 50개 국어 유저 상담 전담."]
    ];

    const faqBox = document.getElementById('faq-inject');
    faqs.forEach((f, i) => {
        faqBox.innerHTML += `
            <div class="faq-item">
                <div class="faq-q" onclick="toggleFaq(${i})">${i+1}. ${f[0]} <span>▼</span></div>
                <div class="faq-a" id="faq-a-${i}">${f[1]}</div>
            </div>`;
    });

    function toggleFaq(i) {
        const a = document.getElementById(`faq-a-${i}`);
        a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
