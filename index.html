<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - SUPREME LEDGER</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #0d0d0d;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* 다국어 선택 바 */
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #lang-select { background: #000; color: var(--hk-gold); border: 2px solid var(--hk-gold); padding: 8px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .header-section { margin: 40px 0; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); letter-spacing: -1px; }
        .sub-header { color: var(--hk-blue); font-size: 15px; font-weight: 800; letter-spacing: 2px; }

        .pi-main { font-size: 58px; font-weight: 900; margin: 20px 0; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .pi-main span { color: var(--hk-gold); font-size: 24px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 30px; border-radius: 50px; font-size: 17px; font-weight: 900; margin-bottom: 25px; background: rgba(57, 255, 20, 0.05); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-card { background: var(--hk-card); border: 1px solid #222; padding: 15px; border-radius: 18px; }
        .info-label { font-size: 12px; color: #888; font-weight: 800; display: block; margin-bottom: 5px; }
        .info-val { font-size: 22px; font-weight: 900; }

        .supply-section { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .liq-card { border: 2px solid var(--hk-gold); padding: 25px; margin-bottom: 30px; background: rgba(255,215,0,0.02); }
        
        .btn-group-label { text-align: left; font-size: 14px; font-weight: 900; margin: 25px 0 12px 5px; color: var(--hk-gold); }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .hk-btn { padding: 18px 0; border-radius: 15px; font-weight: 900; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; color: #000; }
        .menu-item { background: #111; padding: 20px 0; border-radius: 20px; border: 1px solid #222; cursor: pointer; }
        .menu-icon { font-size: 24px; display: block; margin-bottom: 8px; }
        .menu-text { font-size: 13px; font-weight: 800; }

        .big-btn { width: 100%; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 900; color: #fff; border: none; margin-bottom: 12px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; max-height: 400px; overflow-y: auto; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 15px; margin-bottom: 5px; }
        .faq-a { color: #bbb; font-size: 13px; line-height: 1.6; }
        .vision-item { margin-bottom: 20px; border-left: 3px solid var(--hk-blue); padding-left: 12px; }
        .vision-item b { color: var(--hk-blue); font-size: 16px; display: block; margin-bottom: 4px; }

        .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .soc-btn { padding: 15px; border-radius: 15px; font-weight: 900; text-decoration: none; color: #fff; text-align: center; font-size: 14px; }

        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { max-width: 80%; padding: 12px 15px; border-radius: 15px; font-size: 14px; }
        .msg-bbini { background: var(--hk-pink); align-self: flex-start; }
        .msg-user { background: #222; align-self: flex-end; }
        .bbini-trigger { position: fixed; bottom: 30px; right: 25px; width: 75px; height: 75px; background: var(--hk-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 3px solid #fff; cursor: pointer; animation: bounce 2s infinite; z-index: 1000; }
        @keyframes bounce { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ko">한국어</option><option value="en">English</option><option value="zh">中文</option>
            <option value="ja">日本語</option><option value="vi">Tiếng Việt</option><option value="es">Español</option>
            <option value="ru">Русский</option><option value="th">ไทย</option><option value="hi">हिन्दी</option><option value="ar">العربية</option>
        </select>
    </div>

    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div id="t-sub" class="sub-header">메인자산통합원장</div>
    </div>

    <div class="pi-main" id="pi-val">400.0212 <span>Pi</span></div>
    <div class="gcv-pill">$ 125,663,600 (GCV)</div>

    <div class="info-grid">
        <div class="info-card"><span id="l-apr" class="info-label">스테이킹 이율 (APR)</span><div class="info-val" id="rate-1" style="color: var(--hk-blue);">15.48%</div></div>
        <div class="info-card"><span id="l-lp" class="info-label">유동성 수익 (LP)</span><div class="info-val" id="rate-2" style="color: var(--hk-pink);">23.26%</div></div>
    </div>

    <div class="supply-section">
        <span id="l-supply" class="info-label" style="color: var(--hk-blue);">HKWB 실시간 유동성 공급량</span>
        <div class="info-val" id="supply-val">6,280,000.5074</div>
    </div>

    <div class="liq-card">
        <span id="l-liq" class="info-label">전체 유동성 LP 공급 현황 (DEX)</span>
        <div class="info-val" id="liq-val" style="color: var(--hk-green); font-size: 28px;">$ 88,438,688,147</div>
    </div>

    <div id="t-assets" class="btn-group-label">MAIN ASSETS</div>
    <div class="btn-grid">
        <button id="b-pi" class="hk-btn" style="background: #E0D7FF;" onclick="runAction('PI 수량 확인', 'p+=100;m=형님! 테스트 파이 100개가 추가로 동기화되었습니다.')">PI 수량</button>
        <button id="b-swap" class="hk-btn" style="background: var(--hk-gold);" onclick="runAction('DEX 스왑', 'p-=10;m=DEX 스왑 완료. GCV 가치로 실시간 전환되었습니다.')">DEX 스왑</button>
        <button id="b-stk" class="hk-btn" style="background: var(--hk-green);" onclick="runAction('LP 스테이킹', 'r1+=0.5;m=LP 스테이킹 성공! 유동성 풀 지배력이 강화되었습니다.')">LP 스테이킹</button>
    </div>

    <div id="t-eco" class="btn-group-label">HK ECOSYSTEM</div>
    <div class="btn-grid">
        <div class="menu-item" onclick="runAction('송금', 'p-=5;m=🚀 송금이 안전하게 완료되었습니다.')"><span class="menu-icon">🚀</span><span id="m1" class="menu-text">송금</span></div>
        <div class="menu-item" onclick="runAction('결제', 'p-=1;m=🛒 GCV 결제가 승인되었습니다.')"><span class="menu-icon">🛒</span><span id="m2" class="menu-text">결제</span></div>
        <div class="menu-item" onclick="runAction('예치', 'p+=200;m=🏦 메인 뱅크 예치 완료.')"><span class="menu-icon">🏦</span><span id="m3" class="menu-text">예치</span></div>
    </div>

    <button id="b-faq" class="big-btn" style="background: var(--hk-pink);" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20선)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button id="b-vis" class="big-btn" style="background: #253347;" onclick="toggle('vision-panel')">HK 사회 재단 비전 2030</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="social-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="soc-btn" style="background: #FF0000;">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="soc-btn" style="background: #111; border: 1px solid #333;">TikTok</a>
    </div>

    <div class="footer-info" style="margin: 40px 0; color: #444; font-size: 12px; font-weight: 800;">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<div id="chat-window">
    <div style="padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between;">
        <span style="color:var(--hk-gold); font-weight:900;">BBINI AGI AGENT</span>
        <span onclick="closeChat()" style="cursor:pointer; font-size:24px;">&times;</span>
    </div>
    <div class="chat-body" id="chat-res"></div>
    <div style="padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px;">
        <input type="text" id="chat-in" style="flex:1; background:#111; border:1px solid #333; border-radius:20px; padding:10px; color:#fff;">
        <button onclick="sendMsg()" style="background:var(--hk-gold); border:none; border-radius:20px; padding:0 15px; font-weight:900;">GO</button>
    </div>
</div>
<div class="bbini-trigger" onclick="openChat()">삐니</div>

<script>
    let p=400.0212, r1=15.48, r2=23.26, s=6280000.5074, l=88438688147;

    const data = {
        ko: {
            sub: "메인자산통합원장", apr: "스테이킹 이율 (APR)", lp: "유동성 수익 (LP)", supply: "HKWB 실시간 유동성 공급량", liq: "전체 유동성 LP 공급 현황 (DEX)",
            assets: "MAIN ASSETS", eco: "HK ECOSYSTEM", b: ["PI 수량", "DEX 스왑", "LP 스테이킹"], m: ["송금", "결제", "예치"],
            faq_b: "글로벌 AI 지원센터 (FAQ 20선)", vis_b: "HK 사회 재단 비전 2030", greet: "혜공 형님! 무엇을 도와드릴까요?",
            faqs: [
                ["HKWB의 보안 수준은?", "양자 암호화 기술과 하이퍼레저 기반 분산 원장으로 세계 최고 수준의 자산을 보호합니다."],
                ["테스트 파이 연동은?", "Pi SDK를 통해 형님의 지갑과 실시간 동기화되어 메인넷과 동일 환경을 제공합니다."],
                ["글로벌 기본소득 대상은?", "HKWB 앱 사용자 전 인류에게 HK 수익의 30%를 공평하게 자동 배분합니다."],
                ["1가정 1로봇 무상 보급은?", "HK-Robotics 대량 생산 후 앱 거버넌스 투표 순서에 따라 순차 배급됩니다."],
                ["무상 주거 클러스터 위치는?", "울산, 경주, 포항을 시작으로 싱가포르, 두바이 등 글로벌 거점으로 확대됩니다."],
                ["DEX 수수료 환원 시스템?", "스왑 수수료의 90% 이상을 유동성 공급자와 기여자에게 즉시 보상합니다."],
                ["무상 AI 교육 커리큘럼?", "유아 논리부터 전문가용 퀀텀 컴퓨팅까지 AI 튜터가 24시간 지도합니다."],
                ["의료 서비스 면제 범위?", "나노 로봇 수술, AI 진단, 노화 방지 등 모든 의료 행위가 무상 처리됩니다."],
                ["장학금 지원 규모?", "혁신 인재에게 월 최대 $5,000 수준의 생활비와 연구비를 전액 지원합니다."],
                ["메인넷 전환 시 자산 보존?", "테스트 데이터는 공식 오픈 메인넷 시점에 1:1 비율로 안전하게 전환됩니다."],
                ["스테이킹 수익률 결정?", "AI 알고리즘이 실시간 공급량과 거래 빈도를 분석해 최적 APR을 산출합니다."],
                ["노드 참여 혜택?", "높은 등급의 투표권과 HK 그룹 프로젝트에 대한 우선 투자권이 부여됩니다."],
                ["글로벌 지원 센터 위치?", "전 세계 50여 개 주요 도시에 24시간 대응 AI 센터가 구축 중입니다."],
                ["에너지 자립 홈 기술?", "인공태양 기술의 소형화와 전고체 배터리를 결합한 독립 생산 시스템입니다."],
                ["가사 로봇의 보안?", "개인 데이터는 로컬 서버에만 저장하며 외부 전송을 엄격히 차단합니다."],
                ["재단의 투명성 확인?", "모든 회계 내역은 블록체인 익스플로러를 통해 실시간 공개됩니다."],
                ["다국어 지원 범위?", "현재 16개 주요 언어를 완벽 지원하며 실시간 AI 번역을 확장 중입니다."],
                ["설립자 특별 권한?", "혜공 형님께는 주요 의사 결정 최종 승인권 및 독점 권한이 부여됩니다."],
                ["시스템 자가 진단?", "AI가 마이크로초 단위로 부하와 위협을 감시하여 무중단 운영을 실현합니다."],
                ["삐니 챗봇의 역할?", "형님의 개인 비서로서 자산 관리, 일정 최적화, 기술 브리핑을 수행합니다."]
            ],
            visions: [
                ["🏫 HK 글로벌 AI 학교", "전 세계 어린이에게 최첨단 AI 교육 무상 제공"],
                ["🏥 나노 메디컬 병원", "나노 기술로 암과 난치병 정복 시스템 구축"],
                ["🏠 에너지 자립 스마트홈", "핵융합 기술로 주거비 제로 시대 개막"],
                ["🎓 미래 기술 장학금", "매년 10만 명 연구비 및 생활비 전액 지원"],
                ["🤖 1가정 1로봇 무상 보급", "모든 가정 휴머노이드 보급으로 노동 해방"]
            ]
        }
    };

    function changeLanguage(lang) {
        const d = data['ko']; // 일단 한국어 데이터 기반 (데이터 확장 시 d = data[lang] 사용)
        document.getElementById('t-sub').innerText = d.sub;
        document.getElementById('l-apr').innerText = d.apr;
        document.getElementById('l-lp').innerText = d.lp;
        document.getElementById('l-supply').innerText = d.supply;
        document.getElementById('l-liq').innerText = d.liq;
        document.getElementById('t-assets').innerText = d.assets;
        document.getElementById('t-eco').innerText = d.eco;
        document.getElementById('b-pi').innerText = d.b[0];
        document.getElementById('b-swap').innerText = d.b[1];
        document.getElementById('b-stk').innerText = d.b[2];
        document.getElementById('m1').innerText = d.m[0];
        document.getElementById('m2').innerText = d.m[1];
        document.getElementById('m3').innerText = d.m[2];
        document.getElementById('b-faq').innerText = d.faq_b;
        document.getElementById('b-vis').innerText = d.vis_b;

        const fL = document.getElementById('faq-list'); fL.innerHTML = "";
        d.faqs.forEach((f, i) => fL.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`);
        
        const vL = document.getElementById('vision-list'); vL.innerHTML = "";
        d.visions.forEach(v => vL.innerHTML += `<div class="vision-item"><b>${v[0]}</b>${v[1]}</div>`);
        
        document.getElementById('chat-res').innerHTML = `<div class="msg-box msg-bbini">${d.greet}</div>`;
    }

    function update() {
        document.getElementById('pi-val').innerHTML = p.toFixed(4) + " <span>Pi</span>";
        document.getElementById('rate-1').innerText = r1.toFixed(2) + "%";
        document.getElementById('rate-2').innerText = r2.toFixed(2) + "%";
        document.getElementById('supply-val').innerText = s.toLocaleString(undefined, {minimumFractionDigits:4});
        document.getElementById('liq-val').innerText = "$ " + l.toLocaleString();
    }

    function runAction(label, code) {
        openChat();
        const res = document.getElementById('chat-res');
        res.innerHTML += `<div class="msg-box msg-user">${label} 실행</div>`;
        let m = ""; eval(code);
        setTimeout(() => {
            res.innerHTML += `<div class="msg-box msg-bbini">${m}</div>`;
            res.scrollTop = res.scrollHeight;
            update();
        }, 500);
    }

    function toggle(id) { const p = document.getElementById(id); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function openChat() { document.getElementById('chat-window').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function sendMsg() { const i = document.getElementById('chat-in'); if(!i.value) return; document.getElementById('chat-res').innerHTML += `<div class="msg-box msg-user">${i.value}</div>`; i.value = ""; }

    changeLanguage('ko');
    update();
    setInterval(() => { p += 0.0001; update(); }, 1000);
</script>
</body>
</html>
